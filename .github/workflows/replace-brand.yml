name: Replace Brand in All Files - Root & Subfolders

on:
  workflow_dispatch:

jobs:
  replace-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace Brand Name in ALL files recursively
        run: |
          echo "Starting deep scan from root..."
          
          # Root + Folder အကုန်လုံး ရှာမယ်။ Binary file တွေချန်ထားမယ်
          find . -type f \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./.vscode/*" \
            -not -path "./dist/*" \
            -not -path "./build/*" \
            -not -name "*.png" \
            -not -name "*.jpg" \
            -not -name "*.jpeg" \
            -not -name "*.gif" \
            -not -name "*.webp" \
            -not -name "*.ico" \
            -not -name "*.mp4" \
            -not -name "*.zip" \
            -print0 | while IFS= read -r -d '' file; do
            
            echo "Scanning: $file"
            
            # S4ITMM Family
            sed -i 's/S4ITMM TV/BFA STREAM/g' "$file"
            sed -i 's/S4ITMMTV/BFA STREAM/g' "$file"
            sed -i 's/S4ITMM/BFA STREAM/g' "$file"
            sed -i 's/s4itmm tv/BFA STREAM/gi' "$file"
            
            # FOTMOV Family
            sed -i 's/FOTMOV PREMIUM/BFA STREAM PREMIUM/g' "$file"
            sed -i 's/FOTMOV TV PRO/BFA STREAM PRO/g' "$file"
            sed -i 's/FOTMOV TV/BFA STREAM/g' "$file"
            sed -i 's/FOTMOVTV/BFA STREAM/g' "$file"
            sed -i 's/FOTMOV/BFA STREAM/g' "$file"
            sed -i 's/fotmov/BFA STREAM/gi' "$file"
            
          done
          
          echo "All files processed!"

      - name: Show changed files
        run: |
          git status
          git diff --stat

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: rebrand S4ITMM/FOTMOV to BFA STREAM in all files" && git push)
