<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android TV Box - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c2461 0%, #1e3799 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .header {
            background: rgba(22, 33, 62, 0.95);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00a8ff;
        }
        
        .user-info {
            text-align: right;
        }
        
        .user-name {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .main-content {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .welcome-section h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #00a8ff;
        }
        
        .welcome-section p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .channel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 168, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .channel-card:focus {
            outline: 3px solid #00a8ff;
            outline-offset: 2px;
        }
        
        .channel-img {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .channel-info {
            padding: 15px;
        }
        
        .channel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .channel-desc {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .tv-guide {
            background: rgba(22, 33, 62, 0.9);
            border-radius: 15px;
            padding: 20px;
            margin-top: 40px;
        }
        
        .tv-guide h2 {
            color: #00a8ff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #00a8ff;
        }
        
        .guide-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .guide-item:last-child {
            border-bottom: none;
        }
        
        .guide-time {
            font-weight: bold;
            color: #00a8ff;
        }
        
        .guide-program {
            flex-grow: 1;
            margin-left: 20px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 14px;
            opacity: 0.7;
        }
        
        .tv-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            background: rgba(0, 168, 255, 0.8);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(0, 168, 255, 1);
            transform: scale(1.1);
        }
        
        @media (max-width: 768px) {
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📺 ANDROID TV BOX</div>
        <div class="user-info">
            <div class="user-name" id="displayUserName">User</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="welcome-section">
            <h1 id="welcomeTitle">Welcome to Your TV Box!</h1>
            <p>Your subscription is active. Enjoy unlimited access to all channels.</p>
            <p id="expiryDate">Expires: Loading...</p>
        </div>
        
        <div class="channels-grid" id="channelsGrid">
            <!-- Channels will be loaded here -->
        </div>
        
        <div class="tv-guide">
            <h2>📅 Today's TV Guide</h2>
            <div id="tvGuideContent">
                <!-- TV Guide will be loaded here -->
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>Android TV Box © 2024 | All rights reserved</p>
        <p>For support: support@tvbox.com | Phone: +1-234-567-8900</p>
    </div>
    
    <div class="tv-controls">
        <button class="control-btn" onclick="goBack()">←</button>
        <button class="control-btn" onclick="goHome()">⌂</button>
        <button class="control-btn" onclick="refresh()">↻</button>
    </div>

    <script>
        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthentication();
            loadUserInfo();
            loadChannels();
            loadTVGuide();
            setupKeyboardNavigation();
        });
        
        function checkAuthentication() {
            const savedData = localStorage.getItem('tvbox_approved');
            
            if (!savedData) {
                redirectToLogin();
                return;
            }
            
            const { approved, expires } = JSON.parse(savedData);
            const now = new Date().getTime();
            
            if (!approved || expires < now) {
                redirectToLogin();
            }
        }
        
        function loadUserInfo() {
            const savedData = localStorage.getItem('tvbox_approved');
            
            if (savedData) {
                const { userName, expires } = JSON.parse(savedData);
                
                // Display user name
                if (userName) {
                    document.getElementById('displayUserName').textContent = userName;
                    document.getElementById('welcomeTitle').textContent = `Welcome ${userName}!`;
                }
                
                // Display expiry date
                const expiryDate = new Date(expires);
                const formattedDate = expiryDate.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('expiryDate').textContent = `Subscription expires: ${formattedDate}`;
            }
        }
        
        function loadChannels() {
            const channels = [
                { id: 1, name: "Movies HD", icon: "🎬", desc: "Latest Hollywood movies" },
                { id: 2, name: "Sports Live", icon: "⚽", desc: "Live sports events" },
                { id: 3, name: "Kids Zone", icon: "🧸", desc: "Cartoons & kids shows" },
                { id: 4, name: "News 24/7", icon: "📰", desc: "Breaking news worldwide" },
                { id: 5, name: "Music Hits", icon: "🎵", desc: "Top music videos" },
                { id: 6, name: "Documentary", icon: "🌍", desc: "Nature & science docs" },
                { id: 7, name: "Drama Series", icon: "🎭", desc: "Popular TV series" },
                { id: 8, name: "Comedy Central", icon: "😂", desc: "Stand-up & sitcoms" },
                { id: 9, name: "Educational", icon: "📚", desc: "Learning programs" },
                { id: 10, name: "Local Channels", icon: "🏠", desc: "Regional content" },
                { id: 11, name: "Action Movies", icon: "💥", desc: "Thriller & action" },
                { id: 12, name: "Cooking Show", icon: "👨‍🍳", desc: "Food & recipes" }
            ];
            
            const channelsGrid = document.getElementById('channelsGrid');
            channelsGrid.innerHTML = '';
            
            channels.forEach(channel => {
                const channelCard = document.createElement('div');
                channelCard.className = 'channel-card';
                channelCard.tabIndex = 0;
                
                channelCard.innerHTML = `
                    <div class="channel-img">${channel.icon}</div>
                    <div class="channel-info">
                        <div class="channel-title">${channel.name}</div>
                        <div class="channel-desc">${channel.desc}</div>
                    </div>
                `;
                
                channelCard.addEventListener('click', () => selectChannel(channel));
                channelCard.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        selectChannel(channel);
                    }
                });
                
                channelsGrid.appendChild(channelCard);
            });
        }
        
        function loadTVGuide() {
            const guideItems = [
                { time: "18:00", program: "Evening News" },
                { time: "19:00", program: "Prime Time Movie: The Adventure" },
                { time: "21:00", program: "Sports Highlights" },
                { time: "22:00", program: "Talk Show Live" },
                { time: "23:00", program: "Late Night Comedy" }
            ];
            
            const guideContent = document.getElementById('tvGuideContent');
            guideContent.innerHTML = '';
            
            guideItems.forEach(item => {
                const guideItem = document.createElement('div');
                guideItem.className = 'guide-item';
                guideItem.innerHTML = `
                    <div class="guide-time">${item.time}</div>
                    <div class="guide-program">${item.program}</div>
                `;
                guideContent.appendChild(guideItem);
            });
        }
        
        function selectChannel(channel) {
            alert(`Now playing: ${channel.name}\n${channel.desc}`);
            // In real implementation, you would load the channel stream here
        }
        
        function logout() {
            // Clear authentication data
            localStorage.removeItem('tvbox_approved');
            redirectToLogin();
        }
        
        function redirectToLogin() {
            window.location.href = 'index.html';
        }
        
        function goBack() {
            window.history.back();
        }
        
        function goHome() {
            window.location.href = 'home.html';
        }
        
        function refresh() {
            window.location.reload();
        }
        
        function setupKeyboardNavigation() {
            // TV remote navigation support
            document.addEventListener('keydown', function(e) {
                // Ctrl+L to logout
                if (e.ctrlKey && e.key === 'l') {
                    logout();
                }
                
                // F1 for help
                if (e.key === 'F1') {
                    e.preventDefault();
                    alert('Android TV Box Help:\n\nNavigation: Arrow Keys\nSelect: Enter\nBack: Escape\nRefresh: F5\nLogout: Ctrl+L');
                }
            });
        }
        
        // Auto-logout after 24 hours (security feature)
        setTimeout(() => {
            const savedData = localStorage.getItem('tvbox_approved');
            if (savedData) {
                const { approved, expires } = JSON.parse(savedData);
                const now = new Date().getTime();
                
                if (expires < now) {
                    logout();
                }
            }
        }, 24 * 60 * 60 * 1000); // 24 hours
    </script>
</body>
  </html>
