<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Fotlivemovies - Movie Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --primary-red: #ef4444;
      --accent-blue: #3b82f6;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: #f1f5f9;
      min-height: 100vh;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      background: rgba(0,0,0,0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      z-index: 100;
    }

    /* --- Built-in Player Section --- */
    .player-wrapper {
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      display: none; /* စဖွင့်ချင်း ဖျောက်ထားမည် */
      position: relative;
    }
    
    video {
      width: 100%;
      height: 100%;
      outline: none;
    }

    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 30px;
    }

    .poster-side img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    .info-side {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .movie-title {
      font-size: clamp(24px, 5vw, 40px);
      margin: 0;
      font-weight: 900;
    }

    .movie-meta {
      color: #94a3b8;
      font-size: 18px;
    }

    .description-box {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      color: #cbd5e1;
    }

    /* --- Action Buttons --- */
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: 0.3s;
      color: white;
    }

    .play-now { background: var(--accent-blue); }
    .mx-play { background: var(--primary-red); }
    
    .btn:active { transform: scale(0.95); }

    .instruction {
      margin-top: 20px;
      padding: 15px;
      background: rgba(59, 130, 246, 0.1);
      border-left: 4px solid var(--accent-blue);
      border-radius: 8px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; text-align: center; margin-top: 20px; }
      .poster-side img { max-width: 220px; }
      .btn-group { justify-content: center; }
      .info-side { align-items: center; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

  <div id="playerSection" class="player-wrapper">
    <video id="mainVideoPlayer" controls playsinline poster="">
      <source src="" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="container" id="detail-view">
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('selectedMovie');
      const container = document.getElementById('detail-view');
      const playerSection = document.getElementById('playerSection');
      const videoPlayer = document.getElementById('mainVideoPlayer');

      if (!stored) {
        container.innerHTML = `<p style="text-align:center; width:100%;">No movie selected.</p>`;
        return;
      }

      const movie = JSON.parse(stored);
      const desc = movie.description || "ဒီဇာတ်ကားကို Fotlivemovies မှာ အခုပဲ ကြည့်ရှုလိုက်ပါ။ အရည်အသွေးအကြည်ဖြင့် အခမဲ့ တင်ဆက်ထားပါသည်။";

      container.innerHTML = `
        <div class="poster-side">
          <img src="${movie.logo || 'https://via.placeholder.com/300x450'}" alt="Poster">
        </div>
        <div class="info-side">
          <h1 class="movie-title">${movie.title}</h1>
          <div class="movie-meta">${movie.year || '2026'} | ${movie.category || 'Movie'}</div>
          
          <div class="description-box">
            <strong>ဇာတ်လမ်းအညွှန်း</strong><br><br>
            ${desc}
          </div>

          <div class="btn-group">
            <button id="inAppBtn" class="btn play-now">
              <i class="fas fa-play-circle"></i> In-App Player
            </button>
            <button id="mxPlayBtn" class="btn mx-play">
              <i class="fas fa-external-link-alt"></i> MX Player
            </button>
          </div>

          <div class="instruction">
            <i class="fas fa-info-circle"></i> 
            <b>လမ်းညွှန်:</b> Browser ထဲမှာတင် တိုက်ရိုက်ကြည့်ရန် <b>In-App Player</b> ကိုနှိပ်ပါ။ ပိုမိုမြန်ဆန်သွက်လက်စေရန် Android ဖုန်းများတွင် <b>MX Player</b> ဖြင့် ကြည့်ရှုနိုင်ပါသည်။
          </div>
        </div>
      `;

      // --- ၁။ Built-in Player ဖြင့် ကြည့်ရန် ---
      document.getElementById('inAppBtn').onclick = () => {
        videoPlayer.src = movie.url;
        playerSection.style.display = 'block';
        videoPlayer.play();
        // Player ဆီသို့ Scroll ဆွဲသွားမည်
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // --- ၂။ External MX Player ဖြင့် ကြည့်ရန် ---
      document.getElementById('mxPlayBtn').onclick = () => {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const videoUrl = movie.url;

        if (/android/i.test(userAgent)) {
          const mxIntent = `intent:${videoUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(movie.title)};end`;
          window.location.href = mxIntent;
          
          setTimeout(() => {
             if (!document.hidden) {
                window.location.href = "https://play.google.com/store/apps/details?id=com.mxtech.videoplayer.ad";
             }
          }, 1500);
        } else {
          // PC သို့မဟုတ် iOS ဆိုလျှင် tab အသစ်မှာ တိုက်ရိုက်ဖွင့်ပေးမည်
          window.open(videoUrl, '_blank');
        }
      };
    });
  </script>
</body>
</html>
