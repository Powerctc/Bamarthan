<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Fotlivemovies - Movie Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --primary-red: #ef4444;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Back Button --- */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      background: rgba(0,0,0,0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      z-index: 10;
    }

    /* --- Layout Container --- */
    .container {
      max-width: 1000px;
      margin: 60px auto 20px;
      padding: 20px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 30px;
    }

    .poster-side img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    .info-side {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .movie-title {
      font-size: clamp(24px, 5vw, 40px);
      margin: 0;
      font-weight: 900;
    }

    .movie-meta {
      color: #94a3b8;
      font-size: 18px;
    }

    .description-box {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      color: #cbd5e1;
    }

    /* --- Action Buttons --- */
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .play-btn {
      background: var(--primary-red);
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .play-btn:active { transform: scale(0.95); }

    /* --- Instruction Tip --- */
    .instruction {
      margin-top: 20px;
      padding: 15px;
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid var(--primary-red);
      border-radius: 8px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; text-align: center; margin-top: 40px; }
      .poster-side img { max-width: 240px; }
      .btn-group { justify-content: center; }
      .info-side { align-items: center; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

  <div class="container" id="detail-view">
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('selectedMovie');
      const container = document.getElementById('detail-view');

      if (!stored) {
        container.innerHTML = `<p style="text-align:center; width:100%;">No movie selected.</p>`;
        return;
      }

      const movie = JSON.parse(stored);
      
      // အညွှန်းစာသား (Description) မပါလာခဲ့ရင် သုံးဖို့ default စာသား
      const desc = movie.description || "ဒီဇာတ်ကားကို Fotlivemovies မှာ အခုပဲ ကြည့်ရှုလိုက်ပါ။ အရည်အသွေးအကြည်ဖြင့် အခမဲ့ တင်ဆက်ထားပါသည်။";

      container.innerHTML = `
        <div class="poster-side">
          <img src="${movie.logo || 'https://via.placeholder.com/300x450'}" alt="Poster">
        </div>
        <div class="info-side">
          <h1 class="movie-title">${movie.title}</h1>
          <div class="movie-meta">${movie.year || '2026'} | ${movie.category || 'Movie'}</div>
          
          <div class="description-box">
            <strong>ဇာတ်လမ်းအညွှန်း</strong><br><br>
            ${desc}
          </div>

          <div class="btn-group">
            <button id="mainPlayBtn" class="play-btn">
              <i class="fas fa-play"></i> Watch Now
            </button>
          </div>

          <div class="instruction">
            <i class="fas fa-info-circle"></i> 
            <b>သတိပြုရန်:</b> Android ဖုန်းများတွင် အကောင်းဆုံးကြည့်ရှုနိုင်ရန် <b>MX Player</b> ကို ဖုန်းထဲမှာ ကြိုတင် Install လုပ်ထားပေးပါ။ Computer နှင့် iOS များတွင် Browser မှ တိုက်ရိုက် ကြည့်ရှုနိုင်ပါသည်။
          </div>
        </div>
      `;

      document.getElementById('mainPlayBtn').onclick = () => {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const videoUrl = movie.url;

        // 1. Android - MX Player Logic
        if (/android/i.test(userAgent)) {
          // MX Player Intent (Free & Pro version supports)
          const mxIntent = `intent:${videoUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(movie.title)};end`;
          window.location.href = mxIntent;
          
          // အကယ်၍ MX player မရှိရင် 1.5 စက္ကန့်နေရင် Play Store ပို့မယ်
          setTimeout(() => {
             if (!document.hidden) {
                window.location.href = "https://play.google.com/store/apps/details?id=com.mxtech.videoplayer.ad";
             }
          }, 1500);
        } 
        // 2. iOS or Computer - Direct Web View
        else {
          // Browser မှာ တိုက်ရိုက်ကြည့်လို့ရအောင် Video Player page တစ်ခုသို့ ပို့ပေးခြင်း
          // ဒါမှမဟုတ် video link ကို တိုက်ရိုက်ဖွင့်ခြင်း
          window.open(videoUrl, '_blank');
        }
      };
    });
  </script>
</body>
</html>
