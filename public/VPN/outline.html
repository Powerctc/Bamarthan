<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outline Key Hub Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-black min-h-screen flex items-center justify-center p-4 text-white">

<div class="w-full max-w-xl bg-slate-900/70 backdrop-blur-xl border border-slate-700 rounded-3xl shadow-2xl overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-center">
    <h1 class="text-2xl font-bold">🔐 Outline Key Hub</h1>
    <p class="text-sm text-blue-100 mt-1">Auto & Manual Generator</p>
</div>

<!-- TABS -->
<div class="flex border-b border-slate-700 text-sm font-semibold">
    <button onclick="showAuto()" id="autoBtn" class="flex-1 py-3 bg-blue-600">Auto Fetch</button>
    <button onclick="showManual()" id="manualBtn" class="flex-1 py-3 bg-slate-800">Manual Gen</button>
</div>

<div class="p-6 space-y-4">

<!-- AUTO SECTION -->
<div id="autoSection">
    <button onclick="fetchKeys()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">
        Load Servers
    </button>

    <div id="serverList" class="mt-4 space-y-2 max-h-48 overflow-y-auto"></div>
</div>

<!-- MANUAL SECTION -->
<div id="manualSection" class="hidden space-y-3">

    <input id="ip" type="text" placeholder="Server IP"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none">

    <input id="port" type="number" placeholder="Port"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none">

    <input id="password" type="text" placeholder="Password"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none">

    <select id="method"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none">
        <option value="chacha20-ietf-poly1305">ChaCha20</option>
        <option value="aes-256-gcm">AES-256-GCM</option>
        <option value="aes-128-gcm">AES-128-GCM</option>
    </select>

    <button onclick="generateKey()"
        class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold transition">
        Generate Key
    </button>
</div>

<!-- RESULT -->
<textarea id="result" readonly
    class="w-full bg-black/60 border border-slate-700 rounded-xl p-3 text-xs font-mono h-24 resize-none"></textarea>

<div class="grid grid-cols-2 gap-3">
    <button onclick="copyKey()"
        class="bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold transition">
        Copy
    </button>

    <button onclick="openOutline()"
        class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">
        Add to Outline
    </button>
</div>

</div>

<div class="bg-slate-900 text-center text-xs text-slate-500 py-3 border-t border-slate-700">
    v3.0 Tailwind Edition
</div>

</div>

<script>

const source = 'https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/list.yml';

function showAuto(){
    autoSection.classList.remove("hidden");
    manualSection.classList.add("hidden");
    autoBtn.classList.add("bg-blue-600");
    autoBtn.classList.remove("bg-slate-800");
    manualBtn.classList.add("bg-slate-800");
    manualBtn.classList.remove("bg-blue-600");
}

function showManual(){
    manualSection.classList.remove("hidden");
    autoSection.classList.add("hidden");
    manualBtn.classList.add("bg-blue-600");
    manualBtn.classList.remove("bg-slate-800");
    autoBtn.classList.add("bg-slate-800");
    autoBtn.classList.remove("bg-blue-600");
}

async function fetchKeys(){
    serverList.innerHTML="Loading...";

    try{
        const res = await fetch(source);
        const text = await res.text();
        const regex = /ss:\/\/[A-Za-z0-9+\/%=:@._-]+/g;
        const matches = text.match(regex) || [];

        serverList.innerHTML="";

        matches.slice(0,15).forEach((k,i)=>{
            const div=document.createElement("div");
            div.className="bg-slate-800 p-3 rounded-xl cursor-pointer hover:bg-blue-600 transition text-sm";
            div.innerText="Server "+(i+1);
            div.onclick=()=>showResult(k);
            serverList.appendChild(div);
        });

        if(matches.length===0){
            serverList.innerHTML="No servers found.";
        }

    }catch{
        serverList.innerHTML="Failed to load.";
    }
}

function safeBase64(str){
    return btoa(unescape(encodeURIComponent(str)));
}

function generateKey(){
    const ip=document.getElementById("ip").value.trim();
    const port=document.getElementById("port").value.trim();
    const pass=document.getElementById("password").value.trim();
    const method=document.getElementById("method").value;

    if(!ip||!port||!pass){
        alert("Fill all fields!");
        return;
    }

    const encoded=safeBase64(method+":"+pass);
    const key=`ss://${encoded}@${ip}:${port}/?outline=1#Manual`;

    showResult(key);
}

function showResult(key){
    result.value=key;
}

function copyKey(){
    result.select();
    document.execCommand("copy");
    alert("Copied!");
}

function openOutline(){
    if(!result.value){
        alert("No key generated!");
        return;
    }
    window.location.href="outline://install#"+encodeURIComponent(result.value);
}

</script>

</body>
    </html>
