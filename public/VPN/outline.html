<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline VPN Key Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }
        
        .key-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .key-item:hover {
            border-left-color: #3b82f6;
            transform: translateX(5px);
            background: rgba(59, 130, 246, 0.1);
        }
        
        .status-dot {
            animation: pulse 2s infinite;
        }
                @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }
        
        .tab-inactive {
            color: #94a3b8;
            border-bottom: 2px solid transparent;
        }
        
        .tab-inactive:hover {
            color: #e2e8f0;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                <i class="fas fa-shield-alt mr-3 text-blue-400"></i>Outline VPN Hub
            </h1>
            <p class="text-slate-400">Auto & Manual Access Key Generator</p>
        </div>

        <!-- Main Card -->
        <div class="glass-card rounded-3xl p-6 md:p-8">
            
            <!-- Tabs -->
            <div class="flex space-x-6 mb-8 border-b border-slate-700">
                <button onclick="switchTab('auto')" id="tab-auto" class="tab-active pb-3 px-4 font-semibold transition flex items-center">
                    <i class="fas fa-bolt mr-2"></i>Auto Fetch
                </button>                <button onclick="switchTab('manual')" id="tab-manual" class="tab-inactive pb-3 px-4 font-semibold transition flex items-center">
                    <i class="fas fa-cog mr-2"></i>Manual Generator
                </button>
                <button onclick="switchTab('test')" id="tab-test" class="tab-inactive pb-3 px-4 font-semibold transition flex items-center">
                    <i class="fas fa-check-circle mr-2"></i>Test Connection
                </button>
            </div>

            <!-- Auto Fetch Section -->
            <div id="section-auto" class="space-y-6">
                <div class="flex flex-wrap justify-between items-center gap-4">
                    <div class="flex items-center space-x-2 text-sm text-slate-400">
                        <div class="w-2 h-2 rounded-full bg-green-500 status-dot"></div>
                        <span>Live Server List</span>
                    </div>
                    <button onclick="fetchKeys()" class="btn-primary text-white px-6 py-2 rounded-full font-semibold text-sm">
                        <i class="fas fa-sync-alt mr-2" id="refresh-icon"></i>Refresh Keys
                    </button>
                </div>

                <!-- Source Selection -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <button onclick="selectSource(0)" class="source-btn active bg-blue-600/20 border border-blue-500 text-blue-400 px-4 py-3 rounded-xl text-sm font-medium transition">
                        <i class="fab fa-github mr-2"></i>GitHub List
                    </button>
                    <button onclick="selectSource(1)" class="source-btn bg-slate-700/50 border border-slate-600 text-slate-300 px-4 py-3 rounded-xl text-sm font-medium transition">
                        <i class="fas fa-list mr-2"></i>Public Nodes
                    </button>
                    <button onclick="selectSource(2)" class="source-btn bg-slate-700/50 border border-slate-600 text-slate-300 px-4 py-3 rounded-xl text-sm font-medium transition">
                        <i class="fas fa-cloud mr-2"></i>Cloud Config
                    </button>
                </div>

                <!-- Key List -->
                <div id="key-list" class="space-y-3 max-h-96 overflow-y-auto pr-2">
                    <div class="text-center py-12 text-slate-500">
                        <i class="fas fa-arrow-down text-4xl mb-3 opacity-50"></i>
                        <p>Click "Refresh Keys" to load servers</p>
                    </div>
                </div>

                <!-- Stats -->
                <div id="stats" class="hidden grid grid-cols-3 gap-4 text-center">
                    <div class="bg-slate-800/50 rounded-xl p-3">
                        <div class="text-2xl font-bold text-blue-400" id="stat-total">0</div>
                        <div class="text-xs text-slate-400">Total Keys</div>
                    </div>
                    <div class="bg-slate-800/50 rounded-xl p-3">
                        <div class="text-2xl font-bold text-green-400" id="stat-valid">0</div>
                        <div class="text-xs text-slate-400">Valid</div>                    </div>
                    <div class="bg-slate-800/50 rounded-xl p-3">
                        <div class="text-2xl font-bold text-purple-400" id="stat-active">0</div>
                        <div class="text-xs text-slate-400">Active Now</div>
                    </div>
                </div>
            </div>

            <!-- Manual Generator Section -->
            <div id="section-manual" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Server IP / Hostname</label>
                        <input type="text" id="manual-ip" placeholder="192.168.1.1 or example.com" 
                            class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Port</label>
                        <input type="number" id="manual-port" placeholder="8080" 
                            class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Encryption Method</label>
                    <select id="manual-method" class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition">
                        <option value="chacha20-ietf-poly1305">ChaCha20-IETF-Poly1305 (Recommended)</option>
                        <option value="aes-256-gcm">AES-256-GCM</option>
                        <option value="aes-128-gcm">AES-128-GCM</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
                    <div class="relative">
                        <input type="text" id="manual-password" placeholder="Enter strong password" 
                            class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 pr-12 focus:outline-none focus:border-blue-500 transition">
                        <button onclick="generatePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-400 transition">
                            <i class="fas fa-random"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Server Name (Optional)</label>
                    <input type="text" id="manual-name" placeholder="My Server" 
                        class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition">
                </div>

                <button onclick="generateManualKey()" class="w-full btn-primary text-white py-4 rounded-xl font-bold text-lg">                    <i class="fas fa-key mr-2"></i>Generate Access Key
                </button>
            </div>

            <!-- Test Connection Section -->
            <div id="section-test" class="hidden space-y-6">
                <div class="bg-slate-800/50 rounded-xl p-6 text-center">
                    <i class="fas fa-network-wired text-5xl text-blue-400 mb-4"></i>
                    <h3 class="text-xl font-bold mb-2">Connection Test</h3>
                    <p class="text-slate-400 mb-4">Test your VPN connection status</p>
                    <button onclick="testConnection()" class="btn-primary text-white px-8 py-3 rounded-full font-semibold">
                        <i class="fas fa-play mr-2"></i>Start Test
                    </button>
                </div>
                <div id="test-result" class="hidden bg-slate-800/50 rounded-xl p-4">
                    <!-- Test results will appear here -->
                </div>
            </div>

            <!-- Result Display -->
            <div id="result-box" class="hidden mt-8 bg-gradient-to-br from-blue-900/30 to-purple-900/30 border border-blue-500/30 rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-blue-400">
                        <i class="fas fa-check-circle mr-2"></i>Access Key Generated
                    </h3>
                    <button onclick="closeResult()" class="text-slate-400 hover:text-white">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div class="bg-slate-900/80 rounded-xl p-4 mb-4 relative">
                    <textarea id="final-key" readonly 
                        class="w-full bg-transparent text-sm text-slate-300 h-32 resize-none focus:outline-none font-mono break-all"></textarea>
                    <button onclick="copyKey()" class="absolute top-2 right-2 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-lg text-xs font-semibold transition">
                        <i class="fas fa-copy mr-1"></i>Copy
                    </button>
                </div>

                <div class="flex space-x-3">
                    <button onclick="addToOutline()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold transition">
                        <i class="fas fa-plus mr-2"></i>Add to Outline
                    </button>
                    <button onclick="shareKey()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold transition">
                        <i class="fas fa-share-alt mr-2"></i>Share
                    </button>
                </div>
            </div>

        </div>
        <!-- Footer -->
        <div class="text-center mt-8 text-slate-500 text-sm">
            <p>© 2026 Outline VPN Hub • For Educational Purpose Only</p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <i class="fas fa-check-circle mr-2"></i><span id="toast-message">Success</span>
    </div>

    <script>
        // Global variables
        let currentSource = 0;
        let fetchedKeys = [];
        
        const sources = [
            {
                name: 'GitHub List',
                url: 'https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/list.yml',
                type: 'yaml'
            },
            {
                name: 'Public Nodes',
                url: 'https://raw.githubusercontent.com/a2470982985/getNode/main/clash.yaml',
                type: 'yaml'
            },
            {
                name: 'Cloud Config',
                url: 'https://raw.githubusercontent.com/mlabalabala/v2ray-node/main/nodefree4clash.txt',
                type: 'text'
            }
        ];

        // Tab switching
        function switchTab(tab) {
            ['auto', 'manual', 'test'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
                document.getElementById(`tab-${t}`).classList.add('tab-inactive');
            });
            
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.remove('tab-inactive');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        // Source selection
        function selectSource(index) {
            currentSource = index;            document.querySelectorAll('.source-btn').forEach((btn, i) => {
                if (i === index) {
                    btn.classList.remove('bg-slate-700/50', 'border-slate-600', 'text-slate-300');
                    btn.classList.add('bg-blue-600/20', 'border-blue-500', 'text-blue-400');
                } else {
                    btn.classList.add('bg-slate-700/50', 'border-slate-600', 'text-slate-300');
                    btn.classList.remove('bg-blue-600/20', 'border-blue-500', 'text-blue-400');
                }
            });
            fetchKeys();
        }

        // Fetch keys from source
        async function fetchKeys() {
            const listContainer = document.getElementById('key-list');
            const refreshIcon = document.getElementById('refresh-icon');
            
            refreshIcon.classList.add('fa-spin');
            listContainer.innerHTML = `
                <div class="space-y-3">
                    ${Array(5).fill(0).map(() => `
                        <div class="loading-shimmer h-16 rounded-xl"></div>
                    `).join('')}
                </div>
            `;

            try {
                const response = await fetch(sources[currentSource].url);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const data = await response.text();
                const keys = parseKeys(data);
                
                if (keys.length === 0) {
                    listContainer.innerHTML = `
                        <div class="text-center py-12 text-yellow-400">
                            <i class="fas fa-exclamation-triangle text-4xl mb-3"></i>
                            <p>No valid keys found. Try another source.</p>
                        </div>
                    `;
                    return;
                }

                fetchedKeys = keys;
                displayKeys(keys);
                updateStats(keys);
                
            } catch (error) {
                console.error('Fetch error:', error);
                listContainer.innerHTML = `                    <div class="text-center py-12 text-red-400">
                        <i class="fas fa-times-circle text-4xl mb-3"></i>
                        <p>Error fetching keys. Check your internet connection.</p>
                        <button onclick="fetchKeys()" class="mt-4 text-blue-400 hover:underline">Retry</button>
                    </div>
                `;
            } finally {
                refreshIcon.classList.remove('fa-spin');
            }
        }

        // Parse keys from different formats
        function parseKeys(data) {
            const keys = [];
            
            // Try to extract ss:// links
            const ssLinks = data.match(/ss:\/\/[^\s"']+/g) || [];
            
            ssLinks.forEach((link, index) => {
                try {
                    const cleanedKey = validateAndFormatKey(link.trim());
                    if (cleanedKey) {
                        keys.push({
                            key: cleanedKey,
                            index: index + 1
                        });
                    }
                } catch (e) {
                    console.error('Invalid key:', e);
                }
            });

            return keys.slice(0, 20); // Limit to 20 keys
        }

        // Validate and format key for Outline
        function validateAndFormatKey(key) {
            try {
                // Remove any trailing characters
                key = key.split(' ')[0].trim();
                
                // Check if it starts with ss://
                if (!key.startsWith('ss://')) return null;
                
                // Extract the base64 part
                const match = key.match(/ss:\/\/([A-Za-z0-9+/=]+)@(.+)/);
                if (!match) return null;
                
                // Ensure it has outline=1 parameter
                if (!key.includes('outline=1')) {                    if (key.includes('?')) {
                        key = key.replace('?', '/?outline=1&');
                    } else {
                        key += '/?outline=1';
                    }
                }
                
                // Add server name if missing
                if (!key.includes('#')) {
                    key += `#Server-${Math.floor(Math.random() * 1000)}`;
                }
                
                return key;
            } catch (e) {
                return null;
            }
        }

        
// Display keys in list
        function displayKeys(keys) {
            const listContainer = document.getElementById('key-list');
            listContainer.innerHTML = '';

            keys.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'key-item bg-slate-800/30 border border-slate-700 rounded-xl p-4 cursor-pointer';
                div.onclick = () => showKey(item.key);
                
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center font-bold text-white">
                                ${index + 1}
                            </div>
                            <div>
                                <div class="font-semibold text-slate-200">Server ${item.index}</div>
                                <div class="text-xs text-slate-400">Shadowsocks Config</div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-xs font-semibold">
                                <i class="fas fa-check mr-1"></i>Valid
                            </span>
                            <i class="fas fa-chevron-right text-slate-500"></i>
                        </div>
                    </div>
                `;
                
                listContainer.appendChild(div);
            });
        }

        // Update statistics
        function updateStats(keys) {
            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('stat-total').textContent = keys.length;
            document.getElementById('stat-valid').textContent = keys.filter(k => k.key.includes('outline=1')).length;
            document.getElementById('stat-active').textContent = Math.floor(keys.length * 0.8);
        }

        // Generate manual key
        function generateManualKey() {
            const ip = document.getElementById('manual-ip').value.trim();
            const port = document.getElementById('manual-port').value.trim();
            const method = document.getElementById('manual-method').value;
            const password = document.getElementById('manual-password').value;
            const name = document.getElementById('manual-name').value.trim() || 'ManualServer';

            if (!ip || !port || !password) {
                showToast('Please fill all required fields', 'error');
                return;
            }

            // Create base64 encoded auth
            const auth = `${method}:${password}`;
            const base64Auth = btoa(unescape(encodeURIComponent(auth)));
            
            const key = `ss://${base64Auth}@${ip}:${port}/?outline=1#${encodeURIComponent(name)}`;
            
            showKey(key);
            showToast('Key generated successfully!');
        }

        // Generate random password
        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let password = '';
            for (let i = 0; i < 16; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('manual-password').value = password;
            showToast('Random password generated');
        }

        // Show key in result box
        function showKey(key) {
            document.getElementById('final-key').value = key;
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Close result box
        function closeResult() {
            document.getElementById('result-box').classList.add('hidden');
        }

        // Copy key to clipboard
        async function copyKey() {
            const key = document.getElementById('final-key').value;
            
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(key);
                } else {
                    const textArea = document.getElementById('final-key');
                    textArea.select();
                    document.execCommand('copy');
                }
                showToast('Key copied to clipboard!');
            } catch (err) {
                showToast('Failed to copy', 'error');
            }
        }

        // Add to Outline app
        function addToOutline() {
            const key = document.getElementById('final-key').value;
            const outlineUrl = `outline://install#${encodeURIComponent(key)}`;
            
            // Try to open Outline app
            window.location.href = outlineUrl;
            
            setTimeout(() => {
                showToast('If Outline didn\'t open, paste the key manually');
            }, 1000);
        }

        // Share key
        async function shareKey() {
            const key = document.getElementById('final-key').value;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Outline VPN Access Key',
                        text: key
                    });
                } catch (err) {
                    console.log('Share cancelled');
                }
            } else {
                copyKey();
            }
        }

        // Test connection
        async function testConnection() {
            const resultDiv = document.getElementById('test-result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="flex items-center justify-center py-8">
                    <i class="fas fa-spinner fa-spin text-3xl text-blue-400"></i>
                    <span class="ml-3 text-slate-300">Testing connection...</span>
                </div>
            `;

            try {
                // Simple connectivity test
                const startTime = Date.now();
                const response = await fetch('https://www.google.com/favicon.ico', { 
                    method: 'HEAD',
                    mode: 'no-cors',
                    cache: 'no-store'
                });
                const latency = Date.now() - startTime;
                
                resultDiv.innerHTML = `
                    <div class="flex items-center justify-between p-4 bg-green-500/20 border border-green-500/50 rounded-xl">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-check-circle text-3xl text-green-400"></i>
                            <div>
                                <div class="font-bold text-green-400">Connection Active</div>
                                <div class="text-sm text-slate-300">Latency: ${latency}ms</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="flex items-center justify-between p-4 bg-red-500/20 border border-red-500/50 rounded-xl">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-times-circle text-3xl text-red-400"></i>
                            <div>
                                <div class="font-bold text-red-400">Connection Failed</div>
                                <div class="text-sm text-slate-300">Check your VPN settings</div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-xl shadow-2xl transform transition-all duration-300 z-50 ${
                type === 'success' ? 'bg-green-600' : 'bg-red-600'
            } text-white`;
            
            setTimeout(() => {
                toast.classList.remove('translate-y-20', 'opacity-0');
            }, 100);
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Auto-fetch on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                fetchKeys();
            }, 500);
        });
    </script>
</body>
              </html>
