<!DOCTYPE html>

<head>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .ad-color-run {
            padding: 2px; border-radius: 16px;
            background: linear-gradient(270deg, #ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 600% 600%; animation: colorRun 4s linear infinite;
        }
        @keyframes colorRun { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        .ad-color-run img { border-radius: 14px; }
        .ad-color-run button { border-radius: 14px; background: #1e293b; color: white; width: 100%; height: 100%; }

        .match-card {
            border-radius: 24px; padding: 20px;
            border: 1px solid rgba(0,0,0,0.05); margin-bottom: 16px; transition: all 0.3s ease;
        }
        .dark .match-card { background-color: #1a2436; border-color: rgba(255,255,255,0.05); }
        .light .match-card { background-color: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .live-dot {
            width: 8px; height: 8px; background: #ef4444; border-radius: 50%;
            display: inline-block; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .artplayer-app { width: 100%; height: 100%; }
        .play-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; align-items: stretch; }
        .btn-play { 
            padding: 12px 8px; font-size: 10px; font-weight: 800; 
            text-transform: uppercase; display: flex; align-items: center; 
            justify-content: center; gap: 6px; transition: 0.2s;
        }
        .btn-app { border-radius: 16px; background: rgba(250,204,21,0.1); color: #facc15; border: 1px solid rgba(250,204,21,0.2); }
        .btn-app.active { background: #facc15; color: #000; }
        .no-select { user-select: none; }

        /* BamarThan Live button style */
        .btn-bamarthan {
            border-radius: 16px;
            background: rgba(239,68,68,0.12);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-bamarthan.active { background: #ef4444; color: #fff; }

        /* Selection section separator */
        .selection-section {
            border-top: 1px solid rgba(250,204,21,0.15);
            padding-top: 12px;
            margin-top: 4px;
        }
        .selection-label {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #ef4444;
            margin-bottom: 8px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Chat Box Styles */
        .chat-box-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 480px;
            background: white;
            dark:background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            z-index: 80;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .chat-box-container.minimized {
            height: 60px;
            width: 60px;
        }

        .chat-header {
            background: linear-gradient(135deg, #facc15 0%, #f59e0b 100%);
            color: #000;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .chat-header-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header-buttons {
            display: flex;
            gap: 8px;
        }

        .chat-header-btn {
            background: rgba(0,0,0,0.1);
            border: none;
            color: #000;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: 0.2s;
        }

        .chat-header-btn:hover {
            background: rgba(0,0,0,0.2);
        }

        .chat-notice {
            background: #fffbeb;
            color: #92400e;
            padding: 8px 12px;
            font-size: 10px;
            font-weight: 600;
            border-bottom: 1px solid #fef3c7;
            text-align: center;
        }

        .dark .chat-notice {
            background: #451a03;
            color: #fef3c7;
            border-bottom-color: #78350f;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f8f9fa;
            dark:background: #0f172a;
        }

        .dark .chat-messages {
            background: #0f172a;
        }

        .chat-message {
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-message.own {
            display: flex;
            justify-content: flex-end;
        }

        .chat-message-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.4;
            word-wrap: break-word;

        .chat-message.own .chat-message-bubble {
            background: #facc15;
            color: #000;
            border-bottom-right-radius: 4px;

        .chat-message.other .chat-message-bubble {
            background: white;
            color: #000;
            border-bottom-left-radius: 4px;
            border: 1px solid #e5e7eb;
        }

        .dark .chat-message.other .chat-message-bubble {
            background: #1a2436;
            color: #fff;
            border-color: rgba(255,255,255,0.1);
        }

        .chat-message-name {
            font-size: 10px;
            opacity: 0.6;
            margin-bottom: 4px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-user-id-badge {
            font-size: 8px;

        }

        .dark .chat-user-id-badge {
            background: rgba(255,255,255,0.1);
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            background: white;
            dark:background: #1e293b;
            display: flex;
            gap: 8px;
        }

        .dark .chat-input-area {
            background: #1e293b;
            border-top-color: rgba(255,255,255,0.1);
        }

        .chat-input {
            flex: 1;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            background: white;
            color: #000;
            outline: none;
            transition: 0.2s;
        }

        .dark .chat-input {
            background: #0f172a;
            color: #fff;
            border-color: rgba(255,255,255,0.1);
        }

        .chat-input:focus {
            border-color: #facc15;
            box-shadow: 0 0 0 2px rgba(250,204,21,0.1);
        }

        .chat-send-btn {
            background: #facc15;
            border: none;
            color: #000;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            transition: 0.2s;
        }

        .chat-send-btn:hover {
            background: #f59e0b;
            transform: scale(1.05);
        }

        .chat-send-btn:active {
            transform: scale(0.95);
        }

        .chat-toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #facc15 0%, #f59e0b 100%);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(250,204,21,0.3);
            z-index: 75;
            transition: all 0.3s ease;
        }

        .chat-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(250,204,21,0.4);
        }

        .chat-toggle-btn:active {
            transform: scale(0.95);
        }

        .chat-toggle-btn.hidden {
            display: none;
        }

        .chat-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            opacity: 0.5;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }

        .chat-user-badge {
            display: inline-block;
            background: #facc15;
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
            margin-left: 4px;
        }

        .user-info-top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            z-index: 95;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 10px;
            background: #020617;
            color: #facc15;
            border-bottom: 1px solid rgba(250,204,21,0.25);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .user-info-top-bar .user-info-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .user-info-top-bar .user-info-value {
            color: #ffffff;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

    <!-- Chat Toggle Button -->

        <i class="fas fa-comments"></i>
    </button>

    <script>
        const HF_BASE_URL = "https://livesportmm-s4itmmapprover.hf.space";
        const APPROVED_USERS_URL = `${HF_BASE_URL}/Web/approved_users.json`;
        
        let allMatches = [];
        let art = null;
        const PROXY_IMG = "https://wsrv.nl/?url=";
        const VIDEO_PROXY = "https://my-proxy-wt0l.onrender.com/proxy?url=";
        const DEFAULT_LOGO = "https://cdn-icons-png.flaticon.com/512/53/53254.png";
        const BAMARTHAN_PLAYER = "https://m-sport-download.static.hf.space/Xnxxplayer.html?url=";

        // Chat Box Variables
        let chatMessages = [];
        let chatUsers = new Set();
        let isChatMinimized = false;
        let currentUserId = localStorage.getItem('currentUserId') || ("Guest-" + Math.floor(Math.random() * 10000)); // Default ID
        let currentUserExpired = localStorage.getItem('currentUserExpired') || 'N/A';

        function updateUserInfoBar() {
            const idEl = document.getElementById('top-user-id');
            const expiredEl = document.getElementById('top-user-expired');
            if (idEl) idEl.textContent = currentUserId || 'N/A';
            if (expiredEl) expiredEl.textContent = currentUserExpired || 'N/A';
        }

        function findApprovedUserRecord(data, savedPhone) {
            if (!data) return null;

            if (savedPhone && data[savedPhone]) return data[savedPhone];

            const values = Array.isArray(data) ? data : Object.values(data);
            return values.find(user => {
                if (!user || typeof user !== 'object') return false;
                const phone = user.phone || user.Phone || user.mobile || user.msisdn || user.number || user.username;
                const userId = user.userId || user.user_id || user.id || user.uid;
                return (savedPhone && (phone == savedPhone || userId == savedPhone)) || userId == currentUserId;
            }) || null;
        }

        // Fetch User ID and Expired date from Approved Users
        async function fetchUserInfo() {
            updateUserInfoBar();
            try {
                const res = await fetch(APPROVED_USERS_URL + '?_t=' + Date.now());
                const data = await res.json();
                const savedPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || localStorage.getItem('Phone');
                const userRecord = findApprovedUserRecord(data, savedPhone);

                if (userRecord) {
                    currentUserId = userRecord.userId || userRecord.user_id || userRecord.id || userRecord.uid || savedPhone || currentUserId;
                    // FIX: Added 'expires' to the list of keys to check
                    currentUserExpired = userRecord.expires || userRecord.expired || userRecord.expire || userRecord.expiry || userRecord.expires_at || userRecord.expired_at || userRecord.endDate || userRecord.end_date || userRecord.valid_until || 'N/A';
                    localStorage.setItem('currentUserId', currentUserId);
                    localStorage.setItem('currentUserExpired', currentUserExpired);
                } else if (savedPhone) {
                    currentUserId = savedPhone;
                    localStorage.setItem('currentUserId', currentUserId);
                }
            } catch(e) {
                console.log("Error fetching user info:", e);
            }
            updateUserInfoBar();
        }

        // Initialize chat from localStorage
        function initializeChat() {
            const savedMessages = localStorage.getItem('chatMessages');
            const savedUsers = localStorage.getItem('chatUsers');
            
            if (savedMessages) {
                chatMessages = JSON.parse(savedMessages);
            }
            if (savedUsers) {
                chatUsers = new Set(JSON.parse(savedUsers));
            }
            
            renderChatMessages();
        }

        function showChatToggleForDetail() {
            const chatBox = document.getElementById('chat-box');
            const toggleBtn = document.getElementById('chat-toggle-btn');
            chatBox.classList.add('hidden');
            chatBox.classList.remove('minimized');
            toggleBtn.classList.remove('hidden');
            isChatMinimized = false;
        }

        function hideChatCompletely() {
            const chatBox = document.getElementById('chat-box');
            const toggleBtn = document.getElementById('chat-toggle-btn');
            chatBox.classList.add('hidden');
            chatBox.classList.remove('minimized');
            toggleBtn.classList.add('hidden');
            isChatMinimized = false;
        }

        // Toggle Chat Box
        function toggleChatBox() {
            const chatBox = document.getElementById('chat-box');
            const toggleBtn = document.getElementById('chat-toggle-btn');
            
            if (chatBox.classList.contains('hidden')) {
                chatBox.classList.remove('hidden');
                toggleBtn.classList.add('hidden');
                isChatMinimized = false;
                document.getElementById('minimize-icon').innerHTML = '<i class="fas fa-minus"></i>';
            } else {
                chatBox.classList.add('hidden');
                toggleBtn.classList.remove('hidden');
            }
        }

        // Close Chat Box
        function closeChatBox(event) {
            event.stopPropagation();
            document.getElementById('chat-box').classList.add('hidden');
            document.getElementById('chat-toggle-btn').classList.remove('hidden');
        }

        // Minimize/Maximize Chat Box
        function toggleChatBoxMinimize(event) {
            if (event) event.stopPropagation();
            
            const chatBox = document.getElementById('chat-box');
            const minimizeIcon = document.getElementById('minimize-icon');
            
            isChatMinimized = !isChatMinimized;
            
            if (isChatMinimized) {
                chatBox.classList.add('minimized');
                minimizeIcon.innerHTML = '<i class="fas fa-plus"></i>';
            } else {
                chatBox.classList.remove('minimized');
                minimizeIcon.innerHTML = '<i class="fas fa-minus"></i>';
            }
        }

        // Send Chat Message
        function sendChatMessage() {
            const usernameInput = document.getElementById('chat-username');
            const messageInput = document.getElementById('chat-message-input');
            
            const username = usernameInput.value.trim() || 'အမည်မထည့်';
            const message = messageInput.value.trim();
            
            if (!message) return;
            
            const chatMessage = {
                id: Date.now(),
                userId: currentUserId,
                username: username,
                message: message,
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                isOwn: true
            };
            
            chatMessages.push(chatMessage);
            chatUsers.add(username);
            
            // Save to localStorage
            localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
            localStorage.setItem('chatUsers', JSON.stringify(Array.from(chatUsers)));
            
            messageInput.value = '';
            renderChatMessages();
            
            // Auto-scroll to bottom
            setTimeout(() => {
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        // Handle Enter key in message input
        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        // Render Chat Messages
        function renderChatMessages() {
            const messagesContainer = document.getElementById('chat-messages');
            const userCountBadge = document.getElementById('chat-user-count');
            
            userCountBadge.textContent = chatUsers.size;
            
            if (chatMessages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="chat-empty-state">
                        <i class="fas fa-comments" style="font-size: 32px; margin-bottom: 8px;"></i>
                        <p>စကားပြောမည်ဆိုလျှင် အမည်ထည့်သွင်းပြီး စာသားရေးပါ။</p>
                    </div>
                `;
                return;
            }
            
            messagesContainer.innerHTML = chatMessages.map(msg => `
                <div class="chat-message ${msg.isOwn ? 'own' : 'other'}">
                    <div>
                        <div class="chat-message-name" style="${msg.isOwn ? 'justify-content: flex-end;' : ''}">
                            ${!msg.isOwn ? `<span>${escapeHtml(msg.username)}</span>` : ''}
                            <span class="chat-user-id-badge">ID: ${msg.userId || 'N/A'}</span>
                        </div>
                        <div class="chat-message-bubble">
                            ${escapeHtml(msg.message)}
                        </div>
                        <div style="font-size: 9px; opacity: 0.5; margin-top: 2px; ${msg.isOwn ? 'text-right' : 'text-left'}">
                            ${msg.timestamp}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Simulate receiving messages (for demo)
        function simulateIncomingMessage() {
            const sampleNames = ['သူ့အမည်', 'ကျွန်တော်', 'ကျွန်မ', 'အဖ', 'အမ'];
            const sampleMessages = ['ကောင်းလည်း', 'ဟုတ်တယ်', 'ပွဲကောင်းတယ်', 'ဂိုးရလား', 'အရမ်းကောင်း'];
            
            if (Math.random() > 0.7 && chatMessages.length > 0) {
                const randomName = sampleNames[Math.floor(Math.random() * sampleNames.length)];
                const randomMessage = sampleMessages[Math.floor(Math.random() * sampleMessages.length)];
                const randomId = "User-" + Math.floor(Math.random() * 10000);
                
                const incomingMessage = {
                    id: Date.now(),
                    userId: randomId,
                    username: randomName,
                    message: randomMessage,
                    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    isOwn: false
                };
                
                chatMessages.push(incomingMessage);
                chatUsers.add(randomName);
                renderChatMessages();
                
                // Auto-scroll to bottom
                setTimeout(() => {
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 100);
            }
        }

        // Simulate incoming messages periodically
        setInterval(simulateIncomingMessage, 5000);

        let selectionData = [];
        async function fetchSelection() {
            try {
                const res = await fetch('https://livesportmm-bamarthanlive.static.hf.space/selection.json?_t=' + Date.now());
                selectionData = await res.json();
            } catch(e) {
                console.log("Error fetching selection:", e);
            }
        }

        async function fetchMatches() {
            try {
                const res = await fetch('https://livesportmm-bamarthanlive.static.hf.space/matches.json?_t=' + Date.now());
                allMatches = await res.json();
                renderMatches(allMatches);
            } catch(e) {
                console.log("Error fetching matches:", e);
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            if (!matches || matches.length === 0) {
                container.innerHTML = '<div class="text-center py-10 opacity-50">No matches found</div>';
                return;
            }

            container.innerHTML = matches.map((match, index) => `
                <div class="match-card" onclick="showDetail(${index})">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-bold opacity-50 uppercase tracking-wider">${match.league || 'Football Match'}</span>
                        <div class="flex items-center gap-2">
                            <span class="live-dot"></span>
                            <span class="text-[10px] font-black text-red-500 uppercase">Live</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex-1 flex flex-col items-center text-center">
                            <img src="${PROXY_IMG}${match.homeLogo || DEFAULT_LOGO}" class="w-12 h-12 object-contain mb-2">
                            <span class="text-xs font-bold leading-tight">${match.homeName}</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span class="text-2xl font-black text-primary">${match.score || 'VS'}</span>
                            <span class="text-[10px] opacity-50 font-bold mt-1">${match.time || ''}</span>
                        </div>
                        <div class="flex-1 flex flex-col items-center text-center">
                            <img src="${PROXY_IMG}${match.awayLogo || DEFAULT_LOGO}" class="w-12 h-12 object-contain mb-2">
                            <span class="text-xs font-bold leading-tight">${match.awayName}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(index) {
            const match = allMatches[index];
            const detailView = document.getElementById('detail-view');
            const listView = document.getElementById('list-view');
            
            listView.classList.add('hidden');
            detailView.classList.remove('hidden');
            detailView.style.display = 'block';
            
            detailView.innerHTML = `
                <div class="p-4 pt-10">
                    <button onclick="closeDetail()" class="mb-6 text-primary text-xl">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    
                    <div class="match-card mb-6">
                        <div class="flex items-center justify-between gap-4">
                            <div class="flex-1 flex flex-col items-center text-center">
                                <img src="${PROXY_IMG}${match.homeLogo || DEFAULT_LOGO}" class="w-16 h-16 object-contain mb-2">
                                <span class="text-sm font-bold">${match.homeName}</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-3xl font-black text-primary">${match.score || 'VS'}</span>
                            </div>
                            <div class="flex-1 flex flex-col items-center text-center">
                                <img src="${PROXY_IMG}${match.awayLogo || DEFAULT_LOGO}" class="w-16 h-16 object-contain mb-2">
                                <span class="text-sm font-bold">${match.awayName}</span>
                            </div>
                        </div>
                    </div>

                    <div id="player-container" class="aspect-video bg-black rounded-2xl overflow-hidden mb-6 shadow-2xl">
                        <div class="w-full h-full flex items-center justify-center text-primary">
                            <i class="fas fa-play-circle text-5xl opacity-50"></i>
                        </div>
                    </div>

                    <div class="space-y-3">
                        ${(match.links || []).map((link, i) => `
                            <button onclick="playVideo('${link.url}')" class="w-full py-4 bg-darkCard border border-white/5 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-primary hover:text-black transition-all">
                                <i class="fas fa-play"></i>
                                <span>Server ${i + 1} - ${link.name || 'HD'}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            
            showChatToggleForDetail();
        }

        function playVideo(url) {
            const container = document.getElementById('player-container');
            container.innerHTML = '';
            
            art = new Artplayer({
                container: container,
                url: url,
                type: 'm3u8',
                customType: {
                    m3u8: function(video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        }
                    }
                },
                autoSize: true,
                fullscreen: true,
                fullscreenWeb: true,
                setting: true,
                pip: true,
                playbackRate: true,
                aspectRatio: true,
            });
        }

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // Load saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }

        updateUserInfoBar();
        hideChatCompletely();

        // Initialize on page load
        window.addEventListener('load', () => {
            fetchUserInfo();
            fetchMatches();
            initializeChat();
        });

        // Close detail view on back
        function closeDetail() {
            if (art) {
                art.destroy();
                art = null;
            }
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
            hideChatCompletely();
        }
    </script>
</body>
</html>
