    .nav-item:hover:not(.active) {

      color: #1f2937;

      background-color: #ef4444;

    .main-content {

    }

      color: #ef4444;

    }

    .device-info {
      font-size: 13px;

      margin-top: 4px;
      background: #1f2937;
      padding: 6px 10px;
      border-radius: 6px;
      display: inline-block;
    }

    .movie-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-start;
    }

    .movie-col {
      width: calc(50% - 6px);
    }

    @media (min-width: 640px) { .movie-col { width: calc(33.333% - 8px); } }
    @media (min-width: 768px) { .movie-col { width: calc(25% - 9px); } }
    @media (min-width: 1024px) { .movie-col { width: calc(20% - 9.6px); } }
    @media (min-width: 1280px) { .movie-col { width: calc(16.666% - 10px); } }

    .movie-card {
      background-color: #1f2937;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      padding: 8px;
      box-sizing: border-box;
      position: relative;
    }

    .movie-poster {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background-color: #111;
      border-radius: 4px;
    }

    .movie-card .info {
      padding: 10px 6px;
      text-align: center;
    }

    .movie-card .info h3 {
      font-size: 14px;
      font-weight: bold;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-card .info p {
      font-size: 12px;
      color: #9ca3af;
      margin: 0;
    }

    footer {
      background-color: #1f2937;
      text-align: center;
      padding: 14px;
      margin-top: 32px;
      font-size: 14px;
    }

    footer a {
      color: #f87171;
      text-decoration: underline;
    }
  </style>

  <!-- DEVICE ID GENERATOR (NO POPUP, NO APPROVAL CHECK) -->
  <script>
    let deviceID = null;

    function generateDeviceID() {
      try {
        deviceID = localStorage.getItem("s4itmmdeviceid_12");
        if (!deviceID || deviceID.length !== 12) {
          const raw = (navigator.userAgent || "unknown") + (screen.width || 0) + (screen.height || 0) + Date.now();
          let hash = 0;
          for (let i = 0; i < raw.length; i++) {
            hash = (hash << 5) - hash + raw.charCodeAt(i);
          }
          deviceID = Math.abs(hash).toString().padStart(12, "0").slice(0, 12);
          localStorage.setItem("s4itmmdeviceid_12", deviceID);
        }
        return deviceID;
      } catch (e) {
        const raw = "fallback" + Date.now() + Math.random();
        let hash = 0;
        for (let i = 0; i < raw.length; i++) {
          hash = (hash << 5) - hash + raw.charCodeAt(i);
        }
        deviceID = Math.abs(hash).toString().padStart(12, "0").slice(0, 12);
        return deviceID;
      }
    }

    // Set dummy expiry date (e.g., 151 days from now)
    function getExpiryDate() {
      const today = new Date();
      const expiry = new Date(today);
      expiry.setDate(today.getDate() + 151); // 151 days
      return expiry.toISOString().split('T')[0]; // YYYY-MM-DD
    }

    document.addEventListener("DOMContentLoaded", () => {
      const id = generateDeviceID();
      const expiry = getExpiryDate();
      
      // Show on screen
      document.getElementById("device-info").textContent = `Device ID: ${id} | Expires: ${expiry}`;

      // Load movies
      fetchMovies();
    });
  </script>

  <!-- MOVIES LOADER -->
  <script>
    async function fetchMovies() {
      const grid = document.getElementById('movie-grid');
      if (!grid) return;

      try {
        const res = await fetch('https://zetflix-peach.vercel.app/Playlist/Movies/movies.json?_t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const movies = Array.isArray(data) ? data : [];
        
        if (!Array.isArray(movies)) {
          throw new Error("Expected array in movies.json");
        }

        renderMovies(movies);
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<div style="color:#f87171; text-align:center; width:100%; padding:30px;">❌ Failed to load movies.</div>';
      }
    }

    function renderMovies(movies) {
      const grid = document.getElementById('movie-grid');
      grid.innerHTML = '';

      if (!Array.isArray(movies) || movies.length === 0) {
        grid.innerHTML = '<div style="color:#9ca3af; text-align:center; width:100%; padding:30px;">No movies found.</div>';
        return;
      }

      movies.forEach(movie => {
        const col = document.createElement('div');
        col.className = 'movie-col';

        const card = document.createElement('div');
        card.className = 'movie-card';

        const poster = (movie.logo || '').trim() || 'https://via.placeholder.com/220x220?text=No+Image';
        const title = movie.title || 'Untitled';
        const category = movie.category || '';
        const year = movie.year ? ` (${movie.year})` : '';

        card.innerHTML = `
          <img src="${poster}" class="movie-poster" alt="${title}">
          <div class="info">
            <h3>${title}</h3>
            <p>${category}${year}</p>
          </div>
        `;

        card.addEventListener('click', () => {
          const cleanUrl = (movie.url || '').trim();
          localStorage.setItem('selectedMovie', JSON.stringify({ ...movie, url: cleanUrl }));
          window.location.href = 'movie_detail.html';
        });

        col.appendChild(card);
        grid.appendChild(col);
      });
    }
  </script>
