<html lang="en">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #0f172a; color: white; overflow-x: hidden; }

    :root { --plyr-color-main: #ef4444; }

    /* MOBILE NAVIGATION HEADER (ဖုန်းမှာပဲ ပေါ်မည့် အညွှန်းဘား) */
    .mobile-nav-bar {
      display: none; position: fixed; top: 0; left: 0; right: 0; height: 55px;
      background-color: #1e293b; border-bottom: 1px solid #334155;
      align-items: center; padding: 0 15px; z-index: 1002;
    }
    .menu-toggle-btn {
      background: #ef4444; color: white; border: none; padding: 8px 12px;
      border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* SIDEBAR (Original TV/PC Layout) */
    .sidebar { position: fixed; top: 0; left: 0; width: 192px; height: 100vh; background-color: #1e293b; z-index: 1001; border-right: 1px solid #334155; transition: left 0.3s ease; }
    .sidebar-header { padding: 25px 15px; border-bottom: 1px solid #334155; text-align: center; color: #ef4444; font-weight: 900; font-size: 18px; }
    .nav-item { display: flex; align-items: center; padding: 15px 20px; color: #94a3b8; text-decoration: none; font-size: 13px; outline: none; border-left: 4px solid transparent; font-weight: bold; text-transform: uppercase; }
    .nav-item:focus { background-color: rgba(239, 68, 68, 0.1); border-left-color: #ef4444; color: white; }
    .nav-item.active { background-color: #ef4444; color: white; }

    /* MAIN CONTENT */
    .main-content { margin-left: 192px; min-height: 100vh; padding: 25px; transition: all 0.3s ease; }
    .page-title { font-size: 24px; font-weight: 900; color: #ef4444; margin-bottom: 20px; border-left: 5px solid #ef4444; padding-left: 15px; }

    /* BUTTONS */
    .btn-group { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
    .btn { background: #1e293b; color: #94a3b8; border: 3px solid transparent; padding: 12px; border-radius: 8px; cursor: pointer; outline: none; font-weight: bold; flex: 1; min-width: 140px; text-align: center; font-size: 12px; text-transform: uppercase; }
    .btn:focus { background: #ef4444; border-color: #fbbf24; color: white; transform: scale(1.05); }
    .btn.active { background: #ef4444; color: white; border-color: #fbbf24; }
    .btn.premium-lock { opacity: 0.6; border-color: rgba(239, 68, 68, 0.2); }

    /* MATCH CARDS */
    .match-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
    .match-card { background: #1e293b; border-radius: 12px; padding: 15px; border: 3px solid transparent; outline: none; cursor: pointer; }
    .match-card:focus { border-color: #3b82f6; transform: scale(1.05); background: #334155; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    
    .league-tag { font-size: 12px; color: #60a5fa; display: block; text-align: center; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
    .match-date-info { font-size: 11px; color: #94a3b8; display: block; text-align: center; margin-bottom: 10px; }
    .match-flex { display: flex; justify-content: space-between; align-items: center; }
    .team-box { width: 35%; text-align: center; }
    .team-box img { width: 60px; height: 60px; background: white; border-radius: 50%; padding: 5px; object-fit: contain; margin-bottom: 8px; }
    .team-name { font-size: 13px; font-weight: bold; color: #f1f5f9; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .center-box { text-align: center; width: 30%; }
    .match-time { color: #fbbf24; font-size: 16px; font-weight: 900; }
    
    .live-indicator { background: #ef4444; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; animation: blink 1s infinite; display: inline-block; margin-top: 5px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* DETAIL PAGE */
    #detailOverlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0f172a; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px 10px; }
    .detail-card { width: 100%; height: 100%; max-width: 900px; padding: 20px; display: flex; flex-direction: column; }
    
    .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; display: none; border: 1px solid #334155; }
    .video-box video { width: 100%; height: 100%; object-fit: contain; }

    .detail-teams { display: flex; justify-content: space-around; align-items: center; margin-bottom: 30px; }
    .detail-team { text-align: center; width: 45%; }
    .detail-team img { width: 120px; height: 120px; background: white; border-radius: 50%; padding: 10px; margin-bottom: 15px; object-fit: contain; }
    .detail-team h3 { font-size: 20px; font-weight: bold; }

    .links-area { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; scrollbar-width: none; }
    
    .link-row { display: flex; gap: 10px; width: 100%; }
    .stream-btn { 
      flex: 1; background: #1e293b; color: white; padding: 15px; border-radius: 10px; 
      font-weight: bold; outline: none; border: 3px solid transparent; cursor: pointer;
      display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 13px; text-transform: uppercase;
    }
    .stream-btn:focus { border-color: #fbbf24; background: #2563eb; transform: scale(1.02); }
    .stream-btn.web-btn { color: #facc15; border-color: rgba(250,204,21,0.1); }

    .back-btn { width: 100%; margin-top: 20px; padding: 18px; background: transparent; color: #94a3b8; border: 2px solid #334155; border-radius: 12px; font-weight: bold; outline: none; cursor: pointer; }
    .back-btn:focus { background: #334155; color: white; border-color: #fbbf24; }

    /* RESPONSIVE SMARTPHONE MEDIA QUERIES (ဖုန်းအတွက် အထူးပြင်ဆင်ချက်) */
    @media (max-width: 768px) {
      .mobile-nav-bar { display: flex; }
      .sidebar { left: -192px; top: 55px; height: calc(100vh - 55px); }
      .sidebar.open { left: 0; }
      .main-content { margin-left: 0; padding: 15px; padding-top: 75px; }
    }
    .alert-box {
            margin-bottom: 20px; padding: 16px; border-radius: 16px;
            display: flex; align-items: center; gap: 16px;
            background-color: var(--danger-bg); border: 1px solid var(--danger-border);
        }
        .alert-icon-wrap { background-color: #ef4444; padding: 12px; border-radius: 12px; color: #fff; display: flex; align-items: center; justify-content: center; }
        .alert-text { font-size: 11px; font-weight: 900; color: var(--danger-text); line-height: 1.5; margin: 0; text-transform: uppercase; }

        /* Rainbow Ad Animation */
        .ad-color-run {
            padding: 2px; border-radius: 16px; margin-bottom: 24px;
            background: linear-gradient(270deg, #ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 600% 600%; animation: colorRun 4s linear infinite;
        }
        @keyframes colorRun { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        .ad-color-run img { border-radius: 14px; width: 100%; height: auto; display: block; background-color: #000; }
        .ad-color-run button { border-radius: 14px; background: #1e293b; color: white; width: 100%; height: 100%; border: none; cursor: pointer; }
        
  </style>
</head>

  <script>
    const IMG_PROXY = "https://wsrv.nl/?url=";

    // Mobile Menu Control Logic
    function toggleMobileMenu() {
      document.getElementById('sidebarMenu').classList.toggle('open');
    }

    // Premium Notice Box Function
    function showPremiumAlert(serverName) {
      alert(serverName + " အား ကြည့်ရှုရန် Premium အကောင့် ဝယ်ယူရန် လိုအပ်ပါသည်။");
    }

    var App = {
      url: "https://nextjs-mobile-one.vercel.app/api/get-matches.js",
      allMatches: [],
      view: 'all',
      mainLeagues: ['PREMIER LEAGUE', 'CHAMPIONS LEAGUE', 'UCL', 'LA LIGA', 'SERIE A', 'BUNDESLIGA', 'LIGUE 1', 'WORLD CUP', 'EURO', 'K LEAGUE'],
      lastFocusedId: null,
      isDetailOpen: false,
      plyrInstance: null,
      hlsInstance: null,

      init: function() { this.fetchMatches(); },
      
      getProxyImg: function(url) {
        if (!url) return 'https://placehold.co/100?text=LOGO';
        let cleanUrl = url.trim();
        if (cleanUrl.startsWith('//')) cleanUrl = 'https:' + cleanUrl;
        return IMG_PROXY + encodeURIComponent(cleanUrl) + "&w=100&h=100&fit=contain";
      },

      fetchMatches: function() {
        document.getElementById('loading').style.display = 'block';
        fetch(this.url + "?t=" + Date.now()).then(r => r.json()).then(data => {
          document.getElementById('loading').style.display = 'none';
          this.allMatches = data.context || [];
          this.render();
        }).catch(err => {
          document.getElementById('loading').style.display = 'none';
        });
      },

      setView: function(v) {
        this.view = v;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+v).classList.add('active');
        this.render();
        // Close menu after choice on phone devices
        document.getElementById('sidebarMenu').classList.remove('open');
      },

      render: function() {
        var container = document.getElementById('matchContainer');
        container.innerHTML = '';
        var now = moment();

        var filtered = this.allMatches.filter(m => {
          var start = moment(m.match_time * 1000);
          if(this.view === 'live') return now.isSameOrAfter(start) && now.isBefore(start.clone().add(135, 'minutes'));
          if(this.view === 'main') return this.mainLeagues.some(l => (m.league || '').toUpperCase().includes(l));
          return true;
        });

        filtered.forEach((m, i) => {
          var start = moment(m.match_time * 1000);
          var isLive = now.isSameOrAfter(start) && now.isBefore(start.clone().add(135, 'minutes'));
          
          var card = document.createElement('div');
          card.className = 'match-card';
          card.id = 'card-' + i;
          card.tabIndex = 10 + i;
          card.innerHTML = `
            <div class="league-tag">${m.league || 'Football Match'}</div>
            <div class="match-date-info">${start.format('dddd, MMM DD, YYYY')}</div>
            <div class="match-flex">
              <div class="team-box"><img src="${this.getProxyImg(m.home_img)}"><div class="team-name">${m.home_name}</div></div>
              <div class="center-box">
                <div class="match-time">${start.format('hh:mm A')}</div>
                ${isLive ? '<div class="live-indicator">LIVE NOW</div>' : ''}
              </div>
              <div class="team-box"><img src="${this.getProxyImg(m.away_img)}"><div class="team-name">${m.away_name}</div></div>
            </div>`;
          card.onclick = () => { this.lastFocusedId = card.id; this.openDetail(m); };
          card.onkeydown = (e) => { if(e.keyCode === 13) { e.preventDefault(); this.lastFocusedId = card.id; this.openDetail(m); } };
          container.appendChild(card);
        });

        if(this.lastFocusedId) {
          setTimeout(() => {
            var el = document.getElementById(this.lastFocusedId);
            if(el) el.focus();
          }, 100);
        }
      },

      openDetail: function(match) {
        this.isDetailOpen = true;
        document.getElementById('detailOverlay').style.display = 'flex';
        document.getElementById('videoContainer').style.display = 'none'; 
        document.getElementById('det-h-img').src = this.getProxyImg(match.home_img);
        document.getElementById('det-a-img').src = this.getProxyImg(match.away_img);
        document.getElementById('det-h-name').innerText = match.home_name;
        document.getElementById('det-a-name').innerText = match.away_name;

        var linksDiv = document.getElementById('stream-links');
        linksDiv.innerHTML = '';
        
        if (match.links) {
          match.links.forEach((link, i) => {
            var type = (i % 2 === 0) ? 'SD' : 'HD';
            var num = Math.floor(i / 2) + 1;
            
            var row = document.createElement('div');
            row.className = 'link-row';

            // 1. Web Player Button
            var webBtn = document.createElement('button');
            webBtn.className = 'stream-btn web-btn';
            webBtn.tabIndex = 100 + (i * 2);
            webBtn.innerHTML = `<i class="fas fa-play"></i> <span>${type}${num} WEB PLAY</span>`;
            webBtn.onclick = () => { this.playWebStream(link.url); };

            // 2. NS Player Intent Button
            var nsBtn = document.createElement('button');
            nsBtn.className = 'stream-btn';
            nsBtn.tabIndex = 100 + (i * 2) + 1;
            nsBtn.innerHTML = `<i class="fas fa-external-link-alt" style="color:#fbbf24"></i> <span>${type}${num} NS PLAYER</span>`;
            nsBtn.onclick = () => {
                this.destroyVideo();
                window.location.href = `intent:${link.url}#Intent;package=com.genuine.leone;type=video/*;S.title=${encodeURIComponent(match.home_name + ' ' + type + num)};end`;
            };

            row.appendChild(webBtn);
            row.appendChild(nsBtn);
            linksDiv.appendChild(row);
          });
        }
        
        window.history.pushState({view: 'detail'}, '');
        setTimeout(() => {
            var firstBtn = document.querySelector('.stream-btn') || document.getElementById('back-btn');
            if(firstBtn) firstBtn.focus();
        }, 200);
      },

      playWebStream: function(url) {
        var container = document.getElementById('videoContainer');
        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });

        var video = document.getElementById('player');
        this.destroyVideo();

        var plyrConfig = {
          controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
          keyboard: { focused: true, global: true }
        };

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
          this.plyrInstance = new Plyr(video, plyrConfig);
        } 
        else if (Hls.isSupported()) {
          this.hlsInstance = new Hls({ maxMaxBufferLength: 10, lowLatencyMode: true });
          this.hlsInstance.loadSource(url);
          this.hlsInstance.attachMedia(video);
          this.hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            this.plyrInstance = new Plyr(video, plyrConfig);
          });
        } else {
          video.src = url;
          this.plyrInstance = new Plyr(video, plyrConfig);
        }
        video.play().catch(e => console.log(e));
      },

      destroyVideo: function() {
        if (this.plyrInstance) { this.plyrInstance.destroy(); this.plyrInstance = null; }
        if (this.hlsInstance) { this.hlsInstance.destroy(); this.hlsInstance = null; }
        var video = document.getElementById('player');
        if (video) { video.src = ''; video.load(); }
      },

      closeDetail: function() {
        if (!this.isDetailOpen) return;
        this.isDetailOpen = false;
        this.destroyVideo();
        document.getElementById('detailOverlay').style.display = 'none';
        
        if(this.lastFocusedId) {
          var el = document.getElementById(this.lastFocusedId);
          if(el) {
            el.scrollIntoView({ behavior: 'instant', block: 'center' });
            el.focus();
          }
        }
      }
    };

    window.onload = () => App.init();
    window.onpopstate = () => App.closeDetail();

    window.onkeydown = (e) => {
      const isDetail = App.isDetailOpen;
      const active = document.activeElement;

      if (isDetail) {
        const btns = Array.from(document.querySelectorAll('.stream-btn, .back-btn'));
        const idx = btns.indexOf(active);
        
        if (e.keyCode === 40 && idx < btns.length - 1) { e.preventDefault(); btns[idx + 1].focus(); }
        if (e.keyCode === 38 && idx > 0) { e.preventDefault(); btns[idx - 1].focus(); }
        
        if (e.keyCode === 8 || e.keyCode === 4 || e.keyCode === 27 || e.keyCode === 461 || e.keyCode === 10009) { 
          e.preventDefault(); 
          window.history.back(); 
        }
      }
    };
  </script>
</body>
