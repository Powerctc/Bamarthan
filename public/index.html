  <style>
    body {
      margin: 0;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background-color: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100vh;
      background-color: #1e293b;
      overflow-y: auto;
      border-right: 1px solid #334155;
    }

    .sidebar-header {
      padding: 16px;
      text-align: center;
      background: linear-gradient(90deg, #FFD700, #facc15);
      color: black;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: #cbd5e1;
      text-decoration: none;
      margin: 4px 8px;
      border-radius: 10px;
    }

    .nav-item:hover,
    .nav-item.active {
      background: linear-gradient(90deg, #FFD700, #facc15);
      color: black;
      font-weight: bold;
    }

    .main-content {
      margin-left: 200px;
      padding: 20px 16px 64px;
    }

    .page-title {
      font-size: 24px;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 16px;
    }

    .device-info {
      font-size: 13px;
      color: #60a5fa;
      margin-top: 4px;
      background: #1e293b;
      padding: 8px 12px;
      border-radius: 8px;
      display: inline-block;
      border-left: 4px solid #facc15;
    }

    .filter-buttons {
      display: flex;
      gap: 12px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 16px;
      background: #334155;
      color: #cbd5e1;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      min-width: 120px;
      text-align: center;
      transition: all 0.2s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: linear-gradient(90deg, #FFD700, #facc15);
      color: black;
      font-weight: bold;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .movie-card {
      background-color: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .movie-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
    }

    .movie-poster {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: #0f172a;
    }

    .movie-card .info {
      padding: 10px;
      text-align: center;
    }

    .movie-card .info h3 {
      font-size: 14px;
      font-weight: bold;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-card .info p {
      font-size: 12px;
      color: #94a8b8;
      margin: 0;
    }

    .overlay-menu {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .overlay-menu.show {
      opacity: 1;
      visibility: visible;
    }

    .overlay-content {
      background: #1e293b;
      width: 90%;
      max-width: 400px;
      border-radius: 16px;
      border: 1px solid #334155;
      max-height: 80vh;
      overflow-y: auto;
    }

    .overlay-header {
      padding: 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .overlay-list {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .overlay-item {
      padding: 12px;
      background: #334155;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .overlay-item:hover {
      background: linear-gradient(90deg, #FFD700, #facc15);
      color: black;
    }

    footer {
      background-color: #1e293b;
      text-align: center;
      padding: 20px;
      margin-top: 32px;
      font-size: 14px;
      border-top: 1px solid #334155;
    }

    footer a {
      color: #facc15;
      text-decoration: none;
      font-weight: bold;
    }

    .loading-spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #FFD700;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <h2 class="page-title">Movies</h2>
    
    <div class="device-info" id="device-info">
      <i class="fas fa-sync fa-spin"></i> Loading access info...
    </div>

    <!-- FILTER BUTTONS -->
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="source">Source</button>
      <button class="filter-btn" data-filter="genre">Genre</button>
      <button class="filter-btn" data-filter="year">Year</button>
    </div>

    <div id="loading-indicator" class="hidden"><div class="loading-spinner"></div></div>
    <div id="movie-grid" class="movie-grid"></div>
  </div>

  <footer>
    <p>S4ITMM © 2026 All rights reserved</p>
    <p>Developed by 
      <a href="https://www.facebook.com/share/1HGmcLDcx1/" target="_blank">U Maung Forever Study</a>
    </p>
  </footer>

  <!-- OVERLAY MODAL -->
  <div id="overlay-menu" class="overlay-menu">
    <div class="overlay-content">
      <div class="overlay-header">
        <h3 id="overlay-title" class="text-yellow-400 font-bold">Select Option</h3>
        <button id="overlay-close" class="text-white bg-red-600 w-8 h-8 rounded-full">✕</button>
      </div>
      <div id="overlay-list" class="overlay-list"></div>
    </div>
  </div>

  <script>
    // === DEVICE ID ===
    function getStableID() {
      let id = localStorage.getItem("s4itmm_stable_id_tv");
      if (id && id.length >= 12) return id;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.textBaseline = "top";
      ctx.font = "14px Arial";
      ctx.fillText('S4ITMM-TV-2026', 2, 15);
      const b64 = canvas.toDataURL().replace("data:image/png;base64,", "");
      let hash = 0;
      for (let i = 0; i < b64.length; i++) {
        hash = (hash << 5) - hash + b64.charCodeAt(i);
        hash = hash & hash;
      }
      const screenInfo = window.screen.width + "x" + window.screen.height;
      const finalRaw = Math.abs(hash).toString() + navigator.platform + screenInfo;
      let finalHash = 0;
      for (let j = 0; j < finalRaw.length; j++) {
        finalHash = (finalHash << 5) - finalHash + finalRaw.charCodeAt(j);
      }
      id = Math.abs(finalHash).toString().padStart(12, "0").slice(0, 12);
      localStorage.setItem("s4itmm_stable_id_tv", id);
      return id;
    }

    async function updateAccessInfo() {
      const infoDiv = document.getElementById("device-info");
      const currentID = getStableID();
      try {
        const res = await fetch(`https://livesportmm-s4itmmapprover.hf.space/approved_users.json?_t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error();
        const users = await res.json();
        const user = users.find(u => u.id === currentID);
        if (user) {
          const expDate = new Date(user.expires);
          const formatted = expDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
          infoDiv.innerHTML = `<i class="fas fa-tv"></i> Device ID: <b>${currentID}</b> | Expires: <b>${formatted}</b>`;
        } else {
          infoDiv.innerHTML = `Device ID: ${currentID} | Trial Mode`;
        }
      } catch (e) {
        infoDiv.innerHTML = `Device ID: ${currentID} | Offline Mode`;
      }
    }

    // === MOVIE DATA ===
    let allMovies = [];
    const sources = [
      { label: "Main Server", url: "https://zetflix-peach.vercel.app/Playlist/Movies/movies.json" },
      { label: "Backup 1", url: "https://zetflix-peach.vercel.app/Playlist/Movies/movies-2.json" },
      { label: "Backup 2", url: "https://zetflix-peach.vercel.app/Playlist/Movies/movies-3.json" }
    ];

    async function loadMoviesFrom(url) {
      document.getElementById("loading-indicator").classList.remove("hidden");
      try {
        const res = await fetch(url + '?_t=' + Date.now(), { cache: 'no-store' });
        allMovies = await res.json();
        renderMovies(allMovies);
      } catch (e) {
        document.getElementById("movie-grid").innerHTML = '<div style="color:#f87171; text-align:center; width:100%; padding:30px;">❌ Failed to load movies.</div>';
      }
      document.getElementById("loading-indicator").classList.add("hidden");
    }

    function renderMovies(movies) {
      const grid = document.getElementById('movie-grid');
      grid.innerHTML = '';
      movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        const poster = (movie.logo || '').trim() || 'https://via.placeholder.com/220x220?text=No+Image';
        card.innerHTML = `
          <img src="${poster}" class="movie-poster" alt="${movie.title}">
          <div class="info">
            <h3>${movie.title || 'Untitled'}</h3>
            <p>${movie.category || ''} ${movie.year ? '(' + movie.year + ')' : ''}</p>
          </div>
        `;
        card.addEventListener('click', () => {
          localStorage.setItem('selectedMovie', JSON.stringify(movie));
          window.location.href = 'movie_detail.html';
        });
        grid.appendChild(card);
      });
    }

    // === OVERLAY ===
    function openOverlay(title, items, onSelect) {
      document.getElementById("overlay-title").textContent = title;
      const list = document.getElementById("overlay-list");
      list.innerHTML = '';
      items.forEach(item => {
        const el = document.createElement("div");
        el.className = "overlay-item";
        el.textContent = item.label;
        el.onclick = () => {
          onSelect(item.value || item.label);
          closeOverlay();
        };
        list.appendChild(el);
      });
      document.getElementById("overlay-menu").classList.add("show");
    }

    function closeOverlay() {
      document.getElementById("overlay-menu").classList.remove("show");
    }

    document.getElementById("overlay-close").onclick = closeOverlay;
    document.getElementById("overlay-menu").onclick = (e) => {
      if (e.target.id === 'overlay-menu') closeOverlay();
    };

    // === BUTTON HANDLERS ===
    document.querySelector('.filter-btn[data-filter="source"]').onclick = () => {
      openOverlay("Select Source", sources, (url) => loadMoviesFrom(url));
    };

    document.querySelector('.filter-btn[data-filter="genre"]').onclick = () => {
      const genres = [...new Set(allMovies.map(m => m.category).filter(Boolean))].sort();
      openOverlay("Genre", [{label: "All", value: "all"}, ...genres.map(g => ({label: g}))], (val) => {
        const filtered = val === "all" ? allMovies : allMovies.filter(m => m.category === val);
        renderMovies(filtered);
      });
    };

    document.querySelector('.filter-btn[data-filter="year"]').onclick = () => {
      const years = [...new Set(allMovies.map(m => m.year).filter(y => y))].sort((a,b) => b - a);
      openOverlay("Year", [{label: "All Time", value: "all"}, ...years.map(y => ({label: y}))], (val) => {
        const filtered = val === "all" ? allMovies : allMovies.filter(m => m.year == val);
        renderMovies(filtered);
      });
    };

    // === INIT ===
    document.addEventListener("DOMContentLoaded", () => {
      updateAccessInfo();
      loadMoviesFrom(sources[0].url);
    });
  </script>
</body>
