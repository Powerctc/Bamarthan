<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOTMOV MOBILE - JSON ADAPTED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#facc15', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        
        #detail-view { 
            position: fixed; inset: 0; z-index: 100; background: #0f172a; 
            transform: translateX(100%); transition: transform 0.3s ease-out;
            overflow-y: auto; display: none;
        }
        #detail-view.active { transform: translateX(0); display: block; }
        .aspect-video { aspect-ratio: 16 / 9; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <div id="main-ui">
        <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex justify-between items-center">
            <button class="text-primary text-2xl w-10 text-left"><i class="fas fa-bars-staggered"></i></button>
            <div class="flex flex-col items-center">
                <span class="text-primary font-black text-xl tracking-tighter leading-none">FOTMOV</span>
                <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Hybrid Loader</span>
            </div>
            <div class="w-10 text-right">
                <button id="theme-toggle" class="text-xl dark:text-primary"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block"></i></button>
            </div>
        </header>

        <main class="mt-20 p-4">
            <div class="mb-4">
                <input type="text" id="search-bar" class="w-full bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 p-4 rounded-2xl focus:ring-2 focus:ring-primary shadow-sm dark:text-white" placeholder="Search movies...">
            </div>

            <div class="grid grid-cols-3 gap-2 mb-6">
                <button id="src-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary transition-colors">Server</button>
                <button id="gen-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary transition-colors">Genre</button>
                <button id="yr-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary transition-colors">Year</button>
            </div>

            <div id="movie-grid" class="grid grid-cols-2 gap-4"></div>
        </main>
    </div>

    <div id="detail-view">
        <div id="detail-content"></div>
    </div>

    <div id="overlay" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-3xl overflow-hidden border border-slate-800">
            <div id="overlay-title" class="p-4 text-center font-black text-primary border-b border-slate-800 uppercase text-xs">Select</div>
            <div id="overlay-list" class="max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeOverlay()" class="w-full p-4 text-xs font-black opacity-40 uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const movieSources = [{ label: "Server 1", value: "zetflix.json" }];
        let allMovies = [];

        async function loadMovies(url) {
            try {
                const res = await fetch(url);
                allMovies = await res.json();
                renderMovies(allMovies);
            } catch (e) { console.error("Error loading JSON"); }
        }

        function renderMovies(data) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = data.map((m, index) => `
                <div onclick='openMovie(${index})' class="bg-white dark:bg-darkCard rounded-2xl overflow-hidden active:scale-95 transition-all">
                    <img src="${m.logo}" class="w-full aspect-[3/4] object-cover">
                    <div class="p-3">
                        <h3 class="text-[10px] font-bold line-clamp-1">${m.title}</h3>
                        <p class="text-[8px] opacity-50">${m.year}</p>
                    </div>
                </div>
            `).join('');
        }

        function openMovie(index) {
            const movie = allMovies[index];
            const detailContainer = document.getElementById('detail-view');
            
            // Link Logic: handles both "url" and "urls" array
            const videoLinks = movie.urls ? movie.urls : [movie.url];
            const mainLink = videoLinks[0];
            const backupLink = videoLinks.length > 1 ? videoLinks[1] : null;

            document.getElementById('detail-content').innerHTML = `
                <div class="relative w-full aspect-video bg-black">
                    <video id="player" controls class="w-full h-full" poster="${movie.logo}">
                        <source id="v-src" src="${mainLink}" type="video/mp4">
                    </video>
                    <button onclick="closeDetail()" class="absolute top-4 left-4 bg-black/40 p-2 rounded-full w-10 h-10 backdrop-blur-sm">
                        <i class="fas fa-arrow-left text-white"></i>
                    </button>
                </div>
                <div class="p-6">
                    <h2 class="text-2xl font-black text-primary uppercase leading-tight">${movie.title}</h2>
                    <div class="flex gap-2 my-4">
                        <span class="text-[10px] font-bold bg-white/10 px-3 py-1 rounded-full">${movie.year}</span>
                        <span class="text-[10px] font-bold bg-primary/20 text-primary px-3 py-1 rounded-full">${movie.category}</span>
                    </div>
                    
                    <div class="mt-8 space-y-3">
                        <button onclick="playExternal('${mainLink}')" class="w-full bg-primary text-black font-black py-4 rounded-2xl flex items-center justify-center gap-3 active:bg-yellow-500">
                            <i class="fas fa-play"></i> EXTERNAL PLAYER
                        </button>
                        <p class="text-[8px] text-center opacity-40 tracking-widest uppercase font-bold">Package: com.genuine.leone</p>
                    </div>
                </div>
            `;

            detailContainer.classList.add('active');

            // In-app Auto Retry Logic
            const video = document.getElementById('player');
            video.onerror = () => {
                if (backupLink && video.src !== backupLink) {
                    console.log("Main link failed, trying backup...");
                    video.src = backupLink;
                    video.load();
                    video.play();
                }
            };
        }

        function playExternal(url) {
            const intent = `intent:${url}#Intent;package=com.genuine.leone;type=video/*;end`;
            window.location.href = intent;
        }

        function closeDetail() {
            const player = document.getElementById('player');
            if(player) player.pause();
            document.getElementById('detail-view').classList.remove('active');
        }

        // Filter Logic
        function openOverlay(title, items, callback) {
            document.getElementById('overlay-title').innerText = title;
            const list = document.getElementById('overlay-list');
            list.innerHTML = items.map(item => `
                <button onclick="(${callback.toString()})('${item.value}'); closeOverlay();" class="w-full p-4 text-center text-[10px] font-bold border-b border-slate-800 active:bg-primary active:text-black uppercase">
                    ${item.label}
                </button>
            `).join('');
            document.getElementById('overlay').classList.replace('hidden', 'flex');
        }

        function closeOverlay() { document.getElementById('overlay').classList.replace('flex', 'hidden'); }

        document.getElementById('gen-btn').onclick = () => {
            const genres = [...new Set(allMovies.map(m => m.category))];
            const items = [{label: "All", value: "all"}, ...genres.map(g => ({label: g, value: g}))];
            openOverlay("Genre", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.category === v)));
        };

        document.getElementById('yr-btn').onclick = () => {
            const years = [...new Set(allMovies.map(m => m.year))].sort((a,b)=>b-a);
            const items = [{label: "Any", value: "all"}, ...years.map(y => ({label: y, value: y}))];
            openOverlay("Year", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.year == v)));
        };

        document.getElementById('search-bar').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(term)));
        };

        document.getElementById('theme-toggle').onclick = () => document.documentElement.classList.toggle('dark');
        window.onload = () => loadMovies(movieSources[0].value);
    </script>
</body>
</html>
