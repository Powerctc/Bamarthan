<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>S4MM TV - Movies</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
body {
  margin:0;
  font-family:'Roboto','Segoe UI',sans-serif;
  background:#111827;
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;left:0;
  width:192px;
  height:100vh;
  background:#1f2937;
  overflow-y:auto;
}
.sidebar-header{
  padding:16px;
  display:flex;
  align-items:center;
}
.sidebar-header i{color:#ef4444;margin-right:8px;}
.nav-item{
  display:flex;
  align-items:center;
  padding:12px 16px;
  color:#d1d5db;
  text-decoration:none;
  cursor:pointer;
}
.nav-item:hover{background:#374151;}
.nav-item.active{background:#ef4444;color:#fff;}

/* MAIN */
.main-content{
  margin-left:192px;
  padding:24px 16px 64px;
}
.page-title{
  font-size:24px;
  color:#ef4444;
}
.device-info{
  font-size:13px;
  color:#60a5fa;
  background:#1f2937;
  padding:8px 12px;
  border-radius:8px;
  margin-top:6px;
  border-left:4px solid #ef4444;
}

/* FILTER BAR */
.filter-bar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:16px;
}
.filter-btn{
  background:#1f2937;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
.filter-btn.active,
.filter-btn:hover{
  background:#ef4444;
}

/* POPUP MENUS */
.popup{
  display:none;
  margin-top:10px;
}
.popup button{
  display:block;
  width:100%;
  margin-bottom:6px;
  background:#1f2937;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:6px;
  text-align:left;
}
.popup button:hover{
  background:#ef4444;
}

/* MOVIES */
.movie-grid{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}
.movie-col{width:calc(20% - 10px);}
@media(max-width:1024px){.movie-col{width:25%;}}
@media(max-width:768px){.movie-col{width:33.33%;}}
@media(max-width:480px){.movie-col{width:50%;}}

.movie-card{
  background:#1f2937;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
.movie-card:hover{background:#374151;}
.movie-poster{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:4px;
}
.movie-card .info{text-align:center;padding-top:6px;}
.movie-card h3{
  font-size:14px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.movie-card p{
  font-size:12px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-header">
    <i class="fas fa-film"></i><span>S4ITMM TV</span>
  </div>
  <a class="nav-item active">HOME</a>
</div>

<div class="main-content">
  <h2 class="page-title">Movies</h2>
  <div class="device-info" id="device-info">Loading ID...</div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="loadSource('movies.json',this)">Source 1</button>
    <button class="filter-btn" onclick="loadSource('movies-1.json',this)">Source 2</button>
    <button class="filter-btn" onclick="loadSource('movies-2.json',this)">Source 3</button>
    <button class="filter-btn" onclick="loadSource('movies-3.json',this)">Source 4</button>

    <button class="filter-btn" onclick="togglePopup('genrePopup')">Genres</button>
    <button class="filter-btn" onclick="togglePopup('yearPopup')">Years</button>
  </div>

  <div id="genrePopup" class="popup"></div>
  <div id="yearPopup" class="popup"></div>

  <div id="movie-grid" class="movie-grid"></div>
</div>

<script>
// --- STABLE DEVICE ID LOGIC ---
    function getStableID() {
      try {
        let id = localStorage.getItem("s4itmm_stable_id");
        if (id && id.length === 12) return id;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillText('S4ITMM-TV-2026', 2, 15);
        const b64 = canvas.toDataURL().replace("data:image/png;base64,", "");
        let hash = 0;
        for (let i = 0; i < b64.length; i++) { hash = (hash << 5) - hash + b64.charCodeAt(i); hash |= 0; }
        id = Math.abs(hash).toString().padStart(12, "0").slice(0, 12);
        localStorage.setItem("s4itmm_stable_id", id);
        return id;
      } catch (e) { return "000000000000"; }
    }

    async function updateAccessInfo() {
      const infoDiv = document.getElementById("device-info");
      const id = getStableID();
      infoDiv.innerHTML = `<i class="fas fa-tv"></i> ID: <b>${id}</b> | <i class="fas fa-check-circle"></i> Connected`;
    }
/* MOVIE LOGIC */
let allMovies=[];
let source="movies.json";
let genre="",year="";

function togglePopup(id){
 const el=document.getElementById(id);
 el.style.display=el.style.display==="block"?"none":"block";
}

function loadSource(s,btn){
 source=s;
 document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
 fetchMovies();
}

async function fetchMovies(){
 const grid=document.getElementById("movie-grid");
 grid.innerHTML="Loading...";
 const res=await fetch(`https://zetflix-peach.vercel.app/Playlist/Movies/${source}?_t=${Date.now()}`);
 allMovies=await res.json();
 buildFilters();
 applyFilters();
}

function buildFilters(){
 const genres=[...new Set(allMovies.map(m=>m.category).filter(Boolean))];
 const years=[...new Set(allMovies.map(m=>m.year).filter(Boolean))].sort((a,b)=>b-a);

 document.getElementById("genrePopup").innerHTML =
  `<button onclick="setGenre('')">All</button>`+
  genres.map(g=>`<button onclick="setGenre('${g}')">${g}</button>`).join("");

 document.getElementById("yearPopup").innerHTML =
  `<button onclick="setYear('')">All</button>`+
  years.map(y=>`<button onclick="setYear('${y}')">${y}</button>`).join("");
}

function setGenre(g){genre=g;applyFilters();}
function setYear(y){year=y;applyFilters();}

function applyFilters(){
 renderMovies(allMovies.filter(m=>{
  return (!genre||m.category===genre)&&(!year||m.year==year);
 }));
}

function renderMovies(list){
 const grid=document.getElementById("movie-grid");
 grid.innerHTML="";
 list.forEach(m=>{
  const col=document.createElement("div");
  col.className="movie-col";
  col.innerHTML=`
   <div class="movie-card">
    <img class="movie-poster" src="${m.logo||''}">
    <div class="info">
     <h3>${m.title}</h3>
     <p>${m.category||''} ${m.year||''}</p>
    </div>
   </div>`;
  grid.appendChild(col);
 });
}

fetchMovies();
</script>

</body>
</html>
