    .filter-buttons {

    }

    .filter-btn {

      background: #374151;
      color: #d1d5db;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      min-width: 120px;
      text-align: center;
      transition: background 0.2s;
    }

    .filter-btn.active,
    .filter-btn:hover {

      color: white;
    }

    .movie-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-start;
      margin-top: 20px;
    }

    .movie-col {
      width: calc(50% - 6px);
    }

    @media (min-width: 640px) { .movie-col { width: calc(33.333% - 8px); } }
    @media (min-width: 768px) { .movie-col { width: calc(25% - 9px); } }
    @media (min-width: 1024px) { .movie-col { width: calc(20% - 9.6px); } }
    @media (min-width: 1280px) { .movie-col { width: calc(16.666% - 10px); } }

    .movie-card {
      background-color: #1f2937;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      padding: 8px;
      box-sizing: border-box;
      transition: transform 0.2s;
    }
    
    .movie-card:hover {
      transform: scale(1.03);
      background-color: #374151;
    }

    .movie-poster {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background-color: #111;
      border-radius: 4px;
    }

    .movie-card .info {
      padding: 10px 6px;
      text-align: center;
    }

    .movie-card .info h3 {
      font-size: 14px;
      font-weight: bold;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-card .info p {
      font-size: 12px;
      color: #9ca3af;
      margin: 0;
    }

    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filter-item {
      background: #374151;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      min-width: 100px;
      text-align: center;
      font-size: 16px;
    }

    .filter-item:hover {

    }

    footer {

      border-top: 1px solid #374151;
    }

    footer a {
      color: #ef4444;
      text-decoration: none;
      font-weight: bold;
    }
  </style>

  <!-- STABLE DEVICE ID & DATABASE EXPIRY CHECKER -->
  <script>
    const HF_BASE_URL = "https://livesportmm-s4itmmapprover.hf.space";

    function getStableID() {
        try {
            let id = localStorage.getItem("s4itmm_stable_id");
            if (id && id.length === 12) return id;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const txt = 'S4ITMM-TV-DEVICE-ID-2026';
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.fillText(txt, 2, 15);
            const b64 = canvas.toDataURL().replace("data:image/png;base64,", "");
            let hash = 0;
            for (let i = 0; i < b64.length; i++) {
                hash = (hash << 5) - hash + b64.charCodeAt(i);
                hash = hash & hash;
            }
            const screenInfo = window.screen.width + "x" + window.screen.height;
            const finalRaw = Math.abs(hash).toString() + navigator.platform + screenInfo;
            let finalHash = 0;
            for (let j = 0; j < finalRaw.length; j++) {
                finalHash = (finalHash << 5) - finalHash + finalRaw.charCodeAt(j);
            }
            id = Math.abs(finalHash).toString().padStart(12, "0").slice(0, 12);
            localStorage.setItem("s4itmm_stable_id", id);
            return id;
        } catch (e) {
            return "000000000000";
        }
    }

    async function updateAccessInfo() {
        const infoDiv = document.getElementById("device-info");
        const currentID = getStableID();
        
        try {
            const res = await fetch(`${HF_BASE_URL}/approved_users.json?_t=${Date.now()}`, { cache: "no-store" });
            if (!res.ok) throw new Error();
            
            const users = await res.json();
            const user = users.find(u => u.id === currentID);
            
            if (user) {
                const expDate = new Date(user.expires);
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                const formattedDate = expDate.toLocaleDateString('en-GB', options);
                infoDiv.innerHTML = `<i class="fas fa-tv"></i> Device ID: <b>${currentID}</b> | <i class="fas fa-calendar-alt"></i> Expires: <b>${formattedDate}</b>`;
            } else {
                infoDiv.innerHTML = `Device ID: ${currentID} | Trial Mode`;
            }
        } catch (e) {
            infoDiv.innerHTML = `Device ID: ${currentID} | Offline Mode`;
        }
    }
  </script>

  <!-- ENHANCED MOVIES LOADER (3 SOURCES + GENRE/YEAR FILTERING) -->
  <script>
    let allMovies = [];
    let genresSet = new Set();
    let yearsSet = new Set();

    async function fetchAllMovies() {
      const urls = [
        'https://zetflix-peach.vercel.app/Playlist/Movies/movies.json',
        'https://zetflix-peach.vercel.app/Playlist/Movies/movies-2.json',
        'https://zetflix-peach.vercel.app/Playlist/Movies/movies-3.json'
      ];

      const promises = urls.map(url =>
        fetch(url + '?_t=' + Date.now(), { cache: 'no-store' })
          .then(res => res.ok ? res.json() : [])
          .catch(() => [])
      );

      const results = await Promise.all(promises);
      allMovies = results.flat().filter(movie => movie && typeof movie.title === 'string');

      // Extract unique genres and years
      genresSet.clear();
      yearsSet.clear();
      allMovies.forEach(movie => {
        if (movie.category && typeof movie.category === 'string') {
          genresSet.add(movie.category.trim());
        }
        if (movie.year && !isNaN(Number(movie.year))) {
          yearsSet.add(String(movie.year));
        }
      });
    }

    function renderMovies(movies) {
      const grid = document.getElementById('movie-grid');
      grid.innerHTML = '';
      if (movies.length === 0) {
        grid.innerHTML = '<div style="color:#f87171; text-align:center; width:100%; padding:30px;">No movies found.</div>';
        return;
      }
      movies.forEach(movie => {
        const col = document.createElement('div');
        col.className = 'movie-col';
        const card = document.createElement('div');
        card.className = 'movie-card';
        const poster = (movie.logo || '').trim() || 'https://via.placeholder.com/220x220?text=No+Image';
        card.innerHTML = `
          <img src="${poster}" class="movie-poster" alt="${movie.title}">
          <div class="info">
            <h3>${movie.title || 'Untitled'}</h3>
            <p>${movie.category || ''} ${movie.year ? '(' + movie.year + ')' : ''}</p>
          </div>
        `;
        card.addEventListener('click', () => {
          localStorage.setItem('selectedMovie', JSON.stringify(movie));
          window.location.href = 'movie_detail.html';
        });
        col.appendChild(card);
        grid.appendChild(col);
      });
    }

    function renderGenreList() {
      const genres = Array.from(genresSet).sort();
      let html = '<div class="filter-grid">';
      genres.forEach(genre => {
        html += `<div class="filter-item" data-type="genre" data-value="${genre}">${genre}</div>`;
      });
      html += '</div>';
      document.getElementById('movie-grid').innerHTML = html;
      attachFilterListeners();
    }

    function renderYearList() {
      const years = Array.from(yearsSet).sort((a, b) => b - a);
      let html = '<div class="filter-grid">';
      years.forEach(year => {
        html += `<div class="filter-item" data-type="year" data-value="${year}">${year}</div>`;
      });
      html += '</div>';
      document.getElementById('movie-grid').innerHTML = html;
      attachFilterListeners();
    }

    function attachFilterListeners() {
      document.querySelectorAll('.filter-item').forEach(item => {
        item.addEventListener('click', () => {
          const type = item.dataset.type;
          const value = item.dataset.value;
          if (type === 'genre') {
            const filtered = allMovies.filter(m => m.category && m.category.trim() === value);
            renderMovies(filtered);
          } else if (type === 'year') {
            const filtered = allMovies.filter(m => String(m.year) === value);
            renderMovies(filtered);
          }
          setActiveButton('all');
        });
      });
    }

    function setActiveButton(filter) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      updateAccessInfo();
      await fetchAllMovies();
      renderMovies(allMovies);

      // Wire filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const filter = btn.dataset.filter;
          setActiveButton(filter);
          if (filter === 'all') {
            renderMovies(allMovies);
          } else if (filter === 'genre') {
            renderGenreList();
          } else if (filter === 'year') {
            renderYearList();
          }
        });
      });
    });
  </script>
