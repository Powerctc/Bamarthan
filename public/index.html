<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>S4MM TV - Movies Professional</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
:root {
  --red:#ef4444;
  --bg:#111827;
  --card:#1f2937;
  --hover:#374151;
  --text:#9ca3af;
}

body {
  margin:0;
  font-family:Segoe UI, Roboto, sans-serif;
  background:var(--bg);
  color:#fff;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:0; top:0;
  width:200px;
  height:100vh;
  background:var(--card);
}

.sidebar-header {
  padding:18px;
  font-weight:bold;
  color:var(--red);
  display:flex;
  align-items:center;
  border-bottom:1px solid var(--hover);
}

.sidebar-header i { margin-right:10px; }

.nav-item {
  display:flex;
  align-items:center;
  padding:12px 18px;
  color:#d1d5db;
  text-decoration:none;
}

.nav-item i { width:22px; margin-right:10px; }
.nav-item:hover { background:var(--hover); }
.nav-item.active { background:var(--red); color:#fff; }

/* MAIN */
.main-content {
  margin-left:200px;
  padding:24px;
}

.page-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.page-title {
  font-size:26px;
  color:var(--red);
}

.device-info {
  background:#020617;
  padding:8px 14px;
  border-radius:8px;
  font-size:13px;
  border-left:4px solid var(--red);
}

/* CONTROL */
.control-panel {
  background:var(--card);
  padding:16px;
  border-radius:12px;
  margin-bottom:24px;
}

.filter-row {
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.btn {
  background:var(--hover);
  border:none;
  color:#fff;
  padding:10px 18px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}

.btn:hover,
.btn:focus {
  background:var(--red);
}

/* TV MENU */
.tv-menu {
  display:none;
  position:absolute;
  background:var(--card);
  border:1px solid var(--hover);
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  z-index:1000;
}

.tv-menu-item {
  padding:12px 20px;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}

.tv-menu-item:hover,
.tv-menu-item:focus {
  background:var(--red);
}

/* MOVIES */
.movie-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:20px;
}

.movie-card {
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  transition:.3s;
}

.movie-card:hover {
  transform:scale(1.06);
}

.movie-poster {
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}

.movie-card .info {
  padding:12px;
}

.movie-card h3 {
  font-size:14px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.movie-card p {
  font-size:12px;
  color:var(--text);
}

footer {
  margin-top:40px;
  text-align:center;
  color:var(--text);
}

/* MOBILE / TV */
@media(max-width:768px){
.sidebar { width:60px; }
.sidebar span { display:none; }
.main-content { margin-left:60px; }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-header">
    <i class="fas fa-film"></i><span>S4ITMM TV</span>
  </div>
  <a class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
  <a class="nav-item"><i class="fas fa-tv"></i><span>Series</span></a>
  <a class="nav-item"><i class="fas fa-user"></i><span>About</span></a>
</div>

<div class="main-content">
  <div class="page-header">
    <h2 class="page-title">Movies Explorer</h2>
    <div class="device-info" id="device-info">Checking ID...</div>
  </div>

  <div class="control-panel">
    <div class="filter-row">
      <button class="btn" onclick="toggleMenu('genreMenu')">
        <i class="fas fa-list"></i> All Genres
      </button>

      <button class="btn" onclick="toggleMenu('yearMenu')">
        <i class="fas fa-calendar"></i> All Years
      </button>

      <button class="btn" onclick="fetchMovies()">
        <i class="fas fa-sync"></i> Refresh
      </button>
    </div>

    <!-- GENRES -->
    <div class="tv-menu" id="genreMenu">
      <div class="tv-menu-item" onclick="setGenre('')">All</div>
      <div class="tv-menu-item" onclick="setGenre('Action')">Action</div>
      <div class="tv-menu-item" onclick="setGenre('Horror')">Horror</div>
      <div class="tv-menu-item" onclick="setGenre('Comedy')">Comedy</div>
      <div class="tv-menu-item" onclick="setGenre('Drama')">Drama</div>
      <div class="tv-menu-item" onclick="setGenre('War')">War</div>
    </div>

    <!-- YEARS -->
    <div class="tv-menu" id="yearMenu">
      <div class="tv-menu-item" onclick="setYear('')">All</div>
      <div class="tv-menu-item" onclick="setYear('2025')">2025</div>
      <div class="tv-menu-item" onclick="setYear('2024')">2024</div>
      <div class="tv-menu-item" onclick="setYear('2023')">2023</div>
      <div class="tv-menu-item" onclick="setYear('2022')">2022</div>
    </div>
  </div>

  <div id="movie-grid" class="movie-grid"></div>
</div>

<footer>
  S4ITMM © 2026 | Created by U Maung
</footer>

<script>
/* DEVICE ID */
function getID(){
 let id=localStorage.getItem("tv_id");
 if(id) return id;
 id=Math.random().toString(36).substr(2,12);
 localStorage.setItem("tv_id",id);
 return id;
}
document.getElementById("device-info").innerHTML="ID: <b>"+getID()+"</b>";

let allMovies=[];
let selectedGenre='';
let selectedYear='';

function toggleMenu(id){
 document.querySelectorAll('.tv-menu').forEach(m=>m.style.display='none');
 const el=document.getElementById(id);
 el.style.display=el.style.display==='block'?'none':'block';
}

function setGenre(g){
 selectedGenre=g.toLowerCase();
 document.getElementById('genreMenu').style.display='none';
 applyFilters();
}

function setYear(y){
 selectedYear=y;
 document.getElementById('yearMenu').style.display='none';
 applyFilters();
}

async function fetchMovies(){
 const grid=document.getElementById('movie-grid');
 grid.innerHTML='Loading...';
 const res=await fetch("https://zetflix-peach.vercel.app/Playlist/Movies/movies.json");
 allMovies=await res.json();
 applyFilters();
}

function applyFilters(){
 const filtered=allMovies.filter(m=>{
  const g=!selectedGenre || (m.category||'').toLowerCase().includes(selectedGenre);
  const y=!selectedYear || m.year==selectedYear;
  return g && y;
 });
 renderMovies(filtered);
}

function renderMovies(list){
 const grid=document.getElementById('movie-grid');
 grid.innerHTML='';
 if(!list.length){ grid.innerHTML='No Movies'; return; }
 list.forEach(m=>{
  const div=document.createElement('div');
  div.className='movie-card';
  div.innerHTML=`
   <img class="movie-poster" src="${m.logo}">
   <div class="info">
     <h3>${m.title}</h3>
     <p>${m.category} • ${m.year}</p>
   </div>`;
  grid.appendChild(div);
 });
}

fetchMovies();
</script>

</body>
  </html>
