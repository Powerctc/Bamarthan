<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOTMOV MOBILE - PRO QUALITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#facc15', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        
        #detail-view-container { 
            position: fixed; inset: 0; z-index: 100; background: #0f172a; 
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; visibility: hidden;
        }
        #detail-view-container.active { transform: translateX(0); visibility: visible; }
        .aspect-video { aspect-ratio: 16 / 9; }

        /* Quality Button Styles */
        .q-btn { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .q-btn.active { background: #facc15 !important; color: #000 !important; border-color: #facc15; box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <div id="sidebar-container"></div>

    <div id="main-ui">
        <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex justify-between items-center">
            <button id="menu-btn" class="text-primary text-2xl w-10 text-left"><i class="fas fa-bars-staggered"></i></button>
            <div class="flex flex-col items-center">
                <span class="text-primary font-black text-xl tracking-tighter leading-none">FOTMOV</span>
                <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Mobile</span>
            </div>
            <div class="w-10 text-right">
                <button id="theme-toggle" class="text-xl dark:text-primary"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block"></i></button>
            </div>
        </header>

        <main class="mt-20 p-4">
            <div class="mb-4">
                <input type="text" id="search-bar" class="w-full bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 p-4 rounded-2xl focus:ring-2 focus:ring-primary shadow-sm dark:text-white" placeholder="Search movies...">
            </div>

            <div class="grid grid-cols-3 gap-2 mb-6">
                <button id="src-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary transition-colors">Source</button>
                <button id="gen-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary transition-colors">Genre</button>
                <button id="yr-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary transition-colors">Year</button>
            </div>

            <div id="movie-grid" class="grid grid-cols-2 gap-4"></div>
        </main>
    </div>

    <div id="detail-view-container" class="fixed inset-0 z-[100] bg-darkBg overflow-y-auto"></div>

    <div id="overlay" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-3xl overflow-hidden border border-slate-800">
            <div id="overlay-title" class="p-4 text-center font-black text-primary border-b border-slate-800 uppercase text-xs">Select</div>
            <div id="overlay-list" class="max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeOverlay()" class="w-full p-4 text-xs font-black opacity-40 uppercase">Cancel</button>
        </div>
    </div>

    <script src="sidebar.js"></script>

    <script>
        const movieSources = [
            { label: "Server 1", value: "zetflix.json" },
            { label: "Server 2", value: "movies.json" }
        ];
        let allMovies = [];
        let currentSelectedLink = ""; // လက်ရှိရွေးထားတဲ့ Link ကိုသိမ်းထားရန်

        async function loadMovies(url) {
            try {
                const res = await fetch(url);
                allMovies = await res.json();
                renderMovies(allMovies);
            } catch (e) { console.error("Fetch Error"); }
        }

        function renderMovies(data) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = data.map((m, i) => `
                <div onclick="showMovieDetails(${i})" class="bg-white dark:bg-darkCard rounded-2xl overflow-hidden active:scale-95 transition-all shadow-lg">
                    <img src="${m.logo}" class="w-full aspect-[3/4] object-cover" loading="lazy">
                    <div class="p-3">
                        <h3 class="text-[10px] font-bold line-clamp-1 uppercase text-center">${m.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        function showMovieDetails(index) {
            const movie = allMovies[index];
            const container = document.getElementById('detail-view-container');
            const links = movie.urls || [movie.url];
            
            // Default ပထမဆုံး link ကို ရွေးထားမယ်
            currentSelectedLink = links[0];

            container.innerHTML = `
                <div class="relative w-full aspect-video bg-black shadow-2xl">
                    <video id="main-player" controls class="w-full h-full" poster="${movie.logo}">
                        <source src="${currentSelectedLink}" type="video/mp4">
                    </video>
                    <button onclick="closeDetails()" class="absolute top-4 left-4 bg-black/50 w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10 active:scale-90 transition-all">
                        <i class="fas fa-arrow-left text-white"></i>
                    </button>
                </div>

                <div class="p-6">
                    <h2 class="text-2xl font-black text-primary uppercase leading-tight tracking-tighter">${movie.title}</h2>
                    <div class="flex items-center gap-3 mt-2 mb-8">
                        <span class="text-[10px] font-black bg-white/10 px-3 py-1 rounded-md border border-white/5 opacity-60">${movie.year}</span>
                        <span class="text-[10px] font-black text-primary bg-primary/10 px-3 py-1 rounded-md border border-primary/20 uppercase tracking-widest">${movie.category}</span>
                    </div>
                    
                    <div class="mt-4">
                        <p class="text-[9px] font-black opacity-30 uppercase mb-4 tracking-[0.2em]">Select Resolution</p>
                        <div class="flex gap-2">
                            ${links.map((link, idx) => {
                                let label = (idx === 0) ? "SD" : (idx === 1) ? "HD" : "FHD";
                                return `<button onclick="switchQuality('${link}', this)" class="q-btn flex-1 text-[11px] font-black py-4 rounded-2xl ${idx === 0 ? 'active' : ''}">${label}</button>`;
                            }).join('')}
                        </div>
                    </div>

                    <div class="mt-8">
                        <button onclick="playExternal()" class="w-full bg-slate-800 border border-white/10 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all shadow-lg group">
                            <i class="fas fa-play text-primary group-active:text-black"></i> 
                            <span class="text-xs uppercase tracking-widest">External Leone Player</span>
                        </button>
                        <p class="text-[7px] text-center opacity-30 mt-4 uppercase font-bold tracking-[0.3em]">Enjoy high quality with com.genuine.leone</p>
                    </div>
                </div>
            `;

            container.classList.add('active');

            // Auto Retry
            const video = document.getElementById('main-player');
            video.onerror = () => {
                if (links[1] && video.src !== links[1]) {
                    switchQuality(links[1], document.querySelectorAll('.q-btn')[1]);
                }
            };
        }

        function switchQuality(url, btn) {
            const video = document.getElementById('main-player');
            const currentTime = video.currentTime;
            
            // Save link to global variable for External Player use
            currentSelectedLink = url;
            
            // Update Button Styles
            document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Switch Video Stream
            video.src = url;
            video.load();
            video.currentTime = currentTime;
            video.play().catch(e => console.log("Play interrupted"));
        }

        function playExternal() {
            // လက်ရှိရွေးထားတဲ့ Quality Link အတိုင်း Leone Player နဲ့ ဖွင့်မယ်
            if (currentSelectedLink) {
                window.location.href = `intent:${currentSelectedLink}#Intent;package=com.genuine.leone;type=video/*;end`;
            }
        }

        function closeDetails() {
            const v = document.getElementById('main-player');
            if(v) v.pause();
            document.getElementById('detail-view-container').classList.remove('active');
        }

        // Overlay & Filters
        function openOverlay(title, items, callback) {
            document.getElementById('overlay-title').innerText = title;
            const list = document.getElementById('overlay-list');
            list.innerHTML = items.map(item => `
                <button onclick="(${callback.toString()})('${item.value}'); closeOverlay();" class="w-full p-5 text-center text-[10px] font-black border-b border-white/5 active:bg-primary active:text-black uppercase tracking-widest transition-all">
                    ${item.label}
                </button>
            `).join('');
            document.getElementById('overlay').classList.replace('hidden', 'flex');
        }

        function closeOverlay() { document.getElementById('overlay').classList.replace('flex', 'hidden'); }

        // Button Clicks
        document.getElementById('src-btn').onclick = () => openOverlay("Server Source", movieSources, (val) => loadMovies(val));
        document.getElementById('gen-btn').onclick = () => {
            const genres = [...new Set(allMovies.map(m => m.category))];
            const items = [{label: "All Categories", value: "all"}, ...genres.map(g => ({label: g, value: g}))];
            openOverlay("Browse Genre", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.category === v)));
        };
        document.getElementById('yr-btn').onclick = () => {
            const years = [...new Set(allMovies.map(m => m.year))].sort((a,b)=>b-a);
            const items = [{label: "Any Year", value: "all"}, ...years.map(y => ({label: y, value: y}))];
            openOverlay("Release Year", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.year == v)));
        };
        document.getElementById('search-bar').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(term)));
        };
        document.getElementById('theme-toggle').onclick = () => document.documentElement.classList.toggle('dark');

        window.onload = () => loadMovies(movieSources[0].value);
    </script>
</body>
</html>
