<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Fotlivemovies - Official</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --sidebar-width: 260px;
      --primary-red: #ef4444;
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: white;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    /* --- Sidebar --- */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background-color: #020617;
      z-index: 2000; /* Sidebar ကို အပေါ်ဆုံးပို့ထားမယ် */
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: 1px solid #1e293b;
    }

    .sidebar-header {
      padding: 30px 20px;
      font-size: 1.5rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-header span { color: var(--primary-red); }

    .nav-content { padding: 10px; }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 14px 15px;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 10px;
      margin-bottom: 5px;
      transition: 0.2s;
    }
    .nav-item i { width: 30px; font-size: 18px; }
    .nav-item:hover, .nav-item.active {
      background-color: #1e293b;
      color: white;
    }
    .nav-item.active { border-left: 4px solid var(--primary-red); color: var(--primary-red); }

    /* --- Main Content --- */
    .main-content {
      margin-left: var(--sidebar-width);
      padding: 24px;
      transition: margin-left 0.3s;
    }

    /* --- Mobile Header --- */
    .mobile-header {
      display: none;
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      padding: 15px 20px;
      z-index: 1000;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    .menu-btn { font-size: 24px; cursor: pointer; padding: 5px; }

    /* --- Search box --- */
    .search-container {
      margin-bottom: 25px;
      position: relative;
      max-width: 500px;
    }
    .search-container input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }
    .search-container i { position: absolute; left: 15px; top: 16px; color: #64748b; }

    /* --- Movie Grid --- */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }
    .movie-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }
    .movie-card:hover { transform: translateY(-5px); }
    .movie-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    .movie-info { padding: 12px; }
    .movie-info h3 { margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* --- Sidebar Overlay --- */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1500;
    }

    /* --- Source Buttons --- */
    .src-btn {
      padding: 10px 20px;
      border-radius: 30px;
      border: none;
      background: #1e293b;
      color: #94a3b8;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
      transition: 0.3s;
    }
    .src-btn.active { background: var(--primary-red); color: white; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 15px; }
      .mobile-header { display: flex; }
      .overlay.active { display: block; }
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="sidebarOverlay"></div>

  <div class="mobile-header">
    <div class="menu-btn" id="openMenu"><i class="fas fa-bars-staggered"></i></div>
    <div style="font-weight: 800; font-size: 1.2rem;">Fotlive<span>movies</span></div>
    <div id="mobileSearchTrigger"><i class="fas fa-search"></i></div>
  </div>

  <div class="sidebar" id="sidebarMenu">
    <div class="sidebar-header"><i class="fas fa-film"></i> Fotlive<span>movies</span></div>
    <div class="nav-content">
      <a href="index.html" class="nav-item active"><i class="fas fa-house"></i> Home</a>
      <a href="series/index.html" class="nav-item"><i class="fas fa-tv"></i> Series</a>
      <a href="Adult/index.html" class="nav-item" style="color:red;"><i class="fas fa-eye-slash"></i><span>&nbsp;Adults (18+)</span></a>
            <a href="https://m-sport-download.static.hf.space" class="nav-item"><i class="fas fa-download"></i><span>&nbsp;TV Version</span></a>
      <a href="About.html" class="nav-item"><i class="fas fa-circle-info"></i> About</a>
    </div>
  </div>

  <div class="main-content">
    <div class="search-container">
      <i class="fas fa-search"></i>
      <input type="text" id="movieSearch" placeholder="Search by name...">
    </div>

    <div style="display: flex; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none;">
      <button class="src-btn" data-src="main">Source 1</button>
      <button class="src-btn" data-src="1">Source 2</button>
    </div>

    <div id="movieGrid" class="movie-grid"></div>
  </div>

  <script>
    // --- Configuration & State ---
    const CONFIG = {
      sources: [
         { key: "main", url: "https://zetflix-peach.vercel.app/Playlist/Movies/movies.json" },
            { key: "1", url: "movies.json" },
            { key: "2", url: "movies-1.json" }      
      ]
    };

    let allMovies = [];
    let currentSrc = localStorage.getItem('fotlive_pref_src') || "main";

    // --- DOM Elements ---
    const sidebar = document.getElementById('sidebarMenu');
    const overlay = document.getElementById('sidebarOverlay');
    const movieGrid = document.getElementById('movieGrid');
    const searchInput = document.getElementById('movieSearch');

    // --- 1. Sidebar Logic (Fixed) ---
    document.getElementById('openMenu').onclick = () => {
      sidebar.classList.add('open');
      overlay.classList.add('active');
    };

    overlay.onclick = () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    };

    // --- 2. Data Fetching ---
    async function initApp() {
      for (const s of CONFIG.sources) {
        try {
          const resp = await fetch(`${s.url}?v=${new Date().getTime()}`);
          const data = await resp.json();
          const tagged = data.map(m => ({ ...m, _source: s.key }));
          allMovies.push(...tagged);
        } catch (e) { console.error("Source error:", s.key); }
      }
      setupTabs();
      render();
    }

    // --- 3. Render Function ---
    function render() {
      const query = searchInput.value.toLowerCase();
      const filtered = allMovies.filter(m => 
        m._source === currentSrc && 
        (m.title || "").toLowerCase().includes(query)
      );

      movieGrid.innerHTML = filtered.length > 0 
        ? filtered.map(m => `
            <div class="movie-card" onclick="saveAndGo('${encodeURIComponent(JSON.stringify(m))}')">
              <img src="${m.logo || 'https://via.placeholder.com/300x450?text=No+Image'}" class="movie-poster" loading="lazy">
              <div class="movie-info">
                <h3>${m.title || 'Untitled'}</h3>
              </div>
            </div>
          `).join('')
        : `<p style="text-align:center; grid-column:1/-1; color:#64748b;">No movies found.</p>`;
    }

    // --- 4. Tabs & Save Function (Fixed) ---
    function setupTabs() {
      document.querySelectorAll('.src-btn').forEach(btn => {
        // အရင်သိမ်းထားတဲ့ source ကို active ပြမယ်
        if(btn.dataset.src === currentSrc) btn.classList.add('active');

        btn.onclick = () => {
          document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSrc = btn.dataset.src;
          localStorage.setItem('fotlive_pref_src', currentSrc); // ရွေးချယ်မှုသိမ်းမယ်
          render();
        };
      });
    }

    function saveAndGo(mStr) {
      localStorage.setItem('selectedMovie', decodeURIComponent(mStr));
      window.location.href = 'movie_detail.html';
    }

    // Search Input Event
    searchInput.oninput = render;

    // Mobile Search Focus
    document.getElementById('mobileSearchTrigger').onclick = () => searchInput.focus();

    window.onload = initApp;
  </script>
</body>
</html>
