<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S4ITMM FOOTBALL LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#facc15', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Plyr theme color customization */
        :root {
            --plyr-color-main: #facc15;
        }
        .plyr--video {
            height: 100%;
            width: 100%;
        }
        
        .ad-color-run {
            padding: 2px; border-radius: 16px;
            background: linear-gradient(270deg, #ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 600% 600%; animation: colorRun 4s linear infinite;
        }
        @keyframes colorRun { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        .ad-color-run img { border-radius: 14px; }
        .ad-color-run button { border-radius: 14px; background: #1e293b; color: white; width: 100%; height: 100%; }

        .match-card {
            border-radius: 24px; padding: 20px;
            border: 1px solid rgba(0,0,0,0.05); margin-bottom: 16px; transition: all 0.3s ease;
        }
        .dark .match-card { background-color: #1a2436; border-color: rgba(255,255,255,0.05); }
        .light .match-card { background-color: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .live-dot {
            width: 8px; height: 8px; background: #ef4444; border-radius: 50%;
            display: inline-block; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .play-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; align-items: stretch; }
        .btn-play { 
            padding: 12px 8px; font-size: 10px; font-weight: 800; 
            text-transform: uppercase; display: flex; align-items: center; 
            justify-content: center; gap: 6px; transition: 0.2s;
        }
        .btn-app { border-radius: 16px; background: rgba(250,204,21,0.1); color: #facc15; border: 1px solid rgba(250,204,21,0.2); }
        .btn-app.active { background: #facc15; color: #000; }
        .no-select { user-select: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300 no-select">
    
    <div id="sidebar-container"></div>

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex justify-between items-center">
        <button id="menu-btn" class="text-primary text-2xl w-10 text-left">
            <i class="fas fa-bars-staggered"></i>
        </button>
        <div class="flex flex-col items-center">
            <span class="text-primary font-black text-xl tracking-tighter leading-none">Bamarthan</span>
            <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Football VN</span>
        </div>
        <div class="w-10 text-right">
            <button id="theme-toggle" class="text-xl text-slate-600 dark:text-primary">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <main id="list-view" class="p-4 pt-20">
        <div class="mb-5 bg-red-600/10 border border-red-500/20 rounded-2xl p-4 flex items-center gap-4 shadow-sm">
            <div class="bg-red-500 p-3 rounded-xl shadow-lg shadow-red-500/20">
                <i class="fas fa-shield-halved text-white text-lg"></i>
            </div>
            <div>
                <p class="text-[11px] font-black dark:text-red-400 text-red-600 leading-snug uppercase tracking-tight">
                    မြန်မာအချို့နေရာများတွင် VPN လိုအပ်နိုင်ပါသည်။ <br>မြန်မာသံ Football live ကြည့်ရန် နှင့်
                   စုံလင်တဲ့အစီစဉ်များကြည့်ရန် <span class="text-primary">APP ‌ဒေါင်းယူ၍</span>  ကြည့်နိုင်ပါသည်။
                </p>
            </div>
        </div>

        <div class="mb-6">
            <a href="https://m-sport-download.static.hf.space/">
                <div class="ad-color-run shadow-lg" style="padding:3px; border-radius:20px;">
                    <img src="https://bamarthan.vercel.app/downapk.gif" class="w-full h-auto block bg-black" style="border-radius:17px;">
                </div>
            </a>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-6">
            <button onclick="filterMatches('all', this)" id="btn-all" class="filter-btn bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[9px] font-black uppercase ring-primary border-primary ring-2 transition-all">All</button>
            <button onclick="filterMatches('live', this)" class="filter-btn bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[9px] font-black uppercase text-red-500 transition-all">Live</button>
            <button onclick="filterMatches('main', this)" class="filter-btn bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[9px] font-black uppercase text-blue-500 transition-all">Main</button>
            <button onclick="fetchMatches()" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[9px] font-black uppercase text-primary active:scale-90 transition-all"><i class="fas fa-sync-alt"></i></button>
        </div>

        <div id="movie-grid"></div>
    </main>

    <main id="detail-view" class="fixed inset-0 z-[60] bg-slate-50 dark:bg-darkBg hidden flex-col overflow-y-auto">
        <div class="relative w-full aspect-video bg-black shadow-2xl">
            <video id="player" playsinline webkit-playsinline controls class="w-full h-full object-cover"></video>
            <button onclick="handleBackAction()" class="absolute top-6 left-4 z-20 w-10 h-10 bg-black/50 rounded-full flex justify-center items-center text-primary backdrop-blur-md border border-white/10">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>
        <div class="p-6">
            <div class="mb-4 bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-3 flex items-center gap-3">
                <i class="fas fa-circle-exclamation text-yellow-500 text-sm"></i>
                <p class="text-[9px] font-bold text-yellow-600 dark:text-yellow-500 uppercase">လိုင်းမပွင့်ပါက VPN သုံးပေးပါ။(NS PLAYER= Network streaming video player)</p>
            </div>
            
            <div id="match-detail-container"></div>
        </div>
    </main>

    <script src="../sidebar.js"></script>
<script>
    let allMatches = [];
    let player = null;      // Plyr Instance
    let hlsInstance = null; // Hls Instance
    
    const PROXY_IMG = "https://wsrv.nl/?url=";
    const VIDEO_PROXY = "https://my-proxy-wt0l.onrender.com/proxy?url=";
    const DEFAULT_LOGO = "https://cdn-icons-png.flaticon.com/512/53/53254.png";

    window.onpopstate = () => { if (document.getElementById('detail-view').style.display !== 'none') closeDetail(); };
    function handleBackAction() { window.history.back(); }
    function getImg(url) { return url ? `${PROXY_IMG}${encodeURIComponent(url)}&w=100&h=100&fit=contain` : DEFAULT_LOGO; }

    async function fetchMatches() {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = '<div class="text-center py-20 opacity-30 animate-pulse font-bold text-xs uppercase">Updating Matches...</div>';
        try {
            const res = await fetch('https://nextjs-mobile-one.vercel.app/api/get-matches.js?_t=' + Date.now());
            const data = await res.json();
            allMatches = data.context || [];
            filterMatches('all', document.getElementById('btn-all'));
        } catch (e) { grid.innerHTML = "<p class='text-center opacity-50 py-10'>No Connection</p>"; }
    }

    function renderMatches(data) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = '';
        data.forEach(m => {
            const matchDate = new Date(m.match_time * 1000);
            const tStr = matchDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const dStr = matchDate.toLocaleDateString([], {month: 'short', day: '2-digit'});

            const card = document.createElement('div');
            card.className = "match-card cursor-pointer active:scale-95 transition-all";
            card.innerHTML = `
                <div class="text-center mb-4"><span class="text-blue-500 dark:text-blue-400 text-[10px] font-black uppercase block truncate px-4 tracking-wider">${m.league}</span></div>
                <div class="flex items-center justify-between">
                    <div class="flex flex-col items-center w-[35%]">
                        <img src="${getImg(m.home_img)}" class="w-12 h-12 object-contain mb-3" onerror="this.src='${DEFAULT_LOGO}'">
                        <span class="text-[10px] font-bold text-center leading-tight uppercase dark:text-white/90">${m.home_name}</span>
                    </div>
                    <div class="flex flex-col items-center w-[30%]">
                        <span class="text-[10px] opacity-50 mb-1">${dStr}</span>
                        <span class="text-base font-black dark:text-white">${tStr}</span>
                        ${m.match_status ? '<div class="mt-2 flex items-center gap-1 text-red-500 text-[9px] font-black uppercase"><span class="live-dot"></span> LIVE NOW</div>' : ''}
                    </div>
                    <div class="flex flex-col items-center w-[35%]">
                        <img src="${getImg(m.away_img)}" class="w-12 h-12 object-contain mb-3" onerror="this.src='${DEFAULT_LOGO}'">
                        <span class="text-[10px] font-bold text-center leading-tight uppercase dark:text-white/90">${m.away_name}</span>
                    </div>
                </div>
            `;
            card.onclick = () => openDetail(m);
            grid.appendChild(card);
        });
    }

    function openDetail(match) {
        window.history.pushState({view: 'detail'}, '');
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('detail-view').style.display = 'flex';
        document.getElementById('detail-view').classList.remove('hidden');
        
        const container = document.getElementById('match-detail-container');
        const links = match.links || [];

        let linksContent = links.length === 0 ? `<div class="bg-yellow-500/10 border border-yellow-500/20 rounded-2xl p-6 text-center mt-4"><p class="text-yellow-500 text-[11px] font-bold uppercase">ပွဲစဉ်အချိန်နီးမှ လိုင်းများပေါ်ပါမည်။</p></div>` : 
            links.map((l, i) => `
                <div class="flex flex-col mb-4">
                    <span class="text-[10px] font-bold opacity-40 uppercase mb-2 tracking-widest pl-1">${l.name}</span>
                    <div class="play-row">
                        <button onclick="playStream('${escUrl(l.url)}', this)" class="btn-play btn-app ${i === 0 ? 'active' : ''}"><i class="fas fa-play"></i> App Play</button>
                        <div class="ad-color-run"><button onclick="openNetworkPlayer('${escUrl(l.url)}', '${escStr(match.home_name)} vs ${escStr(match.away_name)}')" class="btn-play"><i class="fas fa-external-link-alt"></i>NS PLAYER</button></div>
                    </div>
                </div>
            `).join('');

        container.innerHTML = `<div class="text-center mb-6"><h2 class="text-lg font-black uppercase dark:text-white">${match.home_name} VS ${match.away_name}</h2><p class="text-primary text-[10px] font-bold mt-1 uppercase">${match.league}</p></div><div class="space-y-2">${linksContent}</div>`;
        
        if (links.length > 0) playStream(links[0].url);
    }

    function escUrl(url) { return url.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
    function escStr(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    // Multi-platform Optimized Video Engine (iOS, Android, Android TV, PC, Web Browser)
    function playStream(url, btn) {
        if(btn) { document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        let finalUrl = url.includes('niuerr.live') ? VIDEO_PROXY + encodeURIComponent(url) : url;
        
        const video = document.getElementById('player');
        
        // Cleanup existing instances safely
        if (player) { player.destroy(); player = null; }
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        
        const plyrConfig = {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            clickable: true,
            keyboard: { focused: true, global: true } // Better navigation for Smart TV / PC keyboards
        };

        // 1. For Native HLS Support (iOS Safari, Mac Safari, Apple WebViews)
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = finalUrl;
            player = new Plyr(video, plyrConfig);
        } 
        // 2. For Hls.js supported browsers (Android Chrome, PC Chrome/Firefox, Android TV WebViews)
        else if (Hls.isSupported()) {
            hlsInstance = new Hls({
                maxMaxBufferLength: 10,
                enableWorker: true,
                lowLatencyMode: true
            });
            hlsInstance.loadSource(finalUrl);
            hlsInstance.attachMedia(video);
            
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                player = new Plyr(video, plyrConfig);
            });

            hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            hlsInstance.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            hlsInstance.recoverMediaError();
                            break;
                        default:
                            break;
                    }
                }
            });
        } 
        // 3. Fallback standard source definition
        else {
            video.src = finalUrl;
            player = new Plyr(video, plyrConfig);
        }
        
        video.play().catch(err => console.log("Autoplay context resolution:", err));
    }

    function openNetworkPlayer(url, title) { window.location.href = `intent:${url}#Intent;package=com.genuine.leone;type=video/*;S.title=${encodeURIComponent(title)};end`; }

    function filterMatches(type, btn) {
        if (btn) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('ring-2', 'ring-primary', 'border-primary')); btn.classList.add('ring-2', 'ring-primary', 'border-primary'); }
        let filtered = allMatches;
        if (type === 'live') filtered = allMatches.filter(m => m.match_status);
        else if (type === 'main') filtered = allMatches.filter(m => m.is_main);
        renderMatches(filtered);
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');

    window.addEventListener('load', () => {
        fetchMatches();
    });

    function closeDetail() {
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('detail-view').classList.add('hidden');
        document.getElementById('list-view').classList.remove('hidden');
        
        if (player) { player.destroy(); player = null; }
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    }
</script>
    
</body>
</html>
