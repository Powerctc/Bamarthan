<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOTMOV MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#facc15', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style>
        /* မင်းရဲ့ sidebar logic နဲ့ မငြိအောင် scroll ပိတ်တဲ့ style */
        body.modal-open { overflow: hidden; }
        #detail-view-container { 
            transition: transform 0.4s ease; 
            transform: translateX(100%); 
        }
        #detail-view-container.active { transform: translateX(0); }
    </style>
</head>
<body class="bg-darkBg text-slate-100 transition-colors duration-300 overflow-x-hidden">

    <div id="sidebar-container"></div> 

    <div id="main-ui">
        <header class="fixed top-0 w-full z-40 bg-darkBg/80 backdrop-blur-md border-b border-slate-800 px-4 py-3 flex justify-between items-center">
            <button id="menu-btn" class="text-primary text-2xl w-10 text-left">
                <i class="fas fa-bars-staggered"></i>
            </button>
            <div class="flex flex-col items-center">
                <span class="text-primary font-black text-xl tracking-tighter">FOTMOV</span>
                <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Mobile</span>
            </div>
            <div class="w-10 text-right">
                <button id="theme-toggle" class="text-xl text-primary"><i class="fas fa-sun"></i></button>
            </div>
        </header>

        <main class="mt-20 p-4">
            <div id="movie-grid" class="grid grid-cols-2 gap-4"></div>
        </main>
    </div>

    <div id="detail-view-container" class="fixed inset-0 z-[100] bg-darkBg overflow-y-auto hidden"></div>

    <script src="sidebar.js"></script> <script src="movie_detail.js"></script> <script>
        // မင်းရဲ့ sidebar.js ထဲမှာ menu-btn ကို နှိပ်ရင် sidebar ပွင့်တဲ့ logic ပါရပါမယ်။
        
        // Movie Grid Render လုပ်တဲ့အခါ card.onclick ကို ဒီလိုသုံးပါ
        function renderMovies(data) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            data.forEach(m => {
                const card = document.createElement('div');
                card.className = "bg-darkCard rounded-2xl overflow-hidden shadow-sm active:scale-95 transition-all";
                card.innerHTML = `<img src="${m.logo}" class="w-full aspect-[3/4] object-cover">
                                  <div class="p-3"><h3 class="text-[10px] font-bold line-clamp-1">${m.title}</h3></div>`;
                
                // ဒီနေရာမှာ Detail ကို လှမ်းခေါ်မယ်
                card.onclick = () => {
                    if(typeof showMovieDetails === "function") {
                        showMovieDetails(m); 
                    }
                };
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
