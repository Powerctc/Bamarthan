<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Detail Card</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .movie-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-5px);
        }

        .movie-poster {
            width: 100%;
            height: none;
            object-fit: cover;
            border-bottom: 3px solid #3b82f6;
        }

        .movie-content {
            padding: 20px;
        }

        .movie-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #fff;
        }

        .movie-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .badge {
            background: #334155;
            padding: 4px 10px;
            border-radius: 6px;
            color: #3b82f6;
            font-weight: 600;
        }

        .btn-watch {
            display: block;
            background: #3b82f6;
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-watch:hover {
            background: #2563eb;
        }
         /* --- Running Color Banner --- */

    .banner-container {

      position: relative;

      margin-bottom: 30px;

      padding: 3px;

      border-radius: 18px;

      background: linear-gradient(270deg, #ff0000, #ffff00, #00ff00, #0000ff, #ff00ff, #ff0000);

      background-size: 600%;

      animation: colorRun 5s linear infinite;

      overflow: hidden;

    }

    @keyframes colorRun { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    .banner-inner { background: var(--bg-dark); border-radius: 15px; overflow: hidden; }

    .banner-inner img { width: 100%; display: block; object-fit: cover; max-height: 220px; }
    
    </style>
</head>
<body>

    <div class="movie-card">
