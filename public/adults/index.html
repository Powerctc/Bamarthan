<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4ITMM - Movies Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Color Running Button Animation */
        @keyframes colorRun {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .color-btn {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: colorRun 4s ease infinite;
            box-shadow: 0 4px 15px rgba(231, 60, 126, 0.3);
        }

        /* 1 Row 2 Cards Grid Customization */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .movie-card:active {
            transform: scale(0.95);
        }

        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto mb-6 text-center">
        <h1 class="text-xl font-bold text-white mb-4">Lotaya Movies Selection</h1>
        
        <a href="https://m-sport-download.static.hf.space/" 
           class="color-btn w-full block py-4 rounded-2xl text-white font-black uppercase tracking-wider text-sm shadow-lg mb-6">
            <i class="fas fa-download mr-2"></i> ပိုမိုကြည့်ရှုရန် App ကို ဒေါင်းလုဒ်ဆွဲပါ
        </a>
    </div>

    <div id="movie-grid" class="movie-grid max-w-md mx-auto">
        <div class="animate-pulse bg-slate-800 h-60 rounded-12"></div>
        <div class="animate-pulse bg-slate-800 h-60 rounded-12"></div>
    </div>

    <div id="error-msg" class="hidden text-center mt-10 text-slate-500 text-sm">
        <i class="fas fa-exclamation-circle mb-2 text-2xl"></i>
        <p>ဒေတာရယူ၍မရပါ သို့မဟုတ် ခွင့်ပြုချက်မရှိပါ။</p>
    </div>

    <script>
        // ၁။ လုံခြုံရေးအတွက် Session စစ်ဆေးခြင်း
        // အကယ်၍ Verification မလုပ်ထားရင် index (သို့မဟုတ်) ပြန်ပို့မယ်
        if (sessionStorage.getItem("unlocked") !== "yes") {
            window.location.replace("index.html");
        }

        async function loadMovies() {
            const grid = document.getElementById('movie-grid');
            const errorMsg = document.getElementById('error-msg');

            try {
                // ၂။ ကျွန်တော်တို့ တည်ဆောက်ခဲ့တဲ့ API ကို လှမ်းခေါ်ခြင်း
                const response = await fetch('/api/movies/jav');
                
                if (!response.ok) throw new Error('Unauthorized');

                const movies = await response.json();
                
                // Grid ကို ရှင်းထုတ်ခြင်း
                grid.innerHTML = '';

                // ၃။ ရလာတဲ့ ၁၀ ကား (၅ ကားစီ) ကို ပတ်ပြီး ပြသခြင်း
                movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card border border-slate-800 shadow-xl';
                    
                    card.innerHTML = `
                        <div class="relative">
                            <img src="${movie.poster || movie.image || 'https://via.placeholder.com/200x300'}" 
                                 class="w-full aspect-[2/3] object-cover" 
                                 alt="movie">
                            <div class="absolute top-2 right-2 bg-black/60 px-2 py-1 rounded text-[10px] font-bold text-red-400 uppercase">
                                HD
                            </div>
                        </div>
                        <div class="p-3">
                            <h3 class="text-xs font-semibold text-slate-200 line-clamp-1">${movie.title}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = '';
                errorMsg.classList.remove('hidden');
            }
        }

        // စာမျက်နှာစဖွင့်သည်နှင့် Load လုပ်မည်
        window.onload = loadMovies;
    </script>
</body>
</html>
