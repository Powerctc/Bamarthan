    .main-content {

      color: #ef4444;

    }

    .device-info {
      font-size: 13px;
      color: #60a5fa;
      margin-top: 4px;
      background: #1f2937;
      padding: 8px 12px;
      border-radius: 8px;
      display: inline-block;
      border-left: 4px solid #ef4444;
    }

    .movie-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-start;
      margin-top: 20px;
    }

    .movie-col {
      width: calc(50% - 6px);
    }

    @media (min-width: 640px) { .movie-col { width: calc(33.333% - 8px); } }
    @media (min-width: 768px) { .movie-col { width: calc(25% - 9px); } }
    @media (min-width: 1024px) { .movie-col { width: calc(20% - 9.6px); } }
    @media (min-width: 1280px) { .movie-col { width: calc(16.666% - 10px); } }

    .movie-card {
      background-color: #1f2937;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      padding: 8px;
      box-sizing: border-box;
      transition: transform 0.2s;
    }
    
    .movie-card:hover {
      transform: scale(1.03);
      background-color: #374151;
    }

    .movie-poster {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background-color: #111;
      border-radius: 4px;
    }

    .movie-card .info {
      padding: 10px 6px;
      text-align: center;
    }

    .movie-card .info h3 {
      font-size: 14px;
      font-weight: bold;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-card .info p {
      font-size: 12px;
      color: #9ca3af;
      margin: 0;
    }

    footer {

      text-align: center;
      padding: 20px;
      margin-top: 32px;
      font-size: 14px;
      border-top: 1px solid #374151;
    }

    footer a {
      color: #ef4444;

  <!-- STABLE DEVICE ID & DATABASE EXPIRY CHECKER -->
  <script>
    const HF_BASE_URL = "https://livesportmm-s4itmmapprover.hf.space";

    function getStableID() {
        try {
            // Check localStorage first
            let id = localStorage.getItem("s4itmm_stable_id");
            if (id && id.length === 12) return id;

            // Generate using Canvas Fingerprint (Stable)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const txt = 'S4ITMM-TV-DEVICE-ID-2026';
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.fillText(txt, 2, 15);
            const b64 = canvas.toDataURL().replace("data:image/png;base64,", "");
            let hash = 0;
            for (let i = 0; i < b64.length; i++) {
                hash = (hash << 5) - hash + b64.charCodeAt(i);
                hash = hash & hash;
            }
            const screenInfo = window.screen.width + "x" + window.screen.height;
            const finalRaw = Math.abs(hash).toString() + navigator.platform + screenInfo;
            let finalHash = 0;
            for (let j = 0; j < finalRaw.length; j++) {
                finalHash = (finalHash << 5) - finalHash + finalRaw.charCodeAt(j);
            }
            id = Math.abs(finalHash).toString().padStart(12, "0").slice(0, 12);
            localStorage.setItem("s4itmm_stable_id", id);
            return id;
        } catch (e) {
            return "000000000000";
        }
    }

    async function updateAccessInfo() {
        const infoDiv = document.getElementById("device-info");
        const currentID = getStableID();
        
        try {
            // Fetch from your Database (Hugging Face / GitHub)
            const res = await fetch(`${HF_BASE_URL}/approved_users.json?_t=${Date.now()}`, { cache: "no-store" });
            if (!res.ok) throw new Error();
            
            const users = await res.json();
            const user = users.find(u => u.id === currentID);
            
            if (user) {
                // Formatting Date
                const expDate = new Date(user.expires);
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                const formattedDate = expDate.toLocaleDateString('en-GB', options);
                
                infoDiv.innerHTML = `<i class="fas fa-tv"></i> Device ID: <b>${currentID}</b> | <i class="fas fa-calendar-alt"></i> Expires: <b>${formattedDate}</b>`;
            } else {
                infoDiv.innerHTML = `Device ID: ${currentID} | Trial Mode`;
            }
        } catch (e) {
            infoDiv.innerHTML = `Device ID: ${currentID} | Offline Mode`;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        updateAccessInfo();
        fetchMovies();
    });
  </script>

  <!-- MOVIES LOADER (STAYS SAME) -->
  <script>
    async function fetchMovies() {
      const grid = document.getElementById('movie-grid');
      try {
        const res = await fetch('./movies.json?_t=' + Date.now(), { cache: 'no-store' });
        const movies = await res.json();
        renderMovies(Array.isArray(movies) ? movies : []);
      } catch (err) {
        grid.innerHTML = '<div style="color:#f87171; text-align:center; width:100%; padding:30px;">❌ Failed to load movies.</div>';
      }
    }

    function renderMovies(movies) {
      const grid = document.getElementById('movie-grid');
      grid.innerHTML = '';
      movies.forEach(movie => {
        const col = document.createElement('div');
        col.className = 'movie-col';
        const card = document.createElement('div');
        card.className = 'movie-card';
        const poster = (movie.logo || '').trim() || 'https://via.placeholder.com/220x220?text=No+Image';
        card.innerHTML = `
          <img src="${poster}" class="movie-poster" alt="${movie.title}">
          <div class="info">
            <h3>${movie.title || 'Untitled'}</h3>
            <p>${movie.category || ''} ${movie.year ? '('+movie.year+')' : ''}</p>
          </div>
        `;
        card.addEventListener('click', () => {
          localStorage.setItem('selectedMovie', JSON.stringify(movie));
          window.location.href = 'movie_detail.html';
        });
        col.appendChild(card);
        grid.appendChild(col);
      });
    }
  </script>
