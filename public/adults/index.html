<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>S4ITMM Adults - Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #020617;
      --accent-red: #ef4444;
      --accent-yellow: #facc15;
      --card-bg: rgba(30, 41, 59, 0.5);
    }

    body {
      background-color: var(--bg-dark);
      color: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      margin: 0;
    }

    /* --- Sidebar --- */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #0f172a;
      z-index: 2000;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .sidebar.open { transform: translateX(0); }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      margin: 5px 15px;
      border-radius: 12px;
      color: #94a3b8;
      transition: 0.2s;
    }
    .nav-item.active {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-red);
      font-weight: bold;
    }

    /* --- Glassmorphism --- */
    .glass-box {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* --- Movie Card Styling --- */
    .movie-card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .movie-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-red);
    }
    .img-container {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
    }

    /* --- VPN Buttons --- */
    .btn-vpn {
      background: linear-gradient(135deg, #ec4899, #be185d);
      padding: 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      transition: 0.2s;
    }
    .btn-vpn:active { transform: scale(0.95); }

    /* --- Overlay --- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 1024px) {
      .sidebar { transform: translateX(0); width: 260px; }
      main { margin-left: 260px; }
      .mobile-header { display: none; }
    }
  </style>
</head>
<body class="select-none">

  <header class="mobile-header fixed top-0 left-0 right-0 h-16 glass-box z-50 flex items-center justify-between px-5">
    <div class="flex items-center gap-4">
      <button id="menu-btn" class="text-yellow-400 text-2xl active:scale-90 transition-transform">
        <i class="fas fa-bars-staggered"></i>
      </button>
      <h1 class="text-xl font-black text-yellow-400">S4ITMM <span class="text-white text-xs opacity-50 font-light tracking-widest">ADULTS</span></h1>
    </div>
    <div class="text-white/20"><i class="fas fa-shield-halved"></i></div>
  </header>

  <aside id="sidebar" class="sidebar">
    <div class="p-8 text-center border-b border-white/5">
        <h1 class="text-3xl font-black text-yellow-400">S4ITMM</h1>
        <p class="text-[10px] text-white/40 tracking-widest uppercase mt-1">Premium Streaming</p>
    </div>
    <nav class="mt-6">
      <a href="https://fotlivemovies.vercel.app/index.html" class="nav-item"><i class="fas fa-house"></i>ရုပ်ရှင်ကြည့်မယ်</a>
      <a href="https://fotlivemovies.vercel.app/series/index.html" class="nav-item"><i class="fas fa-tv"></i>ဇာတ်လမ်းတွဲ</a>
      <a href="https://fotlivemovies.vercel.app/adults/index.html" class="nav-item active" style="color:#f87171;"><i class="fas fa-eye-slash"></i><span>&nbsp;လူကြီးကြိုက်</span></a>
      <a href="https://m-sport-download.static.hf.space" class="nav-item"><i class="fas fa-download"></i><span>&nbsp;App ဒေါင်းရန်</span></a>
      <a href="https://fotlivemovies.vercel.app/About.html" class="nav-item"><i class="fas fa-circle-info"></i>Appအကြောင်း</a>
    </nav>
  </aside>

  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/80 z-[1500] hidden lg:hidden backdrop-blur-sm"></div>

  <main class="pt-24 lg:pt-8 p-4 max-w-7xl mx-auto">
    
    <div class="grid grid-cols-3 gap-3 mb-8">
      <a href="https://www.xnxx.com/" class="btn-vpn"><i class="fas fa-globe mr-1"></i> XNXX</a>
      <a href="https://www.pornhub.org/" class="btn-vpn"><i class="fas fa-globe mr-1"></i> HUB</a>
      <a href="https://blue.lawka-ahla.com/" class="btn-vpn"><i class="fas fa-book mr-1"></i> စာအုပ်</a>
      <a href="https://yotepya.com/" class="btn-vpn"><i class="fas fa-mask mr-1"></i> ရုပ်ပြ</a>
      <a href="https://nyakabyar.com/" class="btn-vpn"><i class="fas fa-feather mr-1"></i> ကဗျာ</a>
      <button id="source-trigger" class="btn-vpn" style="background: var(--accent-yellow); color: black;">
        <i class="fas fa-layer-group mr-1"></i> SOURCE
      </button>
    </div>

    <div id="loading" class="flex flex-col items-center py-20 hidden">
        <div class="border-3 border-white/10 border-t-red-500 rounded-full w-10 h-10 animate-spin"></div>
    </div>
    <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
      </div>
  </main>

  <div id="overlay" class="overlay">
    <div class="overlay-content glass-box p-6 w-[90%] max-w-sm rounded-3xl border border-white/10">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold text-yellow-400 uppercase text-sm tracking-widest">Select Source</h3>
        <button id="overlay-close" class="text-white/50 text-xl"><i class="fas fa-times"></i></button>
      </div>
      <div id="source-list" class="flex flex-col gap-2"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      sources: [
        { label: "Adults Server 1", value: "movies.json" },
        { label: "Adults Server 2", value: "adults.m3u" },
        { label: "Global Server 3", value: "https://raw.githubusercontent.com/atsushi444/iptv/7e4e06c7155021964ee749cfae37512f389adb40/0108.m3u" }
      ]
    };

    // Data Parsing & Fetching
    async function fetchData(url) {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('movie-grid').innerHTML = '';
      try {
        const res = await fetch(url);
        const text = await res.text();
        let list = [];
        if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
          const json = JSON.parse(text);
          const items = json.items || (Array.isArray(json) ? json : []);
          list = items.map(i => ({ title: i.title || i.name, logo: i.logo || i.image, link: i.link || i.url }));
        } else {
          const lines = text.split('\n');
          let current = {};
          lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
              const logoMatch = line.match(/tvg-logo="([^"]+)"/);
              current.logo = logoMatch ? logoMatch[1] : '';
              current.title = line.split(',').pop().trim();
            } else if (line.startsWith('http')) {
              current.link = line;
              list.push(current);
              current = {};
            }
          });
        }
        renderMovies(list);
      } catch (e) { console.error("Error fetching data"); }
      document.getElementById('loading').classList.add('hidden');
    }

    function renderMovies(list) {
      const grid = document.getElementById('movie-grid');
      grid.innerHTML = list.map(m => `
        <div class="movie-card" onclick="goDetail('${encodeURIComponent(JSON.stringify(m))}')">
          <div class="img-container">
            <img src="${m.logo}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://placehold.co/400x225/1e293b/white?text=18+'">
            <div class="absolute top-2 right-2 bg-red-600 text-[8px] font-bold px-2 py-1 rounded-full animate-pulse">LIVE</div>
          </div>
          <div class="p-3">
            <h3 class="text-[10px] font-bold truncate text-slate-200 uppercase tracking-tight">${m.title}</h3>
          </div>
        </div>
      `).join('');
    }

    window.goDetail = (data) => {
      localStorage.setItem("selectedMovie", decodeURIComponent(data));
      window.location.href = "movie_detail.html";
    };

    // UI Events
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    
    document.getElementById('menu-btn').onclick = () => {
      sidebar.classList.add('open');
      backdrop.classList.remove('hidden');
    };

    backdrop.onclick = () => {
      sidebar.classList.remove('open');
      backdrop.classList.add('hidden');
    };

    document.getElementById('source-trigger').onclick = () => {
      const listDiv = document.getElementById('source-list');
      listDiv.innerHTML = CONFIG.sources.map(s => `
        <button onclick="changeSrc('${s.value}')" class="w-full text-left p-4 rounded-xl bg-white/5 hover:bg-red-500/20 hover:text-red-500 transition font-bold text-xs uppercase">
          ${s.label}
        </button>
      `).join('');
      document.getElementById('overlay').style.display = 'flex';
    };

    window.changeSrc = (val) => {
      document.getElementById('overlay').style.display = 'none';
      fetchData(val);
    };

    document.getElementById('overlay-close').onclick = () => { document.getElementById('overlay').style.display = 'none'; };

    window.onload = () => {
      fetchData(CONFIG.sources[0].value);
    };
  </script>
</body>
</html>
