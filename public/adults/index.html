<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>S4ITMM Adults - Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #020617;
      --accent-red: #ef4444;
      --accent-yellow: #facc15;
      --card-bg: rgba(30, 41, 59, 0.5);
    }

    body {
      background-color: var(--bg-dark);
      color: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      margin: 0;
    }

    /* --- Sidebar --- */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #0f172a;
      z-index: 2000;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .sidebar.open { transform: translateX(0); }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      margin: 5px 15px;
      border-radius: 12px;
      color: #94a3b8;
      transition: 0.2s;
    }
    .nav-item.active {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-red);
      font-weight: bold;
    }

    /* --- Glassmorphism --- */
    .glass-box {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* --- Movie Card Styling --- */
    .movie-card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .movie-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-red);
    }
    .img-container {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
    }

    /* --- VPN Buttons --- */
    .btn-vpn {
      background: linear-gradient(135deg, #ec4899, #be185d);
      padding: 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      transition: 0.2s;
    }
    .btn-vpn:active { transform: scale(0.95); }

    /* --- Overlay --- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 1024px) {
      .sidebar { transform: translateX(0); width: 260px; }
      main { margin-left: 260px; }
      .mobile-header { display: none; }
    }
  </style>
</head>
<body class="select-none">

  <header class="mobile-header fixed top-0 left-0 right-0 h-16 glass-box z-50 flex items-center justify-between px-5">
    <div class="flex items-center gap-4">
      <button id="menu-btn" class="text-yellow-400 text-2xl active:scale-90 transition-transform">
        <i class="fas fa-bars-staggered"></i>
      </button>
      <h1 class="text-xl font-black text-yellow-400">S4ITMM <span class="text-white text-xs opacity-50 font-light tracking-widest">ADULTS</span></h1>
    </div>
    <div class="text-white/20"><i class="fas fa-shield-halved"></i></div>
  </header>

  <aside id="sidebar" class="sidebar">
    <div class="p-8 text-center border-b border-white/5">
        <h1 class="text-3xl font-black text-yellow-400">S4ITMM</h1>
        <p class="text-[10px] text-white/40 tracking-widest uppercase mt-1">Premium Streaming</p>
    </div>
    <nav class="mt-6">
      <a href="https://fotlivemovies.vercel.app/index.html" class="nav-item"><i class="fas fa-house"></i>ရုပ်ရှင်ကြည့်မယ်</a>
      <a href="https://fotlivemovies.vercel.app/series/index.html" class="nav-item"><i class="fas fa-tv"></i>ဇာတ်လမ်းတွဲ</a>
      <a href="https://fotlivemovies.vercel.app/adults/index.html" class="nav-item active" style="color:#f87171;"><i class="fas fa-eye-slash"></i><span>&nbsp;လူကြီးကြိုက်</span></a>
      <a href="https://m-sport-download.static.hf.space" class="nav-item"><i class="fas fa-download"></i><span>&nbsp;App ဒေါင်းရန်</span></a>
      <a href="https://fotlivemovies.vercel.app/About.html" class="nav-item"><i class="fas fa-circle-info"></i>Appအကြောင်း</a>
    </nav>
  </aside>

  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/80 z-[1500] hidden lg:hidden backdrop-blur-sm"></div>

  <main class="pt-24 lg:pt-8 p-4 max-w-7xl mx-auto">
    
    <div class="grid grid-cols-3 gap-3 mb-8">
      <a href="https://www.xnxx.com/" class="btn-vpn"><i class="fas fa-globe mr-1"></i> XNXX</a>
      <a href="https://www.pornhub.org/" class="btn-vpn"><i class="fas fa-globe mr-1"></i> HUB</a>
      <a href="https://blue.lawka-ahla.com/" class="btn-vpn"><i class="fas fa-book mr-1"></i> စာအုပ်</a>
      <a href="https://yotepya.com/" class="btn-vpn"><i class="fas fa-mask mr-1"></i> ရုပ်ပြ</a>
      <a href="https://myanmarxnxxadultonly.blogspot.com/?m=1" class="btn-vpn"><i class="fas fa-feather mr-1"></i>ရှယ်ပလန်</a>
      <button id="source-trigger" class="btn-vpn" style="background: var(--accent-yellow); color: black;">
        <i class="fas fa-layer-group mr-1"></i> SOURCE
      </button>
    </div>

    <div id="loading" class="flex flex-col items-center py-20 hidden">
        <div class="border-3 border-white/10 border-t-red-500 rounded-full w-10 h-10 animate-spin"></div>
    </div>
    <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
      </div>
  </main>

  <div id="overlay" class="overlay">
    <div class="overlay-content glass-box p-6 w-[90%] max-w-sm rounded-3xl border border-white/10">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold text-yellow-400 uppercase text-sm tracking-widest">Select Source</h3>
        <button id="overlay-close" class="text-white/50 text-xl"><i class="fas fa-times"></i></button>
      </div>
      <div id="source-list" class="flex flex-col gap-2"></div>
    </div>
  </div>

  <script>
    const movieSources = [
      { label: "Adults-1", value: "movies.json" },
      { label: "Adults-2", value: "adults.m3u" },
      { label: "Adults-3", value: "https://raw.githubusercontent.com/atsushi444/iptv/7e4e06c7155021964ee749cfae37512f389adb40/0108.m3u" }
    ];

    // LocalStorage Keys
    const KEY_LAST_SRC = "s4itmm_last_source_v2";
    const KEY_LAST_WATCHED = "s4itmm_last_watched_link";

    function getStableDeviceId() {
      let id = localStorage.getItem('zetflix_device_id_mob');
      if (id) return id;
      const finalID = "MOB-" + Math.random().toString(36).substr(2, 9).toUpperCase();
      localStorage.setItem('zetflix_device_id_mob', finalID);
      return finalID;
    }

    async function initUserInfo() {
      const id = getStableDeviceId();
      document.getElementById('main-id').textContent = id;
      try {
        const res = await fetch(`https://livesportmm-s4itmmapprover.hf.space/Phone/approved_users.json?t=${Date.now()}`);
        const users = await res.json();
        const user = users.find(u => u.id === id);
        const expEl = document.getElementById('main-expiry');
        if(user) {
          expEl.textContent = user.expires.split('T')[0];
          expEl.className = "status-badge bg-green-dim";
        } else {
          expEl.textContent = "Trial Version";
          expEl.className = "status-badge bg-yellow-dim";
        }
      } catch (e) { document.getElementById('main-expiry').textContent = "Server Error"; }
    }

    const parseM3U = (data) => {
      const lines = data.split('\n');
      const items = [];
      let currentItem = {};
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
          const logoMatch = line.match(/tvg-logo="([^"]+)"/);
          currentItem.logo = logoMatch ? logoMatch[1] : '';
          currentItem.title = line.split(',').pop().trim();
        } else if (line.startsWith('http')) {
          currentItem.link = line;
          items.push(currentItem);
          currentItem = {};
        }
      }
      return items;
    };

    const parseJSON = (data) => {
      try {
        const json = JSON.parse(data);
        const list = json.items || (Array.isArray(json) ? json : []);
        return list.map(item => ({ title: item.title || item.name, logo: item.logo || item.image, link: item.link || item.url }));
      } catch (e) { return []; }
    };

    async function loadMovies(url) {
      document.getElementById("loading-indicator").classList.remove("hidden");
      try {
        const res = await fetch(url);
        const textData = await res.text();
        let data = (textData.trim().startsWith('{') || textData.trim().startsWith('[')) ? parseJSON(textData) : parseM3U(textData);
        displayMovies(data);
      } catch (e) { console.error(e); }
      document.getElementById("loading-indicator").classList.add("hidden");
    }

    function displayMovies(movies) {
      const grid = document.getElementById("movie-grid");
      const lastWatchedLink = localStorage.getItem(KEY_LAST_WATCHED);
      
      grid.innerHTML = movies.map(m => {
        const isWatched = m.link === lastWatchedLink;
        return `
          <div class="movie-card ${isWatched ? 'last-watched' : ''}" onclick="playMovie('${encodeURIComponent(JSON.stringify(m))}')">
            ${isWatched ? '<div class="last-watched-badge">RECENT</div>' : ''}
            <div class="img-container">
              <img src="${m.logo}" onerror="this.src='https://placehold.co/400x225/1e293b/fbbf24?text=TV';">
            </div>
            <div class="movie-title">${m.title}</div>
          </div>
        `;
      }).join('');
    }

    window.playMovie = (encoded) => {
      const movie = JSON.parse(decodeURIComponent(encoded));
      // ကြည့်လိုက်တဲ့ Movie Link ကို သိမ်းထားမယ်
      localStorage.setItem(KEY_LAST_WATCHED, movie.link);
      localStorage.setItem("selectedMovie", JSON.stringify(movie));
      window.location.href = "movie_detail.html";
    };

    // Sidebar & UI Logic
    const sidebar = document.getElementById("sidebar");
    const backdrop = document.getElementById("sidebar-backdrop");
    document.getElementById("menu-toggle").onclick = () => { sidebar.classList.toggle("open"); backdrop.classList.toggle("active"); };
    backdrop.onclick = () => { sidebar.classList.remove("open"); backdrop.classList.remove("active"); };

    document.getElementById("movies-selector-btn").onclick = () => {
      const savedSrc = JSON.parse(localStorage.getItem(KEY_LAST_SRC)) || movieSources[0];
      const list = document.getElementById("overlay-list");
      list.innerHTML = movieSources.map(s => `
        <li class="overlay-item ${s.value === savedSrc.value ? 'active-src' : ''}" 
            onclick="selectSrc('${s.value}','${s.label}')">
          ${s.label}
        </li>
      `).join('');
      document.getElementById("overlay-menu").classList.add("active");
    };

    window.selectSrc = (val, label) => {
      // ရွေးချယ်လိုက်တဲ့ Source ကို သိမ်းထားမယ်
      localStorage.setItem(KEY_LAST_SRC, JSON.stringify({ value: val, label: label }));
      document.getElementById("movies-selector-btn").textContent = label;
      document.getElementById("overlay-menu").classList.remove("active");
      loadMovies(val);
    };

    document.getElementById("overlay-close").onclick = () => document.getElementById("overlay-menu").classList.remove("active");

    window.addEventListener('load', () => { 
      initUserInfo(); 
      
      // သိမ်းထားတဲ့ Source ရှိမရှိ စစ်မယ်
      const savedSrc = JSON.parse(localStorage.getItem(KEY_LAST_SRC));
      if (savedSrc) {
        document.getElementById("movies-selector-btn").textContent = savedSrc.label;
        loadMovies(savedSrc.value);
      } else {
        loadMovies(movieSources[0].value);
      }
    });
  </script>
</body>
                                                           </html>
