        <div class="flex items-center bg-[#334155] hover:bg-[#475569] p-3.5 rounded-xl cursor-pointer active:scale-[0.99] transition-all" onclick="openExternalPlayer('browser')">

          <div class="w-7 h-7 bg-slate-600 rounded-lg shadow-md mr-4 flex items-center justify-center text-xs font-black">URL</div>

  <script>
  const movieData = [

    {"name":"Toilet ထဲမှာဘဲကို ရှယ်မှုတ်ပေးတဲ့ စော်လေး","poster":"https://mgzaw.com/wp-content/uploads/2026/05/asia-m00021z.webp","video_url":"https://video.mgzaw.com/videos/asia-m00021z/master.m3u8"},
    {"name":"အလုပ်ကိစ္စ နဲ့ခရီးတူတူသွားတဲ့ best friend နဲ့ မြင်းစီး","poster":"https://mgzaw.com/wp-content/uploads/2026/05/asia-m00020z.webp","video_url":"https://video.mgzaw.com/videos/asia-m00020z/master.m3u8"},
    {"name":"အဖုတ် ဖြူဖြူဖွေးဖွေးလေးပေါ်ကို အရည်ပန်း","poster":"https://mgzaw.com/wp-content/uploads/2026/05/en-m00018z.webp","video_url":"https://video.mgzaw.com/videos/en-m00018z/master.m3u8"},
    {"name":"အနီးကပ် ရိုက်ပြထားတဲ့ ရှယ်အကြည်ဇာတ်ကား","poster":"https://mgzaw.com/wp-content/uploads/2026/05/en-m00017z.webp","video_url":"https://video.mgzaw.com/videos/en-m00017z/master.m3u8"},
    {"name":"Threesome ဆွဲကြတဲ့ အတွဲ စော်လေးက ရှယ်မိုက်","poster":"https://mgzaw.com/wp-content/uploads/2026/05/en-m00016z.webp","video_url":"https://video.mgzaw.com/videos/en-m00016z/master.m3u8"},
    {"name":"နှစ်ချီဆက်တိုက် အရည်တွေရွှဲပြီးပန်းထွက်လာတဲ့အထိ အပေါ်ကနေ တက်ဆောင့်တဲ့ စော်လေး","poster":"https://mgzaw.com/wp-content/uploads/2026/05/en-m00015z.webp","video_url":"https://video.mgzaw.com/videos/en-m00015z/master.m3u8"},
    {"name":"ဗဲမျက်နှာအပေါ်ကို တက်ထိုင်ပြီး အရည်ပန်းထည့်ပေးတဲ့စော်","poster":"https://mgzaw.com/wp-content/uploads/2026/05/en-m00014z.webp","video_url":"https://video.mgzaw.com/videos/en-m00014z/master.m3u8"},
    {"name":"စော်လေးကို အပြီးအပြင် မှုတ်ပေးတဲ့ ဗဲ","poster":"https://mgzaw.com/wp-content/uploads/2026/05/en-m00013z-1.webp","video_url":"https://video.mgzaw.com/videos/en-m00013z/master.m3u8"}
  ];

// 🍿 ၁။ Movie Grid ထဲသို့ ဒေတာများကို မူရင်းလင့်ခ်အတိုင်း တိုက်ရိုက်ဆွဲထည့်ခြင်း
function renderMovies() {
  const grid = document.getElementById("movieGrid");
  grid.innerHTML = ""; // အဟောင်းတွေကို ရှင်းထုတ်မည်
  
  movieData.forEach(movie => {
    const card = document.createElement("div");
    card.className = "bg-[#1e293b] rounded-2xl overflow-hidden shadow-lg transition-transform duration-200 active:scale-95 cursor-pointer border border-slate-800/60 group";
    card.onclick = () => selectMovie(movie.name, movie.video_url);
    
    card.innerHTML = `
      <div class="relative w-full pt-[135%] bg-slate-900 overflow-hidden">
        <img class="absolute top-0 left-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" src="${movie.poster}" alt="${movie.name}" loading="lazy">
      </div>
      <div class="p-3">
        <div class="text-sm font-semibold leading-snug h-10 line-clamp-2 text-slate-200 group-hover:text-blue-400 transition-colors">${movie.name}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}


  // 📱 ၂။ Modal Controllers
  function selectMovie(title, url) {
    currentSelectedUrl = url;
    document.getElementById("selectedMovieTitle").innerText = title;
    
    const overlay = document.getElementById("playerModalOverlay");
    const modal = document.getElementById("playerModal");
    
    overlay.classList.remove("pointer-events-none", "opacity-0");
    overlay.classList.add("opacity-100");
    modal.classList.remove("translate-y-full", "sm:scale-95");
    modal.classList.add("translate-y-0", "sm:scale-100");
  }

  function closeModal() {
    const overlay = document.getElementById("playerModalOverlay");
    const modal = document.getElementById("playerModal");
    
    overlay.classList.add("pointer-events-none", "opacity-0");
    overlay.classList.remove("opacity-100");
    modal.classList.add("translate-y-full", "sm:scale-95");
    modal.classList.remove("translate-y-0", "sm:scale-100");
  }

  // 🛠️ ၃။ Cross-Platform External Player Logic (Android, iOS, Windows/Mac)
  function openExternalPlayer(playerType) {
    if (!currentSelectedUrl) return;
    
    // User ရဲ့ Device အမျိုးအစားကို စစ်ဆေးခြင်း
    const ua = navigator.userAgent.toLowerCase();
    const isAndroid = /android/.test(ua);
    const isIOS = /iphone|ipad|ipod/.test(ua);
    
    let launchUrl = "";

    if (isAndroid) {
      /* Android Intent System */
      if (playerType === 'mx') {
        launchUrl = `intent:${currentSelectedUrl}#Intent;package=com.mxtech.videoplayer.ad;type=video/*;end;`;
      } else if (playerType === 'vlc') {
        launchUrl = `intent:${currentSelectedUrl}#Intent;package=org.videolan.vlc;type=video/*;end;`;
      } else if (playerType === 'playit') {
        launchUrl = `intent:${currentSelectedUrl}#Intent;package=com.gravity.studio.db.playit;type=video/*;end;`;
      } else {
        launchUrl = currentSelectedUrl; // Browser Native Play
      }
    } else if (isIOS) {
      /* iOS Custom URL Schemes */
      // iOS အတွက် http:// သို့မဟုတ် https:// ကို ဖယ်ထုတ်ပြီး Scheme ဆောက်ရပါသည်
      const cleanUrl = currentSelectedUrl.replace(/^https?:\/\//, '');
      
      if (playerType === 'vlc') {
        launchUrl = `vlc://${cleanUrl}`;
      } else if (playerType === 'mx') {
        launchUrl = `mxplayer://${currentSelectedUrl}`;
      } else if (playerType === 'playit') {
        // iOS PlayIt က URL Scheme မတည်ငြိမ်သဖြင့် VLC သို့မဟုတ် Web သို့ လမ်းကြောင်းလွှဲပေးခြင်း
        launchUrl = `vlc://${cleanUrl}`;
      } else {
        launchUrl = currentSelectedUrl;
      }
    } else {
      /* Windows / Mac / Desktop PC */
      if (playerType === 'vlc') {
        launchUrl = `vlc://${currentSelectedUrl}`; // PC မှာ VLC Web Protocol အလုပ်လုပ်လျှင် ခေါ်မည်
      } else {
        launchUrl = currentSelectedUrl; // Web Browser Player ဖြင့် တန်းပွင့်မည်
      }
    }

    // 🚀 သတ်မှတ်ထားသော ပလေယာဆီသို့ ဗီဒီယိုလင့်ခ် ပို့လွှတ်ခြင်း
    if (launchUrl) {
      window.open(launchUrl, '_blank');
    }
    closeModal();
  }

  // 📋 ၄။ Copy Link Fallback
  function copyStreamLink() {
    if (!currentSelectedUrl) return;
    navigator.clipboard.writeText(currentSelectedUrl).then(() => {
      alert("Streaming Link ကို Copy ကူးယူပြီးပါပြီ။ PC သို့မဟုတ် iOS Player များတွင် Paste လုပ်ပြီး ကြည့်နိုင်ပါသည်။");
    }).catch(err => {
      alert("လင့်ခ်: " + currentSelectedUrl);
    });
    closeModal();
  }

  // Run initial build
  renderMovies();
  </script>
