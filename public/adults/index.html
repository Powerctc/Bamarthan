<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotaya Movies</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Color Running Button */
        @keyframes colorRun {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .download-btn {
            text-decoration: none;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 25px;
            width: 90%;
            max-width: 400px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: colorRun 4s ease infinite;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 1 Roll 2 Cards Layout */
        .movie-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* တစ်တန်းလျှင် ၂ ကား */
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3; /* ပုံအရွယ်အစား ညီနေစေရန် */
            object-fit: cover;
            display: block;
        }

        .movie-info {
            padding: 10px;
            text-align: center;
        }

        .movie-title {
            font-size: 0.85rem;
            font-weight: 500;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loader {
            border: 3px solid #334155;
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <a href="https://m-sport-download.static.hf.space/" class="download-btn">
        ပိုမိုကြည့်ရှုရန် App ကို ဒေါင်းလုဒ်ဆွဲပါ
    </a>

    <div id="loading" class="loader"></div>
    <div class="movie-container" id="movie-grid"></div>

    <script>
        const apis = [
            'https://livesportmm-lotayamovies-2.hf.space/api/movies',
            'https://livesportmm-lotayamovies.hf.space/api/movies'
        ];

        async function fetchMovies() {
            const grid = document.getElementById('movie-grid');
            const loader = document.getElementById('loading');
            
            try {
                for (const url of apis) {
                    const response = await fetch(url);
                    const movies = await response.json();
                    
                    // API တစ်ခုစီမှ ၅ ကားစီ ယူမည်
                    const limitedMovies = movies.slice(0, 5);
                    
                    limitedMovies.forEach(movie => {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        
                        // API ထဲရှိ key name (poster သို့မဟုတ် image) အပေါ်မူတည်ပြီး ပြင်ပေးပါ
                        card.innerHTML = `
                            <img src="${movie.poster || movie.image || 'https://via.placeholder.com/200x300'}" alt="movie">
                            <div class="movie-info">
                                <p class="movie-title">${movie.title || 'Loading...'}</p>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
                loader.style.display = 'none';
            } catch (error) {
                grid.innerHTML = '<p style="grid-column: span 2; text-align: center;">Error loading movies.</p>';
                loader.style.display = 'none';
            }
        }

        fetchMovies();
    </script>
</body>
</html>
