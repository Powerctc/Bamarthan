<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ZETFLIX - Movie Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ============ GLOBAL ============ */
    body {
      margin: 0;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background-color: #1a202c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ============ CONTAINER ============ */
    #movie-detail-container {
      background-color: #2d3748;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      padding: 32px;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    @media (min-width: 768px) {
      #movie-detail-container {
        flex-direction: row;
        justify-content: center;
        text-align: left;
        align-items: flex-start;
      }
    }

    /* ============ POSTER ============ */
    .movie-poster-large {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.5);
    }

    /* ============ INFO ============ */
    .movie-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @media (min-width: 768px) {
      .movie-info {
        align-items: flex-start;
      }
    }

    .movie-title {
      font-size: 28px;
      font-weight: bold;
      color: white;
      margin: 0 0 12px;
      text-align: center;
    }

    @media (min-width: 768px) {
      .movie-title {
        font-size: 36px;
        text-align: left;
      }
    }

    .movie-meta {
      font-size: 20px;
      color: #cbd5e0;
      margin: 0 0 24px;
      text-align: center;
    }

    @media (min-width: 768px) {
      .movie-meta {
        text-align: left;
      }
    }

    /* ============ FOOTBALL STYLE PLAY BUTTON (UPDATED) ============ */
    .play-button {
      background: #ef4444; /* Football page's primary red */
      color: white;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      font-weight: bold;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .play-button:hover {
      background: #dc2626;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
    }

    .play-button:focus {
      background: #ef4444;
      border: 2px solid white; /* Same as the filter buttons focus state */
    }

    /* ============ MODAL ============ */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: #1f2937;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 420px;
      text-align: center;
      position: relative;
      border: 1px solid #374151;
    }

    .modal-close-button {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 24px;
      color: #cbd5e0;
      cursor: pointer;
    }

    .app-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      border-radius: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .modal-title {
      font-size: 24px;
      font-weight: bold;
      color: white;
      margin: 0 0 12px;
    }

    .modal-text {
      color: #cbd5e0;
      margin: 0 0 24px;
      font-size: 14px;
      line-height: 1.5;
    }

    .install-button {
      background-color: #3b82f6; /* Reload button color from football page */
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      font-size: 16px;
      transition: background 0.2s;
    }

    .install-button:hover {
      background-color: #2563eb;
    }

    /* ============ LOADING / ERROR ============ */
    .loading-text {
      text-align: center;
      color: #a0aec0;
      width: 100%;
    }

    .error-text {
      color: #f87171;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <div id="movie-detail-container">
    <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Loading movie details...</p>
  </div>

  <div id="player-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close-button" id="close-modal">&times;</button>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnni40YRRPc9wGBd2tDOIX1qCTqddax0tPR5QsIxC8HA&s=10" alt="NS Player" class="app-logo">
      <h3 class="modal-title">App Not Installed</h3>
      <p class="modal-text">
        The required player app is not installed on your device.<br>
        Please install <strong>Network Streaming Video Player</strong> to continue.
      </p>
      <a href="https://play.google.com/store/apps/details?id=com.genuine.leone" target="_blank" class="install-button">
        <i class="fab fa-android"></i> Install NS Player
      </a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('movie-detail-container');
      const modal = document.getElementById('player-modal');
      const closeModalBtn = document.getElementById('close-modal');

      function hideModal() {
        modal.style.display = 'none';
      }
      closeModalBtn.addEventListener('click', hideModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) hideModal();
      });

      const stored = localStorage.getItem('selectedMovie');
      if (!stored) {
        container.innerHTML = `<p class="error-text">No movie selected.</p>`;
        return;
      }

      const movie = JSON.parse(stored);

      container.innerHTML = `
        <img src="${movie.logo || 'https://via.placeholder.com/320x450?text=No+Image'}" 
             alt="${movie.title} Poster" 
             class="movie-poster-large">
        <div class="movie-info">
          <h2 class="movie-title">${movie.title}</h2>
          <p class="movie-meta">${movie.year || ''} ${movie.category ? `| ${movie.category}` : ''}</p>
          <button id="watch-button" class="play-button" tabindex="1">
            <i class="fas fa-play"></i> Watch Now
          </button>
        </div>
      `;

      document.getElementById('watch-button').addEventListener('click', () => {
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (!isAndroid) {
          alert('This feature is only available on Android devices.');
          return;
        }

        const url = movie.url;
        const intent = `intent:${url}#Intent;package=com.genuine.leone;type=video/*;S.title=${encodeURIComponent(movie.title)};end`;

        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = intent;
        document.body.appendChild(iframe);
        setTimeout(() => document.body.removeChild(iframe), 1000);

        const fallback = setTimeout(() => {
          modal.style.display = 'flex';
        }, 1500);

        document.addEventListener('visibilitychange', () => {
          if (document.hidden) clearTimeout(fallback);
        }, { once: true });
      });
    });
  </script>
</body>
</html>
