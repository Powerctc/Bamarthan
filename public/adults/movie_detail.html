<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Fotlivemovies - Movie Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #020617;
      --card-bg: #1e293b;
      --primary-red: #ef4444;
      --accent-blue: #3b82f6;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: #f1f5f9;
      min-height: 100vh;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      background: rgba(0,0,0,0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      z-index: 100;
    }

    /* --- Player Section --- */
    .player-wrapper {
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      display: none;
      position: relative;
    }
    
    video {
      width: 100%;
      height: 100%;
      outline: none;
    }

    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 30px;
    }

    .poster-side img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    .info-side {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .movie-title {
      font-size: clamp(24px, 5vw, 40px);
      margin: 0;
      font-weight: 900;
      color: #facc15; /* Yellow Title */
    }

    .description-box {
      background: rgba(30, 41, 59, 0.5);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      line-height: 1.6;
      font-size: 14px;
      color: #cbd5e1;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: 0.3s;
      color: white;
      text-transform: uppercase;
    }

    .play-now { background: #2563eb; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
    .mx-play { background: #dc2626; box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); }
    
    .btn:active { transform: scale(0.95); }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; text-align: center; }
      .poster-side img { max-width: 200px; margin: 0 auto; }
      .btn-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>

  <div id="playerSection" class="player-wrapper">
    <video id="mainVideoPlayer" controls playsinline>
      <source src="" type="video/mp4">
    </video>
  </div>

  <div class="container" id="detail-view">
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const movieData = localStorage.getItem('selectedMovie');
      const container = document.getElementById('detail-view');
      const playerSection = document.getElementById('playerSection');
      const videoPlayer = document.getElementById('mainVideoPlayer');

      if (!movieData) {
        container.innerHTML = `<p style="text-align:center; padding:50px;">ဇာတ်ကား ရွေးချယ်ထားခြင်း မရှိပါ။</p>`;
        return;
      }

      const movie = JSON.parse(decodeURIComponent(movieData));
      
      // JSON ထဲမှာ link ဒါမှမဟုတ် url ဆိုပြီး ပါလာနိုင်လို့ နှစ်ခုလုံးကို စစ်ပါမယ်
      const streamUrl = movie.link || movie.url || movie.file || "";

      container.innerHTML = `
        <div class="poster-side">
          <img src="${movie.logo || movie.image || 'https://via.placeholder.com/300x450?text=No+Image'}" alt="Poster">
        </div>
        <div class="info-side">
          <h1 class="movie-title">${movie.title}</h1>
          <div class="text-slate-400 font-bold uppercase tracking-widest text-xs">
             ${movie.year || '2026'} • PREMIUM QUALITY
          </div>
          
          <div class="description-box">
            <strong>ဇာတ်လမ်းအညွှန်း</strong><br><br>
            ${movie.description || "ဒီဇာတ်ကားကို Fotlivemovies မှာ အခုပဲ ကြည့်ရှုလိုက်ပါ။ အရည်အသွေးအကြည်ဖြင့် အခမဲ့ တင်ဆက်ထားပါသည်။"}
          </div>

          <div class="btn-group">
            <button id="inAppBtn" class="btn play-now">
              <i class="fas fa-play"></i> Watch Here
            </button>
            <button id="mxPlayBtn" class="btn mx-play">
              <i class="fas fa-play"></i> MX Player
            </button>
          </div>
        </div>
      `;

      // 1. In-App Player Function
      document.getElementById('inAppBtn').onclick = () => {
        if (!streamUrl) return alert("Video Link မတွေ့ပါ");
        
        playerSection.style.display = 'block';
        videoPlayer.src = streamUrl;
        videoPlayer.load();
        videoPlayer.play().catch(e => {
            console.error("Auto-play failed:", e);
            alert("ဒီ Video အမျိုးအစားကို Browser က Support မလုပ်ပါ။ MX Player ကို သုံးပေးပါ။");
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // 2. MX Player Function (Fixed Intent)
      document.getElementById('mxPlayBtn').onclick = () => {
        if (!streamUrl) return alert("Video Link မတွေ့ပါ");

        const mxIntent = `intent:${streamUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(movie.title)};end`;
        
        // Android အတွက် Intent ခေါ်ခြင်း
        window.location.href = mxIntent;

        // ၁ စက္ကန့်အတွင်း MX Player မပွင့်လာရင် Store ကို ပို့ပေးမယ်
        setTimeout(() => {
          if (!document.hidden) {
            if (confirm("MX Player မရှိသေးပါက Play Store မှာ ဒေါင်းလုဒ် ဆွဲမလား?")) {
              window.location.href = "https://play.google.com/store/apps/details?id=com.mxtech.videoplayer.ad";
            }
          }
        }, 1200);
      };
    });
  </script>
</body>
</html>
