<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FOTMOV TV - Premium</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --primary: #ef4444;
      --bg-dark: #0f172a;
      --sidebar-bg: #1e293b;
      --card-bg: #1f2937;
      --focus-color: #3b82f6;
    }

    body { background-color: var(--bg-dark); color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow: hidden; }
    
    #loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.9); z-index: 9999;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .spinner {
      width: 50px; height: 50px; border: 5px solid rgba(239, 68, 68, 0.2);
      border-top: 5px solid var(--primary); border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* MOBILE NAVIGATION HEADER */
    .mobile-header {
      display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background-color: var(--sidebar-bg); border-bottom: 1px solid #334155;
      align-items: center; padding: 0 15px; z-index: 1002;
    }
    .menu-toggle-btn {
      background: var(--primary); color: white; border: none; padding: 10px 14px;
      border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; width: 220px; height: 100%;
      background-color: var(--sidebar-bg); z-index: 1000; border-right: 1px solid #334155;
      transition: left 0.3s ease;
    }
    .sidebar-brand {
      padding: 25px 20px; color: var(--primary); font-weight: 900; font-size: 18px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5); text-align: center;
    }
    .nav-container { height: calc(100vh - 80px); overflow-y: auto; padding: 10px 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    
    .sidebar-item {
      display: flex; align-items: center; padding: 14px 20px; color: #94a3b8;
      text-decoration: none; outline: none; border-left: 4px solid transparent;
      transition: 0.2s; font-size: 13px; font-weight: bold; text-transform: uppercase;
    }
    .sidebar-item i { width: 25px; font-size: 16px; margin-right: 12px; text-align: center; }
    .sidebar-item:focus { background: rgba(239, 68, 68, 0.15); border-left-color: var(--primary); color: white; }
    .sidebar-item.active { background: var(--primary); color: white; }

    /* Main Content */
    .main-content { margin-left: 220px; padding: 25px; height: 100vh; overflow-y: auto; box-sizing: border-box; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; transition: all 0.3s ease; }
    
    .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; flex-wrap: wrap; gap: 10px; }
    .title-group { display: flex; align-items: center; gap: 12px; }
    .red-bar { width: 6px; height: 32px; background-color: var(--primary); border-radius: 4px; }
    .title-text { font-size: 24px; font-weight: 900; margin: 0; }

    /* Search Box */
    .search-box-wrapper { margin-bottom: 20px; width: 100%; }
    .search-input {
      width: 100%; padding: 12px 20px; background: #1e293b; border: 2px solid transparent;
      border-radius: 10px; color: white; font-size: 16px; outline: none; box-sizing: border-box;
    }
    .search-input:focus { border-color: var(--focus-color); background: #2d3e54; }

    /* Sources Tab Buttons */
    .source-container { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
    .source-btn { padding: 10px 20px; background: #1e293b; color: #94a3b8; border: 3px solid transparent; border-radius: 8px; font-weight: bold; cursor: pointer; outline: none; font-size: 12px; text-transform: uppercase; }
    .source-btn:focus { border-color: #fbbf24; background: var(--primary); color: white; transform: scale(1.05); }
    .source-btn.active { background: var(--primary); color: white; border-color: #fbbf24; }

    /* Responsive Grid */
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding-bottom: 100px; }
    
    .movie-card {
      background: var(--card-bg); border-radius: 12px; padding: 8px; cursor: pointer;
      border: 3px solid transparent; transition: 0.2s; position: relative;
      display: flex; flex-direction: column; outline: none; 
      height: 100%; min-height: 250px; overflow: hidden;
    }
    .poster-wrapper { width: 100%; aspect-ratio: 2/3; overflow: hidden; border-radius: 8px; background: #000; margin-bottom: 10px; flex-shrink: 0; }
    .movie-poster { width: 100%; height: 100%; object-fit: cover; }

    .movie-card:focus { border-color: var(--focus-color); transform: scale(1.05); z-index: 50; }
    
    .movie-title { 
      font-size: 13px; font-weight: bold; color: #f8fafc;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      height: 38px; line-height: 1.4; margin-bottom: 6px;
    }
    .movie-meta { font-size: 10.5px; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; }
    .movie-genre { color: #fbbf24; font-weight: bold; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .watched-badge { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; font-size: 9px; padding: 3px 8px; border-radius: 4px; font-weight: bold; z-index: 10; }

    :focus { scroll-margin: 150px; }

    /* SMARTPHONE RESPONSIVE QUERIES */
    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      .sidebar { left: -220px; top: 60px; height: calc(100% - 60px); }
      .sidebar.open { left: 0; }
      .main-content { margin-left: 0; padding: 15px; padding-top: 80px; }
      .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
    
    @media (min-width: 1200px) {
      .movie-grid { grid-template-columns: repeat(6, 1fr); }
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>အချက်အလက်များ ရယူနေပါသည်...</p>
  </div>

  <div class="mobile-header">
    <button class="menu-toggle-btn" onclick="toggleSidebarMenu()"><i class="fas fa-bars"></i>&nbsp; MENU (ဖွင့်ရန်နှိပ်ပါ)</button>
    <span style="margin-left:auto; font-weight:900; font-size:14px; color:var(--primary);">FOTMOV PREMIUM</span>
  </div>

  <div id="sidebarMenu" class="sidebar">
    <div class="sidebar-brand">FOTMOV PREMIUM</div>
    <nav class="nav-container" id="sidebar-nav">
      <a href="https://bamarthan.vercel.app/" class="sidebar-item" tabindex="1"><i class="fas fa-home"></i>HOME</a>
      <a href="https://m-sport-download.static.hf.space" class="sidebar-item active" tabindex="1"><i class="fas fa-futbol"></i>LIVE 4 SERVER</a>
      <a href="https://bamarthan.vercel.app/movies..html" class="sidebar-item" tabindex="1"><i class="fas fa-film"></i>မြန်မာစာတန်းထိုး</a>
      <a href="https://bamarthan.vercel.app/series/index.html" class="sidebar-item" tabindex="1"><i class="fas fa-tv"></i>ဇာတ်လမ်းတွဲ</a>
      <a href="https://m-sport-download.static.hf.space/Vpnkey.html" class="sidebar-item" tabindex="1"><i class="fas fa-key"></i>Hiddify key</a>
      <a href="https://m-sport-download.static.hf.space" class="sidebar-item" tabindex="1"><i class="fas fa-film"></i>မြန်မာတီဗွီ</a>
      <hr class="opacity-10 my-2">
      <a href="https://bamarthan.vercel.app/adults/index.html" class="sidebar-item" tabindex="1"><i class="fas fa-eye-slash"></i>Adults (18+)</a>
      <a href="https://m-sport-download.static.hf.space" class="sidebar-item" tabindex="1"><i class="fas fa-download"></i> App ဒေါင်းရန်</a>
      <a href="https://bamarthan.vercel.app/About.html" class="sidebar-item" tabindex="1"><i class="fas fa-circle-info"></i>About App</a>
    </nav>
  </div>

  <div class="main-content" id="main-scroll-area">
    <div id="grid-view">
      <div class="header-area">
          <div class="title-group"><div class="red-bar"></div><h1 class="title-text">Ultimate Movies</h1></div>
      </div>

      <div class="search-box-wrapper">
        <input type="text" id="search-input" class="search-input" placeholder="ဒီနေရာမှာ OK နှိပ်ပြီး ရိုက်ရှာပါ..." tabindex="2" readonly>
      </div>

      <div class="source-container">
          <button class="source-btn" id="btn-main" onclick="switchSource('main')" tabindex="3">Server 1 (Fast)</button>
          <button class="source-btn" id="btn-1" onclick="switchSource('1')" tabindex="3">Server 2 (Backup)</button>
          <button class="source-btn" id="btn-2" onclick="switchSource('2')" tabindex="3">Server 3 (Static)</button>
      </div>

      <div id="movie-grid" class="movie-grid"></div>
    </div>
  </div>

  <script>
    let allMovies = [];
    let sourceMovies = []; 
    let filteredMovies = [];
    let currentSource = localStorage.getItem('s4itmm_saved_source') || "main";
    let currentLimit = 12; 
    const PAGE_SIZE = 12; 

    function toggleSidebarMenu() {
        document.getElementById('sidebarMenu').classList.toggle('open');
    }

    async function loadMovies() {
        showLoading(true);
        const sources = [
          {key:"main", url:"/api/movies"}, 
          {key:"1", url:"movies.json"},    
          {key:"2", url:"movies-1.json"}   
        ];
        
        allMovies = [];
        for (const s of sources) {
            try {
                const res = await fetch(s.url, { cache: "no-store" });
                if (!res.ok) throw new Error("File Missing");
                const data = await res.json();
                const list = Array.isArray(data) ? data : (data.movies || []);
                list.forEach((m, idx) => {
                    m._source = s.key;
                    m._uid = s.key + "-" + idx;
                    allMovies.push(m);
                });
            } catch (err) { console.error("Source Error (" + s.url + "):", err); }
        }
        
        switchSource(currentSource);
        showLoading(false);
    }

    function switchSource(src) {
        currentSource = src;
        localStorage.setItem('s4itmm_saved_source', src);
        document.getElementById('search-input').value = '';
        currentLimit = 12;
        sourceMovies = allMovies.filter(m => m._source === src);
        filteredMovies = [...sourceMovies];
        renderGrid();
        document.querySelectorAll('.source-btn').forEach(btn => btn.classList.toggle('active', btn.id === (src === 'main' ? 'btn-main' : 'btn-' + src)));
        document.getElementById('sidebarMenu').classList.remove('open');
    }

    function renderGrid() {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = '';
        const watchedList = JSON.parse(localStorage.getItem('s4itmm_watched_titles')) || [];
        const batch = filteredMovies.slice(0, currentLimit);
        
        if (batch.length === 0) {
            grid.innerHTML = '<div style="grid-column: span 6; text-align:center; padding: 50px; color:#94a3b8;">ကားမရှိသေးပါ။</div>';
            return;
        }

        batch.forEach((movie) => {
            const isWatched = watchedList.includes(movie.title);
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.id = `card-${movie._uid}`;
            card.tabIndex = 4;
            card.innerHTML = `
                ${isWatched ? '<div class="watched-badge">WATCHED</div>' : ''}
                <div class="poster-wrapper"><img src="${movie.logo}" class="movie-poster" loading="lazy" onerror="this.src='https://via.placeholder.com/200x300?text=No+Poster'"></div>
                <div class="movie-info">
                  <div class="movie-title">${movie.title}</div>
                  <div class="movie-meta"><span>${movie.year || '2024'}</span><span class="movie-genre">${movie.category || movie.genre || 'Movie'}</span></div>
                </div>`;
            card.onclick = () => openMovie(movie);
            grid.appendChild(card);
        });
    }

    function openMovie(movie) {
        markAsWatched(movie.title);
        const movieUrls = movie.urls || [movie.link || movie.url].filter(Boolean);
        
        const movieData = {
            title: movie.title,
            logo: movie.logo,
            desc: movie.description || movie.story || "အညွှန်း မရရှိနိုင်သေးပါ။",
            links: movieUrls.join(',')
        };

        const params = new URLSearchParams(movieData).toString();
        window.location.href = `movie_detail.html?${params}`;
    }

    function markAsWatched(title) {
        let watched = JSON.parse(localStorage.getItem('s4itmm_watched_titles')) || [];
        if (!watched.includes(title)) { watched.push(title); localStorage.setItem('s4itmm_watched_titles', JSON.stringify(watched)); }
    }

    function handleSearch(query) {
        const q = query.toLowerCase();
        filteredMovies = sourceMovies.filter(m => m.title.toLowerCase().includes(q));
        currentLimit = 12;
        renderGrid();
    }

    const searchInput = document.getElementById('search-input');
    
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        searchInput.removeAttribute('readonly');
        searchInput.placeholder = "ရိုက်ရှာရန် နှိပ်ပါ...";
    }

    window.addEventListener('keydown', function(e) {
        const active = document.activeElement;
        
        if (e.keyCode === 39 && active.classList.contains('sidebar-item')) {
            e.preventDefault();
            const target = searchInput || document.querySelector('.source-btn') || document.querySelector('.movie-card');
            if (target) target.focus();
        }

        if (e.keyCode === 13 && active === searchInput) {
            if (searchInput.hasAttribute('readonly')) {
                e.preventDefault();
                searchInput.removeAttribute('readonly');
                searchInput.focus();
            }
            return;
        }

        if (e.keyCode === 37) {
            const isContent = active.classList.contains('movie-card') || active.classList.contains('source-btn') || active === searchInput;
            if (isContent) {
                const rect = active.getBoundingClientRect();
                if (rect.left < 300) { 
                    e.preventDefault(); 
                    if (!('ontouchstart' in window)) searchInput.setAttribute('readonly', 'true');
                    const sb = document.querySelector('.sidebar-item.active') || document.querySelector('.sidebar-item');
                    if (sb) sb.focus(); 
                }
            }
        }

        if (e.keyCode === 13 && active.classList.contains('movie-card')) active.click();

        if (e.keyCode === 8 || e.keyCode === 461 || e.keyCode === 10009) {
            if (active === searchInput && !searchInput.hasAttribute('readonly')) {
                e.preventDefault();
                if (!('ontouchstart' in window)) searchInput.setAttribute('readonly', 'true');
                searchInput.blur();
                searchInput.focus();
            }
        }
        
        if (e.keyCode === 40 && active.classList.contains('movie-card')) {
            const grid = document.getElementById('movie-grid');
            if (active === grid.lastElementChild || active === grid.children[grid.children.length - 3]) {
                if (currentLimit < filteredMovies.length) { 
                    currentLimit += PAGE_SIZE; 
                    renderGrid(); 
                }
            }
        }
    });

    searchInput.addEventListener('input', (e) => handleSearch(e.target.value));
    searchInput.addEventListener('blur', () => { 
        if (!('ontouchstart' in window)) searchInput.setAttribute('readonly', true); 
    });

    function showLoading(status) { document.getElementById('loading-overlay').style.display = status ? 'flex' : 'none'; }
    
    window.onload = () => {
        loadMovies();
    };
  </script>
</body>
</html>
