Phone
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOTMOV MOBILE ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>

    <script>
        tailwind.config={
            darkMode:'class',
            theme:{ extend:{ colors:{ primary:'#facc15', darkBg:'#0f172a', darkCard:'#1e293b' } } }
        }
    </script>

    <style>
        *{ -webkit-tap-highlight-color:transparent; outline:none }
        .line-clamp-1{ display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden }
        ::-webkit-scrollbar{ width:0; background:transparent }
        .ad-color-run{ padding:3px; border-radius:20px; background:linear-gradient(270deg,#ff0000,#ff9900,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000); background-size:600% 600%; animation:colorRun 4s linear infinite }
        @keyframes colorRun{ 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        .ad-color-run img{ border-radius:17px }
        .glass-card{ background:rgba(30,41,59,.7); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.1); border-radius:24px; padding:1.5rem }
        .artplayer-app{ width:100%; height:100% }
        .res-btn.active{ background:#facc15!important; color:#000!important; border-color:#facc15!important; box-shadow:0 0 15px rgba(250,204,21,.4) }
        .active-source { border-color: #facc15 !important; color: #facc15 !important; box-shadow: 0 0 10px rgba(250,204,21,0.2); }
        .active-movie { border: 2px solid #facc15 !important; transform: scale(0.98); }
        .no-select { user-select: none; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300 no-select">

<div id="home-view">
    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex justify-between items-center">
        <button id="menu-btn" class="text-primary text-2xl w-10 text-left">
            <i class="fas fa-bars-staggered"></i>
        </button>
        <div class="flex flex-col items-center">
            <span class="text-primary font-black text-xl tracking-tighter leading-none">FOTMOV</span>
            <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Ultimate Movies</span>
        </div>
        <div class="w-10 text-right">
            <button id="theme-toggle" class="text-xl dark:text-primary">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <div id="sidebar-container"></div>

    <div class="mt-20 px-4 grid grid-cols-2 gap-3 text-[11px]">
        <div class="bg-white dark:bg-darkCard p-3 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col shadow-sm">
            <span class="opacity-50 uppercase font-black tracking-wider text-[9px]">Device ID</span>
            <span id="u-id" class="text-blue-500 font-mono mt-1 truncate">...</span>
        </div>
        <div class="bg-white dark:bg-darkCard p-3 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col shadow-sm">
            <span class="opacity-50 uppercase font-black tracking-wider text-[9px]">Plan Status</span>
            <span id="u-exp" class="text-primary font-bold mt-1">...</span>
        </div>
    </div>

    <main class="p-4">
        <div class="mb-6">
            <a href="http://m-sport-download.static.hf.space/">
                <div class="ad-color-run shadow-lg">
                    <img src="sports.gif" class="w-full h-auto block">
                </div>
            </a>
        </div>

        <div class="mb-4">
            <input type="text" id="search-bar" class="w-full bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 p-4 rounded-2xl shadow-sm dark:text-white" placeholder="Type movie name to search...">
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <button id="src-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase transition-all">Source</button>
            <button id="gen-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase">Genre</button>
            <button id="yr-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase">Year</button>
        </div>

        <div id="movie-grid" class="grid grid-cols-2 gap-4"></div>
    </main>
</div>

<div id="detail-view" class="fixed inset-0 z-[60] bg-slate-50 dark:bg-darkBg hidden flex-col overflow-y-auto">
    <div class="relative w-full aspect-video bg-black shadow-2xl">
        <div class="artplayer-app"></div>
        <button onclick="handleBackAction()" class="absolute top-4 left-4 z-20 w-10 h-10 bg-black/50 rounded-full flex justify-center items-center text-primary backdrop-blur-md border border-white/10">
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>
    <main class="flex-1 p-6">
        <div id="detail-content" class="w-full max-w-lg mx-auto"></div>
    </main>
</div>

<div id="overlay" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm hidden flex-col items-center justify-center p-6">
    <div class="w-full max-w-xs bg-darkCard border border-white/10 rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-4 border-b border-white/5 flex justify-between items-center">
            <h3 id="overlay-title" class="text-primary font-black text-xs uppercase tracking-widest">Select</h3>
            <button onclick="closeOverlay()" class="text-white/50 px-2"><i class="fas fa-times"></i></button>
        </div>
        <div id="overlay-list" class="max-h-[60vh] overflow-y-auto"></div>
    </div>
</div>

<script src="sidebar.js"></script>

<script>
const HF_BASE_URL = "https://livesportmm-s4itmmapprover.hf.space";
const APPROVED_USERS_URL = `${HF_BASE_URL}/Web/approved_users.json`;

const movieSources = [
    { label: "Server 1 (Fast)", value: "/api/movies" }, // JSON အစား API ကို ခေါ်ပါ
    { label: "Server 2 (Backup)", value: "movies.json" },
    { label: "Server 3 (Static)", value: "movies-1.json" }
];

let allMovies = [];
let art = null;
let activeVideoUrl = "";

// --- Back Key Protection ---
window.history.replaceState({view: 'home'}, '');

window.onpopstate = function() {
    if (document.getElementById('detail-view').style.display !== 'none' && !document.getElementById('detail-view').classList.contains('hidden')) {
        closeDetail();
    }
};

function handleBackAction() {
    window.history.back();
}

function forceDownload(url) {
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.click();
}

function openDetail(m) {
    window.history.pushState({view: 'detail'}, '');
    localStorage.setItem('s4itmm_last_movie_id', m.title);
    renderMovies(allMovies);
    
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('detail-view').style.display = 'flex';
    document.getElementById('detail-view').classList.remove('hidden');
    
    const urls = m.urls || [m.link || m.url].filter(Boolean);
    activeVideoUrl = urls[0] || "";
    renderDetail(m, urls);
    initArtPlayer(activeVideoUrl, m.logo);
    window.scrollTo(0, 0);
}

function initArtPlayer(url, poster) {
    if (art) art.destroy();
    art = new Artplayer({
        container: '.artplayer-app',
        url: url,
        poster: poster,
        autoplay: true,
        autoSize: true,
        setting: true,
        pip: true,
        playbackRate: true,
        aspectRatio: true,
        fullscreen: true,
        fullscreenWeb: true,
        lock: true,
        theme: '#facc15'
    });
}

function closeDetail() {
    if (art) art.destroy();
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('detail-view').classList.add('hidden');
    document.getElementById('home-view').classList.remove('hidden');
}

function renderDetail(movie, urls) {
    const container = document.getElementById('detail-content');
    const qualityLabels = ["SD", "HD", "FHD", "4K"];
    const mainApk = "https://raw.githubusercontent.com/MultipleTech/Download-link-/d76cc3108c02439463f144316be12a4d3c770b2a/com.genuine.leone_7.7.apk";
    const mirrorApk = "https://appteka.store/get/Y2ZZyzUvCKBD0HBMwgB8qYxtnwLev7dvX6tJvs9Lko8flu2QEj2jsB46JtvLKGDkXA_GmhuU7Texht-wBdsn/com.genuine.leone_7.7_77.apk";

    container.innerHTML = `
        <div class="glass-card w-full text-center">
            <span class="bg-red-500/10 text-red-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest mb-4 inline-block animate-pulse">Now Playing</span>
            <h2 class="dark:text-white text-xl font-black mb-2 leading-tight uppercase">${movie.title}</h2>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] mb-8">${movie.category || "Movie"} • ${movie.year || "2024"}</p>
            
            <p class="text-[9px] font-black opacity-30 uppercase mb-4 tracking-widest">Available Links</p>
            <div id="res-group" class="grid grid-cols-2 gap-3 mb-8"></div>
            
            <div class="pt-6 border-t border-white/5 mb-8">
                <p class="text-primary text-[11px] font-bold mb-3 uppercase tracking-wider">ပိုမိုကောင်းမွန်သောရုပ်သံဖြင့်ကြည့်ရှုရန်</p>
                <div class="ad-color-run">
                    <button onclick="openExternal('${activeVideoUrl}','${movie.title}')" class="w-full bg-slate-900 text-white font-black py-4 rounded-[17px] flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i class="fas fa-play text-primary"></i>
                        <span class="text-xs uppercase tracking-widest">Open in NS Player</span>
                    </button>
                </div>
            </div>

            <div class="bg-gray-900/80 rounded-2xl p-6 text-center border border-gray-800">
                <div class="flex justify-center mb-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/1179/1179069.png" class="w-16 h-16">
                </div>
                <h1 class="text-lg font-bold mb-3 text-white uppercase">Network Streaming Video Player</h1>
                <p class="text-gray-400 text-[11px] leading-relaxed mb-6">
                    Movies နှင့် Live Streaming များကြည့်ရန်<br>
                    <span class="text-green-400 font-semibold">Network Streaming Video Player</span> ကို Install လုပ်ရန်လိုအပ်ပါသည်။
                </p>
                <div class="space-y-3">
                    <button onclick="forceDownload('${mainApk}')" class="w-full flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 transition p-3 rounded-xl font-semibold text-black">
                        <i class="fas fa-plus"></i> Download Player
                    </button>
                    <button onclick="forceDownload('${mirrorApk}')" class="w-full flex items-center justify-center gap-2 bg-blue-500 hover:bg-blue-600 transition p-3 rounded-xl font-semibold text-white">
                        Mirror Download
                    </button>
                </div>
                <p class="text-[9px] text-gray-500 mt-6 uppercase">Install ပြီးပါက Movies နှင့် Live Streaming များကို ကြည့်ရှုနိုင်ပါသည်</p>
            </div>
        </div>
    `;

    const resGroup = document.getElementById('res-group');
    urls.forEach((url, i) => {
        const btn = document.createElement('button');
        btn.className = `res-btn bg-white/5 border border-white/10 text-[11px] font-black py-3 rounded-xl uppercase transition-all ${i === 0 ? 'active' : ''}`;
        btn.innerText = qualityLabels[i] || `Link ${i + 1}`;
        btn.onclick = () => {
            activeVideoUrl = url;
            document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (art) { art.switchUrl(url); art.play(); }
        };
        resGroup.appendChild(btn);
    });
}

function openExternal(url, title) {
    const encodedTitle = encodeURIComponent(title);
    window.location.href = `intent:${url}#Intent;package=com.genuine.leone;type=video/*;S.title=${encodedTitle};end`;
}

async function checkUserDisplay() {
    const id = localStorage.getItem('zetflix_device_id_mob') || "GUEST-USER";
    document.getElementById('u-id').textContent = id;
    const uExp = document.getElementById('u-exp');
    try {
        const res = await fetch(`${APPROVED_USERS_URL}?t=${Date.now()}`);
        const users = await res.json();
        const user = users.find(u => u.id === id);
        uExp.textContent = user ? user.expires.split('T')[0] : "Active Member";
    } catch { uExp.textContent = "Active Member"; }
}

async function loadMovies(url) {
    localStorage.setItem('s4itmm_saved_source', url);
    updateSourceButton(url);
    const grid = document.getElementById('movie-grid');
    grid.innerHTML = '<div class="col-span-2 text-center py-20 opacity-30 animate-pulse font-bold text-xs uppercase text-primary">Updating...</div>';
    
    try {
        const res = await fetch(`${url}?t=${Date.now()}`);
        allMovies = await res.json();
        renderMovies(allMovies);
    } catch { 
        loadMovies(movieSources[0].value); 
    }
}

function updateSourceButton(activeUrl) {
    const btn = document.getElementById('src-btn');
    const source = movieSources.find(s => s.value === activeUrl);
    if (source) {
        btn.innerHTML = `Source <br><span class="text-[8px] text-primary">${source.label.split(' ')[1]}</span>`;
        btn.classList.add('active-source');
    }
}

function renderMovies(data) {
    const grid = document.getElementById('movie-grid');
    const lastMovieId = localStorage.getItem('s4itmm_last_movie_id');
    grid.innerHTML = '';
    
    data.forEach(m => {
        const isActive = m.title === lastMovieId;
        const card = document.createElement('div');
        card.className = `group relative bg-white dark:bg-darkCard rounded-2xl overflow-hidden shadow-sm transition-all ${isActive ? 'active-movie' : 'border border-transparent'}`;
        card.innerHTML = `
            <div class="aspect-[3/4] overflow-hidden bg-slate-800">
                <img src="${m.logo}" class="w-full h-full object-cover">
                ${isActive ? '<div class="absolute top-2 right-2 bg-primary text-black text-[8px] font-bold px-2 py-1 rounded-md shadow-lg">LAST WATCHED</div>' : ''}
            </div>
            <div class="p-3">
                <h3 class="text-[10px] font-bold line-clamp-1 uppercase ${isActive ? 'text-primary' : ''}">${m.title}</h3>
                <p class="text-[9px] opacity-50 mt-1 uppercase">${m.category || "Movie"} • ${m.year || "2024"}</p>
            </div>
        `;
        card.onclick = () => openDetail(m);
        grid.appendChild(card);
    });
}

function openOverlay(title, items, callback) {
    const overlay = document.getElementById('overlay');
    const titleEl = document.getElementById('overlay-title');
    const listEl = document.getElementById('overlay-list');
    const currentSrc = localStorage.getItem('s4itmm_saved_source');

    titleEl.innerText = title;
    listEl.innerHTML = '';
    items.forEach(item => {
        const isSelected = item.value === currentSrc;
        const btn = document.createElement('button');
        btn.className = `w-full p-4 text-center text-xs font-bold border-b border-white/5 active:bg-primary uppercase text-white hover:bg-white/5 ${isSelected ? 'bg-primary/10 text-primary' : ''}`;
        btn.innerText = item.label;
        btn.onclick = () => { callback(item.value); closeOverlay(); };
        listEl.appendChild(btn);
    });
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
}

function closeOverlay() {
    const overlay = document.getElementById('overlay');
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
}

document.getElementById('src-btn').onclick = () => openOverlay("Server Source", movieSources, (val) => loadMovies(val));

document.getElementById('gen-btn').onclick = () => {
    const genres = [...new Set(allMovies.map(m => m.category).filter(Boolean))];
    openOverlay("Select Genre", genres.map(g => ({label:g, value:g})), (g) => {
        renderMovies(allMovies.filter(m => m.category === g));
    });
};

document.getElementById('yr-btn').onclick = () => {
    const years = [...new Set(allMovies.map(m => m.year).filter(Boolean))].sort((a,b) => b-a);
    openOverlay("Select Year", years.map(y => ({label:y, value:y})), (y) => {
        renderMovies(allMovies.filter(m => String(m.year) === String(y)));
    });
};

document.getElementById('search-bar').oninput = (e) =>
    renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(e.target.value.toLowerCase())));

document.getElementById('theme-toggle').onclick = () => document.documentElement.classList.toggle('dark');

window.onload = () => {
    checkUserDisplay();
    const savedSrc = localStorage.getItem('s4itmm_saved_source') || movieSources[0].value;
    loadMovies(savedSrc);
};
</script>

</body>
    </html>
