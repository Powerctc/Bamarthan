<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>S4ITMM TV - Android TV Optimized</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ============ GLOBAL ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body { background-color: #111827; color: white; overflow-x: hidden; }

    /* ============ SIDEBAR ============ */
    .sidebar { position: fixed; top: 0; left: 0; width: 192px; height: 100vh; background-color: #1f2937; z-index: 1001; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #374151; text-align: center; }
    .logo-text { font-weight: bold; font-size: 18px; color: #ef4444; }
    .nav-item { display: flex; align-items: center; padding: 15px 20px; color: #d1d5db; text-decoration: none; font-size: 14px; outline: none; }
    .nav-item i { margin-right: 12px; }
    .nav-item:focus, .nav-item.active { background-color: #ef4444; color: white; }

    /* ============ MAIN CONTENT ============ */
    .main-content { margin-left: 192px; min-height: 100vh; padding-bottom: 50px; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #1f2937; }
    .id-box { background: #000; padding: 8px 15px; border-radius: 5px; font-size: 12px; border: 1px solid #ef4444; }

    .content-body { padding: 20px; }

    /* ============ FILTERS ============ */
    .btn-group { display: flex; gap: 10px; margin-bottom: 25px; }
    .btn { background: #374151; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; outline: none; font-weight: bold; }
    .btn:focus, .btn.active { background: #ef4444; transform: scale(1.05); }

    /* ============ MATCH CARDS ============ */
    .match-container { display: flex; flex-wrap: wrap; gap: 20px; }
    .match-card { 
      background: #1f2937; border-radius: 15px; padding: 20px; width: 320px; 
      border: 2px solid transparent; outline: none; cursor: pointer;
    }
    .match-card:focus { border-color: #ef4444; background: #2d3748; transform: scale(1.02); }
    .league-tag { font-size: 11px; color: #60a5fa; display: block; text-align: center; margin-bottom: 10px; font-weight: bold; }
    .match-flex { display: flex; justify-content: space-between; align-items: center; }
    .team-box { width: 35%; text-align: center; }
    .team-box img { width: 50px; height: 50px; background: white; border-radius: 50%; padding: 3px; }
    .team-name { font-size: 13px; margin-top: 8px; font-weight: 500; }
    .center-box { text-align: center; width: 30%; }
    .match-time { color: #fbbf24; font-size: 18px; font-weight: bold; }
    .live-dot { color: #ef4444; font-size: 12px; font-weight: bold; animation: blink 1.5s infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    /* ============ STREAM LIST (Remote Friendly) ============ */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
    .modal-content { background: #1f2937; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid #4b5563; }
    .stream-list { margin-top: 20px; }
    .stream-link { 
      display: block; width: 100%; padding: 18px; margin-bottom: 12px; 
      background: #374151; color: white; border-radius: 12px; 
      text-decoration: none; font-weight: bold; text-align: center;
      border: 2px solid transparent; outline: none; font-size: 16px;
    }
    /* Remote နဲ့ ရွေးလိုက်ရင် အနီရောင်ပြောင်းမည့်အပိုင်း */
    .stream-link:focus { background: #ef4444; border-color: white; transform: scale(1.03); }

    footer { text-align: center; padding: 40px; color: #4b5563; font-size: 13px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header"><span class="logo-text">S4ITMM TV</span></div>
    <a href="https://nextjs-tv-one.vercel.app/index.html" class="nav-item" tabindex="1"><i class="fas fa-home"></i><span>HOME</span></a>
    <a href="#" class="nav-item active" tabindex="1"><i class="fas fa-futbol"></i><span>Futbol Live</span></a>
    <a href="https://nextjs-tv-one.vercel.app/mmtv/index.html" class="nav-item" tabindex="1"><i class="fas fa-satellite-dish"></i><span>Myanmar TV</span></a>
  </div>

  <div class="main-content">
    <div class="header-bar">
      <h1>Live Football</h1>
      <div class="id-box" id="id-display">Loading...</div>
    </div>

    <div class="content-body">
      <div class="btn-group">
        <button id="btn-all" class="btn active" onclick="App.setView('all')" tabindex="2">All</button>
        <button id="btn-live" class="btn" onclick="App.setView('live')" tabindex="2">Live</button>
        <button id="btn-tomorrow" class="btn" onclick="App.setView('tomorrow')" tabindex="2">Tomorrow</button>
        <button class="btn" onclick="location.reload()" tabindex="2">🔄 Reload</button>
      </div>

      <div id="loading" style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
      <div id="matchContainer" class="match-container"></div>
    </div>

    <footer>S4ITMM © 2026 | Created by U Maung</footer>
  </div>

  <div id="matchModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="text-align:center; margin-bottom:15px;">Channels</h2>
      <div id="streamList" class="stream-list"></div>
      <button class="btn" style="width:100%; margin-top:10px;" onclick="document.getElementById('matchModal').style.display='none'" tabindex="4">CLOSE</button>
    </div>
  </div>

  <script>
    var App = {
      url: "https://raw.githubusercontent.com/devxseven/mdata/refs/heads/main/matches.json",
      allMatches: [],
      view: 'all',

      init: function() {
        this.fetchMatches();
        document.getElementById('id-display').innerText = "ID: " + this.getStableID();
      },

      getStableID: function() {
        var id = localStorage.getItem("s4itmm_id") || Math.floor(Math.random()*900000000000+100000000000);
        localStorage.setItem("s4itmm_id", id);
        return id;
      },

      fetchMatches: function() {
        var self = this;
        var xhr = new XMLHttpRequest();
        xhr.open("GET", this.url + "?t=" + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4 && xhr.status === 200) {
            document.getElementById('loading').style.display = 'none';
            self.allMatches = JSON.parse(xhr.responseText).context || [];
            self.render();
          }
        };
        xhr.send();
      },

      setView: function(v) {
        this.view = v;
        var btns = document.querySelectorAll('.btn');
        for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
        document.getElementById('btn-'+v).classList.add('active');
        this.render();
      },

      render: function() {
        var container = document.getElementById('matchContainer');
        container.innerHTML = '';
        var now = moment();
        
        for (var i = 0; i < this.allMatches.length; i++) {
          (function(m) {
            var mt = moment(m.match_time * 1000);
            // Filter logic
            if(App.view === 'live' && !now.isBetween(mt, moment(mt).add(130, 'm'))) return;
            if(App.view === 'tomorrow' && !mt.isSame(moment().add(1,'d'), 'day')) return;

            var card = document.createElement('div');
            card.className = 'match-card';
            card.tabIndex = 3; // Remote Control Support
            card.innerHTML = 
              '<span class="league-tag">' + m.league + '</span>' +
              '<div class="match-flex">' +
                '<div class="team-box"><img src="'+m.home_img+'"><div>'+m.home_name+'</div></div>' +
                '<div class="center-box"><div class="match-time">'+mt.format('HH:mm')+'</div></div>' +
                '<div class="team-box"><img src="'+m.away_img+'"><div>'+m.away_name+'</div></div>' +
              '</div>';
            
            card.onclick = function() { App.showStreams(m); };
            // Remote OK button keydown handler
            card.onkeydown = function(e) { if(e.keyCode === 13) App.showStreams(m); };
            container.appendChild(card);
          })(this.allMatches[i]);
        }
      },

      showStreams: function(m) {
        document.getElementById('modalTitle').innerText = m.home_name + " VS " + m.away_name;
        var list = document.getElementById('streamList');
        list.innerHTML = '';
        var links = m.links || [];

        if(links.length === 0) {
          list.innerHTML = "<p style='text-align:center;'>No Channels Available</p>";
        } else {
          for (var i = 0; i < links.length; i++) {
            (function(link) {
              var a = document.createElement('a');
              a.href = "#";
              a.className = "stream-link";
              a.tabIndex = 4;
              a.innerHTML = '<i class="fas fa-play-circle"></i> ' + link.name;
              
              // Click & Remote OK
              var playFn = function() { App.play(link.url); };
              a.onclick = playFn;
              a.onkeydown = function(e) { if(e.keyCode === 13) playFn(); };
              
              list.appendChild(a);
            })(links[i]);
          }
        }
        document.getElementById('matchModal').style.display = 'flex';
        // Focus first stream for remote
        setTimeout(function() { 
          var first = document.querySelector('.stream-link');
          if(first) first.focus();
        }, 200);
      },

      play: function(url) {
        var pkg = "com.genuine.leone";
        window.location.href = "intent:" + url + "#Intent;package=" + pkg + ";S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
      }
    };

    window.onload = function() { App.init(); };
  </script>
</body>
</html>
