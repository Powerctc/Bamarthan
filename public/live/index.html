<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>S4ITMM TV - Legacy TV Support</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ============ GLOBAL & SIDEBAR ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body { background-color: #111827; color: white; overflow-x: hidden; }

    .sidebar { position: fixed; top: 0; left: 0; width: 192px; height: 100vh; background-color: #1f2937; z-index: 1001; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #374151; text-align: center; }
    .logo-text { font-weight: bold; font-size: 18px; color: #ef4444; }
    .nav-item { display: flex; align-items: center; padding: 15px 20px; color: #d1d5db; text-decoration: none; font-size: 14px; outline: none; }
    .nav-item:focus, .nav-item.active { background-color: #ef4444; color: white; }

    .main-content { margin-left: 192px; min-height: 100vh; padding-bottom: 50px; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #1f2937; }
    .id-box { background: #000; padding: 8px 15px; border-radius: 5px; font-size: 11px; border: 1px solid #374151; }

    .content-body { padding: 20px; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
    .btn { background: #374151; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; outline: none; font-weight: bold; font-size: 13px; }
    .btn:focus, .btn.active { background: #ef4444; border: 2px solid white; }

    /* ============ MATCH CARDS ============ */
    .match-container { display: flex; flex-wrap: wrap; gap: 16px; }
    .match-card { 
      background: #1f2937; border-radius: 12px; padding: 18px; 
      width: 300px; border: 2px solid #374151; outline: none; cursor: pointer;
      display: inline-block; vertical-align: top; transition: 0.3s;
    }
    .match-card:focus { border-color: #ef4444; background: #2d3748; transform: scale(1.02); }
    
    .match-card.is-live-border { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

    .league-tag { font-size: 11px; color: #60a5fa; display: block; text-align: center; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
    
    /* New Date Style */
    .match-date-info { font-size: 10px; color: #9ca3af; display: block; text-align: center; margin-bottom: 10px; font-weight: normal; }

    .match-flex { display: flex; justify-content: space-between; align-items: center; }
    .team-box { width: 35%; text-align: center; }
    .team-box img { width: 45px; height: 45px; background: white; border-radius: 50%; padding: 2px; object-fit: contain; }
    .team-name { font-size: 12px; margin-top: 8px; font-weight: 500; color: #f3f4f6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .center-box { text-align: center; width: 30%; }
    .match-time { color: #fbbf24; font-size: 15px; font-weight: bold; margin-bottom: 4px; }
    .live-indicator { 
      display: inline-block;
      background: #ef4444; 
      color: white; 
      font-size: 10px; 
      padding: 2px 8px; 
      border-radius: 4px; 
      font-weight: bold; 
      animation: blink 1.5s infinite;
    }
    
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    footer { text-align: center; padding: 30px; color: #6b7280; font-size: 12px; border-top: 1px solid #1f2937; margin-top: 20px; }
    
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar span, .logo-text { display: none; }
      .main-content { margin-left: 60px; }
      .match-card { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header"><span class="logo-text">S4ITMM TV</span></div>
    <a href="https://nextjs-tv-one.vercel.app/search.html" class="nav-item"><i class="fas fa-search mr-3"></i></a>
    <a href="https://nextjs-tv-one.vercel.app/index.html" class="nav-item"><i class="fas fa-home mr-3"></i></a>
    <a href="https://nextjs-tv-one.vercel.app/Live/index.html" class="nav-item"><i class="fas fa-futbol mr-3"></i></a>
    <a href="https://nextjs-tv-one.vercel.app/live/indexl.html" class="nav-item active"><i class="fas fa-futbol mr-3"></i></a>
    <a href="https://nextjs-tv-one.vercel.app/fight/index.html" class="nav-item"><i class="fas fa-people-arrows mr-3"></i></a>
    <a href="https://nextjs-tv-one.vercel.app/series/index.html" class="nav-item"><i class="fas fa-tv mr-3"></i></a>
    <a href="https://nextjs-tv-one.vercel.app/mmtv/index.html" class="nav-item"><i class="fas fa-satellite-dish mr-3"></i></a>
    <a href="https://nextjs-tv-one.vercel.app/About.html" class="nav-item"><i class="fas fa-user mr-3"></i></a>
  </div>
<!-- MAIN CONTENT -->
  <div class="main-content">
    <h2 class="page-title">Movies</h2>
    <!-- DEVICE INFO DISPLAY -->
    <div class="device-info" id="id-display">
       <i class="fas fa-sync fa-spin"></i> Loading access info...
    </div>
 <!-- <div class="main-content">
    <div class="header-bar">
      <h1>Live Football</h1>
      <div id="id-display" class="id-box">Loading ID...</div>
    </div>-->

    <div class="content-body">
      <div class="btn-group">
        <button id="btn-all" class="btn active" onclick="App.setView('all')" tabindex="2">All Matches</button>
        <button id="btn-live" class="btn" onclick="App.setView('live')" tabindex="2">Live</button>
        <button id="btn-tomorrow" class="btn" onclick="App.setView('tomorrow')" tabindex="2">Tomorrow</button>
        <button class="btn" style="background:#3b82f6" onclick="location.reload()" tabindex="2">🔄 Reload</button>
      </div>

      <div id="loading" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
      <div id="matchContainer" class="match-container"></div>
    </div>

    <footer>
      <p>S4ITMM © 2026 | Created by U Maung</p>
    </footer>
  </div>

  <script>
    var App = {
      url: "https://tv-version-eight.vercel.app/api/get-matches.js",
      allMatches: [],
      view: 'all',

      init: function() {
        this.fetchMatches();
        document.getElementById('id-display').innerText = "ID: " + this.getStableID();
      },

      getStableID: function() {
        var id = localStorage.getItem("s4itmm_id");
        if(!id) {
          id = Math.abs(Math.floor(Math.random()*900000000000+100000000000)).toString().slice(0,12);
          localStorage.setItem("s4itmm_id", id);
        }
        return id;
      },

      fetchMatches: function() {
        var self = this;
        var xhr = new XMLHttpRequest();
        xhr.open("GET", this.url + "?t=" + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4 && xhr.status === 200) {
            document.getElementById('loading').style.display = 'none';
            try {
              var data = JSON.parse(xhr.responseText);
              self.allMatches = data.context || [];
              self.render();
            } catch(e) { console.error("Data error"); }
          }
        };
        xhr.send();
      },

      setView: function(v) {
        this.view = v;
        var btns = document.querySelectorAll('.btn');
        for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
        if(document.getElementById('btn-'+v)) document.getElementById('btn-'+v).classList.add('active');
        this.render();
      },

      render: function() {
        var container = document.getElementById('matchContainer');
        container.innerHTML = '';
        
        var now = moment();
        
        for (var i = 0; i < this.allMatches.length; i++) {
          (function(match) {
            var matchStartTime = moment(match.match_time * 1000);
            var matchEndTime = moment(matchStartTime).add(130, 'minutes');
            
            var isLive = now.isSameOrAfter(matchStartTime) && now.isBefore(matchEndTime);
            
            if(App.view === 'live' && !isLive) return;
            if(App.view === 'tomorrow' && !matchStartTime.isSame(moment().add(1,'d'), 'day')) return;

            var card = document.createElement('div');
            card.className = 'match-card' + (isLive ? ' is-live-border' : '');
            card.tabIndex = 3; 
            
            var timeStr = matchStartTime.format('hh:mm A');
            // Day and Date format: Sat 02/01
            var dateStr = matchStartTime.format('ddd DD/MM');
            
            card.innerHTML = 
              '<span class="league-tag">' + (match.league || 'Football') + '</span>' +
              '<span class="match-date-info">' + dateStr + '</span>' +
              '<div class="match-flex">' +
                '<div class="team-box"><img src="'+match.home_img+'" onerror="this.src=\'https://via.placeholder.com/50\'"> <div class="team-name">'+match.home_name+'</div></div>' +
                '<div class="center-box">' +
                  '<div class="match-time">' + timeStr + '</div>' +
                  (isLive ? '<div class="live-indicator">● LIVE</div>' : '') +
                '</div>' +
                '<div class="team-box"><img src="'+match.away_img+'" onerror="this.src=\'https://via.placeholder.com/50\'"> <div class="team-name">'+match.away_name+'</div></div>' +
              '</div>';
            
            var goToDetail = function() {
              try {
                localStorage.setItem('selectedMatch', JSON.stringify(match));
                window.location.href = 'football_detail.html';
              } catch(e) { console.error("Storage error"); }
            };

            card.onclick = goToDetail;
            card.onkeydown = function(e) { if(e.keyCode === 13) goToDetail(); };

            container.appendChild(card);
          })(this.allMatches[i]);
        }
      }
    };

    window.onload = function() { App.init(); };
</script>
</body>
  </html>
