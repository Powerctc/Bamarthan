<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Football - S4ITMM TV (Legacy Support)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ============ GLOBAL ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
    body { background-color: #111827; color: white; line-height: 1.6; }

    /* ============ SIDEBAR ============ */
    .sidebar {
      position: fixed; top: 0; left: 0; width: 192px; height: 100vh;
      background-color: #1f2937; overflow-y: auto; z-index: 1001;
    }
    .sidebar-header { padding: 16px; display: flex; align-items: center; border-bottom: 1px solid #374151; }
    .sidebar-header i { color: #ef4444; margin-right: 8px; font-size: 20px; }
    .logo-text { font-weight: bold; font-size: 18px; color: #f3f4f6; }
    .nav-item { display: flex; align-items: center; padding: 12px 16px; color: #d1d5db; text-decoration: none; font-size: 14px; }
    .nav-item i { width: 24px; margin-right: 10px; }
    .nav-item.active { background-color: #ef4444; color: white; }

    /* ============ MAIN CONTENT ============ */
    .main-content { margin-left: 192px; padding: 0; min-height: 100vh; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #1f2937; position: sticky; top: 0; z-index: 1000; }
    .header-bar h1 { font-size: 1.25rem; color: #ef4444; }
    .content-body { padding: 24px; }

    /* ============ MATCH CARDS (LEGACY FLEXBOX) ============ */
    .match-container {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      gap: 16px; justify-content: flex-start;
    }
    .match-card {
      background: #1f2937; border-radius: 12px; padding: 16px;
      cursor: pointer; border: 1px solid #374151;
      width: 300px; margin-bottom: 10px; /* TV Box အတွက် ပုံသေ Width ပေးထားခြင်း */
    }
    .league-tag { font-size: 0.7rem; color: #60a5fa; font-weight: bold; text-transform: uppercase; margin-bottom: 12px; display: block; text-align: center; }
    .match-flex { display: flex; align-items: center; justify-content: space-between; }
    .team-box { width: 35%; text-align: center; }
    .team-box img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; background: white; padding: 2px; border-radius: 50%; }
    .team-name { font-size: 0.8rem; font-weight: 500; color: #f3f4f6; }
    .center-box { width: 30%; text-align: center; }
    .match-time { color: #fbbf24; font-weight: bold; font-size: 1rem; }
    .match-date { color: #9ca3af; font-size: 0.75rem; }
    .live-dot { color: #ef4444; font-size: 0.75rem; font-weight: bold; animation: blink 1.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ============ MODAL ============ */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: #1f2937; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; position: relative; text-align: center; border: 1px solid #4b5563; }
    .stream-link { display: block; width: 100%; padding: 14px; margin: 10px 0; background: #ef4444; color: white; border: none; border-radius: 10px; font-weight: bold; text-decoration: none; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar .logo-text, .sidebar span { display: none; }
      .main-content { margin-left: 60px; }
      .match-card { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header"><i class="fas fa-film"></i><span class="logo-text">S4ITMM TV</span></div>
    <a href="#" class="nav-item active"><i class="fas fa-futbol"></i><span>Futbol Live</span></a>
  </div>

  <div class="main-content">
    <div class="header-bar">
      <h1><i class="fas fa-futbol"></i> Live Football</h1>
      <div id="id-display" style="font-size:12px; color:#94a3b8;">Loading ID...</div>
    </div>

    <div class="content-body">
      <div id="loading" style="text-align: center; padding: 50px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:#ef4444"></i></div>
      <div id="matchContainer" class="match-container"></div>
    </div>
  </div>

  <div id="matchModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle" style="margin-bottom:20px;">Select Channel</h3>
      <div id="streamList"></div>
      <button onclick="document.getElementById('matchModal').style.display='none'" style="margin-top:15px; background:none; border:none; color:#aaa; cursor:pointer;">CLOSE</button>
    </div>
  </div>

  <script>
    // TV Box Version အဟောင်းတွေအတွက် ES5 Format ဖြင့်ပြန်ရေးထားသော Script
    var App = {
      url: "https://raw.githubusercontent.com/devxseven/mdata/refs/heads/main/matches.json",
      allMatches: [],

      init: function() {
        this.fetchData();
        document.getElementById("id-display").innerText = "ID: " + this.getStableID();
      },

      getStableID: function() {
        try {
          var id = localStorage.getItem("s4itmm_id");
          if (!id) {
            id = Math.floor(Math.random() * 900000000000) + 100000000000;
            localStorage.setItem("s4itmm_id", id);
          }
          return id;
        } catch(e) { return "123456789012"; }
      },

      fetchData: function() {
        var self = this;
        var xhr = new XMLHttpRequest();
        xhr.open("GET", this.url + "?t=" + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            document.getElementById('loading').style.display = 'none';
            if (xhr.status === 200) {
              var data = JSON.parse(xhr.responseText);
              self.allMatches = data.context || [];
              self.render(self.allMatches);
            } else {
              document.getElementById('matchContainer').innerHTML = "<p>Error loading data. Check Internet/VPN.</p>";
            }
          }
        };
        xhr.send();
      },

      render: function(matches) {
        var container = document.getElementById('matchContainer');
        container.innerHTML = '';
        var now = moment();

        for (var i = 0; i < matches.length; i++) {
          (function(m) {
            var mt = moment(m.match_time * 1000);
            var isLive = now.isBetween(mt, moment(mt).add(130, 'm'));
            
            var card = document.createElement('div');
            card.className = 'match-card';
            card.innerHTML = 
              '<span class="league-tag">' + (m.league || 'Football') + '</span>' +
              '<div class="match-flex">' +
                '<div class="team-box"><img src="' + m.home_img + '" onerror="this.src=\'https://via.placeholder.com/50\'"><div class="team-name">' + m.home_name + '</div></div>' +
                '<div class="center-box">' +
                  '<div class="match-date">' + mt.format('DD MMM') + '</div>' +
                  '<div class="match-time">' + mt.format('hh:mm A') + '</div>' +
                  (isLive ? '<div class="live-dot">● LIVE</div>' : '') +
                '</div>' +
                '<div class="team-box"><img src="' + m.away_img + '" onerror="this.src=\'https://via.placeholder.com/50\'"><div class="team-name">' + m.away_name + '</div></div>' +
              '</div>';
            
            card.onclick = function() { App.showStreams(m); };
            container.appendChild(card);
          })(matches[i]);
        }
      },

      showStreams: function(m) {
        document.getElementById('modalTitle').innerText = m.home_name + " VS " + m.away_name;
        var list = document.getElementById('streamList');
        list.innerHTML = '';
        var links = m.links || [];
        
        if (links.length === 0) {
          list.innerHTML = "<p style='color:#fbbf24;'>Available soon...</p>";
        } else {
          for (var j = 0; j < links.length; j++) {
            var l = links[j];
            var btn = document.createElement('button');
            btn.className = 'stream-link';
            btn.innerHTML = '<i class="fas fa-play"></i> ' + (l.name || 'Server');
            (function(url) {
              btn.onclick = function() { App.play(url); };
            })(l.url);
            list.appendChild(btn);
          }
        }
        document.getElementById('matchModal').style.display = 'flex';
      },

      play: function(url) {
        var pkg = "com.genuine.leone";
        window.location.href = "intent:" + url + "#Intent;package=" + pkg + ";S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
      }
    };

    window.onload = function() { App.init(); };
  </script>
</body>
</html>
