<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Football - S4ITMM TV</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ============ GLOBAL ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
    body { background-color: #111827; color: white; line-height: 1.6; }

    /* ============ SIDEBAR ============ */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 192px;
      height: 100vh;
      background-color: #1f2937;
      overflow-y: auto;
      z-index: 1001;
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #374151;
    }

    .sidebar-header i { color: #ef4444; margin-right: 8px; font-size: 20px; }
    .logo-text { font-weight: bold; font-size: 18px; color: #f3f4f6; }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: #d1d5db;
      text-decoration: none;
      transition: all 0.2s;
      font-size: 14px;
    }

    .nav-item i { width: 24px; margin-right: 10px; }

    .nav-item:hover:not(.active) {
      background-color: #374151;
      color: white;
    }

    .nav-item.active {
      background-color: #ef4444;
      color: white;
    }

    /* ============ MAIN CONTENT ============ */
    .main-content {
      margin-left: 192px;
      padding: 0;
      min-height: 100vh;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #1f2937;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .header-bar h1 { font-size: 1.25rem; color: #ef4444; display: flex; align-items: center; }
    .header-bar h1 i { margin-right: 10px; }

    #device-info-box {
      text-align: right;
    }

    .device-id-text {
      font-size: 0.75rem;
      color: #94a3b8;
      background: #111827;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
      border: 1px solid #374151;
    }

    .content-body { padding: 24px; }

    /* ============ MATCH CARDS ============ */
    .btn-group { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .btn {
      background: #374151;
      color: #d1d5db;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn.active { background: #ef4444; color: white; }
    .reload-btn { background: #3b82f6; color: white; }

    .match-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .match-card {
      background: #1f2937;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #374151;
      position: relative;
    }
    .match-card:hover { transform: translateY(-3px); border-color: #ef4444; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

    .league-tag {
      font-size: 0.7rem;
      color: #60a5fa;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
      text-align: center;
      background: rgba(31, 41, 55, 0.5);
      padding: 2px;
      border-radius: 4px;
    }

    .match-flex { display: flex; align-items: center; justify-content: space-between; }
    .team-box { width: 35%; text-align: center; }
    .team-box img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; background: white; padding: 2px; border-radius: 50%; }
    .team-name { font-size: 0.8rem; font-weight: 500; color: #f3f4f6; }

    .center-box { width: 30%; text-align: center; }
    .match-time { color: #fbbf24; font-weight: bold; font-size: 1rem; }
    .match-date { color: #9ca3af; font-size: 0.75rem; }
    .live-dot { color: #ef4444; font-size: 0.75rem; font-weight: bold; animation: blink 1.5s infinite; margin-top: 4px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ============ MODAL ============ */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
    }
    .modal-content {
      background: #1f2937; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px;
      position: relative; border: 1px solid #4b5563; text-align: center;
    }
    .close-btn { position: absolute; top: 15px; right: 15px; color: #9ca3af; cursor: pointer; font-size: 20px; }
    .modal-title { font-size: 1.1rem; margin-bottom: 20px; color: #fff; }
    .stream-link {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px; margin: 10px 0; background: #ef4444; color: white;
      border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none;
    }

    footer { text-align: center; padding: 30px; color: #6b7280; font-size: 12px; border-top: 1px solid #1f2937; }
    footer a { color: #ef4444; text-decoration: none; }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar .logo-text, .sidebar span { display: none; }
      .main-content { margin-left: 60px; }
      .nav-item { justify-content: center; padding: 15px 0; }
      .nav-item i { margin-right: 0; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR MENU -->
  <div class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-film"></i>
      <span class="logo-text">S4ITMM TV</span>
    </div>
    <a href="https://nextjs-tv-one.vercel.app/search.html" class="nav-item">
      <i class="fas fa-search"></i><span>Search</span>
    </a>
    <a href="https://nextjs-tv-one.vercel.app/index.html" class="nav-item">
      <i class="fas fa-home"></i><span>HOME</span>
    </a>
    <a href="https://nextjs-tv-one.vercel.app/Live/index.html" class="nav-item active">
      <i class="fas fa-futbol"></i><span>Futbol Live(D1)</span>
    </a>
    <a href="https://nextjs-tv-one.vercel.app/live/indexl.html" class="nav-item">
      <i class="fas fa-futbol"></i><span>Futbol Live(D2)</span>
    </a>
    <a href="https://nextjs-tv-one.vercel.app/fight/index.html" class="nav-item">
      <i class="fas fa-hand-fist"></i><span>MMA Live</span>
    </a>
    <a href="https://www.fotmob.com/my" class="nav-item" target="_blank">
      <i class="fas fa-chart-line"></i><span>Livescore</span>
    </a>
    <a href="https://nextjs-tv-one.vercel.app/series/index.html" class="nav-item">
      <i class="fas fa-tv"></i><span>Series</span>
    </a>
    <a href="https://nextjs-tv-one.vercel.app/mmtv/index.html" class="nav-item">
      <i class="fas fa-satellite-dish"></i><span>Myanmar TV</span>
    </a>
    <a href="https://nextjs-tv-one.vercel.app/About.html" class="nav-item">
      <i class="fas fa-user-gear"></i><span>About</span>
    </a>
  </div>

  <!-- MAIN CONTENT AREA -->
  <div class="main-content">
    <div class="header-bar">
      <h1><i class="fas fa-futbol"></i> Live Football</h1>
      <div id="device-info-box">
        <div class="device-id-text" id="id-display"><i class="fas fa-sync fa-spin"></i> Loading ID...</div>
      </div>
    </div>

    <div class="content-body">
      <!-- VPN Notice -->
      <div style="background: rgba(59, 130, 246, 0.1); border-left: 4px solid #fbbf24; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
        <p style="font-size: 0.85rem; color: #bfdbfe;">
          <i class="fas fa-info-circle"></i> ပွဲစဉ်များ မပေါ်ပါက VPN ခဏဖွင့်ပါ။ ပေါ်လာလျှင် ပြန်ပိတ်နိုင်ပါသည်။
        </p>
      </div>

      <!-- Filters -->
      <div class="btn-group">
        <button id="btn-live" class="btn" onclick="App.setView('live')">Live</button>
        <button id="btn-hot" class="btn" onclick="App.setView('hot')">Hot</button>
        <button id="btn-all" class="btn active" onclick="App.setView('all')">All Matches</button>
        <button id="btn-tomorrow" class="btn" onclick="App.setView('tomorrow')">Tomorrow</button>
        <button class="btn reload-btn" onclick="location.reload()"><i class="fas fa-sync"></i></button>
      </div>

      <!-- Loading Indicator -->
      <div id="loading" style="text-align: center; padding: 50px; display: none;">
        <i class="fas fa-spinner fa-spin fa-2x" style="color:#ef4444"></i>
      </div>

      <!-- Matches Grid -->
      <div id="matchContainer" class="match-container"></div>
    </div>

    <footer>
      <p>S4ITMM © 2026 | All rights reserved</p>
      <p>Created by <a href="https://www.facebook.com/share/16eJkjQPHU/" target="_blank">U Maung (Forever Study)</a></p>
    </footer>
  </div>

  <!-- STREAM MODAL -->
  <div id="matchModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="document.getElementById('matchModal').style.display='none'"><i class="fas fa-times"></i></span>
      <h3 id="modalTitle" class="modal-title">Select Channel</h3>
      <div id="streamList"></div>
    </div>
  </div>

  <script>
    // === STABLE DEVICE ID SYSTEM ===
    function getStableID() {
      try {
        let id = localStorage.getItem("s4itmm_stable_id");
        if (id && id.length === 12) return id;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top"; ctx.font = "14px Arial"; ctx.fillText('S4ITMM-2026', 2, 2);
        const b64 = canvas.toDataURL().replace("data:image/png;base64,", "");
        let hash = 0;
        for (let i = 0; i < b64.length; i++) { hash = (hash << 5) - hash + b64.charCodeAt(i); hash |= 0; }
        const raw = Math.abs(hash).toString() + navigator.platform + (screen.width+"x"+screen.height);
        let finalHash = 0;
        for (let j = 0; j < raw.length; j++) { finalHash = (finalHash << 5) - finalHash + raw.charCodeAt(j); finalHash |= 0; }
        id = Math.abs(finalHash).toString().padStart(12, "0").slice(0, 12);
        localStorage.setItem("s4itmm_stable_id", id);
        return id;
      } catch (e) { return "000000000000"; }
    }

    async function checkAccess() {
      const id = getStableID();
      const display = document.getElementById("id-display");
      try {
        const res = await fetch("https://livesportmm-s4itmmapprover.hf.space/approved_users.json?_t=" + Date.now());
        const users = await res.json();
        const user = users.find(u => u.id === id);
        if (user) {
          display.innerHTML = `<i class="fas fa-check-circle" style="color:#10b981"></i> ID: ${id} | Exp: ${user.expires}`;
        } else {
          display.textContent = `ID: ${id} | Trial Access`;
        }
      } catch (e) { display.textContent = `ID: ${id}`; }
    }

    // === MATCH LOGIC ===
    const App = {
      url: "https://raw.githubusercontent.com/devxseven/mdata/refs/heads/main/matches.json",
      all: [],
      view: 'all',

      async init() {
        checkAccess();
        this.load();
      },

      setView(v) {
        this.view = v;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${v}`).classList.add('active');
        this.render();
      },

      async load() {
        const loader = document.getElementById('loading');
        loader.style.display = 'block';
        try {
          const res = await fetch(this.url + '?_t=' + Date.now());
          const data = await res.json();
          this.all = data.context || [];
          this.render();
        } catch (e) {
          document.getElementById('matchContainer').innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Error loading matches.</p>";
        }
        loader.style.display = 'none';
      },

      render() {
        const container = document.getElementById('matchContainer');
        container.innerHTML = '';
        let filtered = this.all;
        const now = moment();

        if (this.view === 'live') {
          filtered = this.all.filter(m => now.isBetween(moment(m.match_time*1000), moment(m.match_time*1000).add(130, 'm')));
        } else if (this.view === 'hot') {
          const hotL = ['Premier League', 'UCL', 'Europa League', 'Laliga', 'Serie A', 'Bundesliga', 'NBA'];
          filtered = this.all.filter(m => hotL.some(l => m.league?.includes(l)));
        } else if (this.view === 'tomorrow') {
          filtered = this.all.filter(m => moment(m.match_time*1000).isSame(moment().add(1,'d'), 'day'));
        }

        filtered.sort((a,b) => a.match_time - b.match_time);
        
        if (!filtered.length) {
          container.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:40px; color:#9ca3af;'>No matches found.</p>";
          return;
        }

        filtered.forEach(m => {
          const mt = moment(m.match_time*1000);
          const isLive = now.isBetween(mt, moment(mt).add(130, 'm'));
          const card = document.createElement('div');
          card.className = 'match-card';
          card.innerHTML = `
            <span class="league-tag">${m.league || 'Football'}</span>
            <div class="match-flex">
              <div class="team-box">
                <img src="${m.home_img || ''}" onerror="this.src='https://via.placeholder.com/50'">
                <div class="team-name">${m.home_name}</div>
              </div>
              <div class="center-box">
                <div class="match-date">${mt.format('DD MMM')}</div>
                <div class="match-time">${mt.format('hh:mm A')}</div>
                ${isLive ? '<div class="live-dot">● LIVE</div>' : ''}
              </div>
              <div class="team-box">
                <img src="${m.away_img || ''}" onerror="this.src='https://via.placeholder.com/50'">
                <div class="team-name">${m.away_name}</div>
              </div>
            </div>
          `;
          card.onclick = () => this.showStreams(m);
          container.appendChild(card);
        });
      },

      showStreams(m) {
        document.getElementById('modalTitle').innerText = `${m.home_name} VS ${m.away_name}`;
        const list = document.getElementById('streamList');
        list.innerHTML = '';
        const links = m.links || [];
        if (!links.length) {
          list.innerHTML = "<p style='padding:20px; color:#fbbf24;'>Streams available 15 mins before kickoff.</p>";
        } else {
          links.forEach(l => {
            const btn = document.createElement('button');
            btn.className = 'stream-link';
            btn.innerHTML = `<i class="fas fa-play"></i> ${l.name || 'Server'}`;
            btn.onclick = () => this.play(l.url);
            list.appendChild(btn);
          });
        }
        document.getElementById('matchModal').style.display = 'flex';
      },

      play(url) {
        if (!/Android/i.test(navigator.userAgent)) {
          alert("Android ဖုန်းများတွင်သာ ကြည့်ရှုနိုင်ပါသည်။");
          return;
        }
        const pkg = "com.genuine.leone";
        window.location.href = `intent:${url}#Intent;package=${pkg};S.browser_fallback_url=${encodeURIComponent("https://play.google.com/store/apps/details?id="+pkg)};end`;
      }
    };

    window.onload = () => App.init();
  </script>
</body>
</html>
