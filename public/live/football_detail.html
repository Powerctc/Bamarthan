<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Live Match - S4ITMM TV</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body { background-color: #1a202c; color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    .flex-center { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
    .card { background-color: #2d3748; border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-align: center; }
    
    .match-logo-container { 
      background: #1a202c; border-radius: 10px; padding: 20px; 
      display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 20px 0;
    }
    .team-logo { width: 70px; height: 70px; object-fit: contain; background: white; border-radius: 50%; padding: 5px; }
    .vs-label { color: #ef4444; font-weight: bold; font-size: 1.2rem; }
    
    .stream-button {
      display: block; width: 100%; background-color: #ef4444; color: white;
      padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px;
      margin-bottom: 12px; border: 2px solid transparent; cursor: pointer; text-decoration: none; outline: none;
    }
    .stream-button:focus { background-color: #ffffff; color: #ef4444; border-color: #ef4444; transform: scale(1.05); }

    .back-button { display: inline-block; margin-top: 20px; color: #63b3ed; text-decoration: none; font-size: 14px; outline: none; padding: 10px; }
    .back-button:focus { color: #ef4444; text-decoration: underline; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #2d3748; padding: 30px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
    .app-logo { width: 80px; height: 80px; border-radius: 15px; margin-bottom: 15px; }
    .install-btn { background: #4299e1; color: white; padding: 12px; border-radius: 8px; display: block; text-decoration: none; font-weight: bold; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="flex-center">
    <div id="match-detail-container" class="card">
      <p><i class="fas fa-spinner fa-spin"></i> Loading streams...</p>
    </div>
  </div>

  <div id="player-modal" class="modal-overlay">
    <div class="modal-content">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnni40YRRPc9wGBd2tDOIX1qCTqddax0tPR5QsIxC8HA&s=10" class="app-logo">
      <h3 style="margin: 0 0 10px 0;">Player Not Found</h3>
      <p style="font-size: 14px; color: #cbd5e0;">Please install "Network Streaming Player" to watch.</p>
      <a href="https://play.google.com/store/apps/details?id=com.genuine.leone" class="install-btn">Download from Play Store</a>
      <button onclick="document.getElementById('player-modal').style.display='none'" style="background:none; border:none; color:#a0aec0; margin-top:15px; cursor:pointer;" tabindex="200">Close</button>
    </div>
  </div>

  <script>
    var checkTimer;

    document.addEventListener('DOMContentLoaded', function() {
      var container = document.getElementById('match-detail-container');
      var matchData = localStorage.getItem('selectedMatch');

      if (!matchData) {
        container.innerHTML = '<p>No match selected.</p><a href="index.html" class="back-button">← Back to List</a>';
        return;
      }

      var match = JSON.parse(matchData);
      
      var html = '<h2 style="margin-bottom:5px;">' + (match.home_name || "Match") + ' VS ' + (match.away_name || "") + '</h2>';
      html += '<p style="color:#a0aec0; margin-bottom:20px;">' + (match.league || "Live Stream") + '</p>';
      
      html += '<div class="match-logo-container">' +
                '<img src="' + (match.home_img || '') + '" class="team-logo" onerror="this.src=\'https://via.placeholder.com/70\'">' +
                '<div class="vs-label">VS</div>' +
                '<img src="' + (match.away_img || '') + '" class="team-logo" onerror="this.src=\'https://via.placeholder.com/70\'">' +
              '</div>';

      html += '<div id="button-list" style="margin-top:20px;">';
      if (match.links && match.links.length > 0) {
        for (var i = 0; i < match.links.length; i++) {
          var link = match.links[i];
          html += '<button class="stream-button" tabindex="' + (i + 1) + '" onclick="openPlayer(\'' + link.url + '\')">' + 
                  '<i class="fas fa-play-circle" style="margin-right:8px;"></i>' + link.name + 
                  '</button>';
        }
      } else {
        html += '<p>No streams available for this match.</p>';
      }
      html += '</div>';

      html += '<a href="javascript:history.back()" class="back-button" tabindex="100">← Back to List</a>';

      container.innerHTML = html;

      setTimeout(function() {
        var firstBtn = document.querySelector('.stream-button');
        if (firstBtn) firstBtn.focus();
      }, 300);
    });

    window.openPlayer = function(url) {
      if (!url) return;

      var finalUrl = url;
      
      // VPN Bypass using Hugging Face Proxy
      if (url.indexOf("niues.live") !== -1) {
        var hfProxy = "https://livesportmm-s4itmm-proxy.hf.space/proxy?url=";
        finalUrl = hfProxy + encodeURIComponent(url);
      }

      var intentUrl = "intent:" + finalUrl + "#Intent;package=com.genuine.leone;type=video/*;S.title=S4ITMM%20TV;end";
      
      window.location.href = intentUrl;

      if (checkTimer) clearTimeout(checkTimer);
      checkTimer = setTimeout(function() {
        if (!document.hidden && !document.webkitHidden) {
          document.getElementById('player-modal').style.display = 'flex';
        }
      }, 3000);
    };

    var handleVisibilityChange = function() {
      if (document.hidden || document.webkitHidden) {
        if (checkTimer) clearTimeout(checkTimer);
      }
    };

    document.addEventListener("visibilitychange", handleVisibilityChange);
    document.addEventListener("webkitvisibilitychange", handleVisibilityChange);
  </script>
</body>
</html>
