<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Live Match - Stream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      background-color: #1a202c;
      color: #e2e8f0;
    }
    .match-logo {
      width: 100%;
      max-width: 300px;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #2d3748;
      border-radius: 0.5rem;
      padding: 12px;
    }
    .team-logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }
    .vs-label {
      color: #a0aec0;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .stream-button {
      background-color: #ef4444;
      color: white;
      padding: 0.6rem 1rem;
      border-radius: 0.375rem;
      font-weight: bold;
      margin: 0.25rem 0;
      width: 100%;
      text-align: center;
      transition: background-color 0.2s;
    }
    .stream-button:hover {
      background-color: #dc2626;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal-content {
      background-color: #2d3748;
      padding: 2rem;
      border-radius: 0.75rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 420px;
      text-align: center;
      transform: translateY(-20px);
      transition: transform 0.3s ease-in-out;
      position: relative;
    }
    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }
    .modal-close-button {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #cbd5e0;
      cursor: pointer;
    }
    .modal-close-button:hover {
      color: #ffffff;
    }
    .install-button {
      background-color: #4299e1;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 0.375rem;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    .install-button:hover {
      background-color: #3182ce;
    }
    .app-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      border-radius: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <main class="flex-1 flex items-center justify-center p-4">
    <div id="match-detail-container" class="bg-gray-800 rounded-lg shadow-xl p-6 w-full max-w-2xl">
      <p class="text-center text-gray-400">Loading match streams...</p>
    </div>
  </main>

  <!-- App Not Found Modal -->
  <div id="player-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close-button" id="close-modal">&times;</button>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnni40YRRPc9wGBd2tDOIX1qCTqddax0tPR5QsIxC8HA&s=10" alt="NS Player" class="app-logo">
      <h3 class="text-2xl font-bold mb-4 text-white">App Not Installed</h3>
      <p class="text-gray-300 mb-2">The required player app is not installed.</p>
      <p class="text-gray-300 mb-6">Please install <strong>Network Streaming Video Player</strong>.</p>
      <a href="https://play.google.com/store/apps/details?id=com.genuine.leone" target="_blank" class="install-button flex items-center justify-center gap-2">
        <i class="fab fa-android"></i> Install NS Player
      </a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('match-detail-container');
      const modal = document.getElementById('player-modal');
      const closeBtn = document.getElementById('close-modal');

      const showModal = () => modal.classList.add('show');
      const hideModal = () => modal.classList.remove('show');

      closeBtn.addEventListener('click', hideModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) hideModal();
      });

      const match = JSON.parse(localStorage.getItem('selectedMatch'));
      if (!match) {
        container.innerHTML = `
          <div class="text-center text-red-400">
            <p>No match selected.</p>
            <button onclick="history.back()" class="mt-4 text-blue-400 underline">← Go Back</button>
          </div>
        `;
        return;
      }

      // Render logos
      const logoHtml = `
        <div class="match-logo mb-6">
          <img src="${match.home_img || 'https://via.placeholder.com/64'}" alt="${match.home_name}" class="team-logo">
          <div class="vs-label">VS</div>
          <img src="${match.away_img || 'https://via.placeholder.com/64'}" alt="${match.away_name}" class="team-logo">
        </div>
      `;

      // Render stream buttons from links
      let buttonsHtml = '';
      if (match.links && match.links.length > 0) {
        buttonsHtml = match.links.map(link => `
          <button class="stream-button" onclick="openPlayer('${link.url}')">
            ${link.name}
          </button>
        `).join('');
      } else {
        buttonsHtml = '<p class="text-center text-gray-400">No streams available.</p>';
      }

      container.innerHTML = `
        <div class="text-center">
          <h2 class="text-2xl font-bold mb-2 text-white">${match.title}</h2>
          <p class="text-gray-300 mb-4">${match.league} • ${match.time}</p>
          ${logoHtml}
          <div class="mt-6 space-y-2">${buttonsHtml}</div>
          <button onclick="history.back()" class="mt-6 text-blue-400 underline text-sm">← Back to Matches</button>
        </div>
      `;
    });

    // Global function for stream launch
    window.openPlayer = function(url) {
      const isAndroid = /Android/i.test(navigator.userAgent);
      if (!isAndroid) {
        alert('Streaming only works on Android devices.');
        return;
      }

      const intentUrl = `intent:${url}#Intent;package=com.genuine.leone;type=video/*;S.title=Live%20Football;end`;
      let timeout;

      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = intentUrl;
      document.body.appendChild(iframe);

      setTimeout(() => {
        document.body.removeChild(iframe);
      }, 1000);

      timeout = setTimeout(() => {
        document.getElementById('player-modal').classList.add('show');
      }, 1500);

      const handleVis = () => {
        if (document.visibilityState === 'hidden') clearTimeout(timeout);
      };
      document.addEventListener('visibilitychange', handleVis, { once: true });
    };
  </script>
</body>
  </html>
