    body {
      margin: 0;
      font-family: 'Roboto', 'Segoe UI', sans-serif;

    /* ============ SIDEBAR ============ */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 192px;

      background-color: #1f2937;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      align-items: center;
    }

    .sidebar-header i {
      color: #ef4444;
      margin-right: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: #d1d5db;
      text-decoration: none;
    }

    .nav-item:hover:not(.active) {
      background-color: #f3f4f6;
      color: #1f2937;
    }

    .nav-item.active {
      background-color: #ef4444;
      color: white;
    }

    .nav-item.active:hover {
      background-color: #dc2626;
    }

    /* ============ MAIN CONTENT ============ */
    .main-content {
      margin-left: 192px;
      padding: 24px 16px 64px;
    }

    .page-title {
      font-size: 24px;
      font-weight: bold;
      color: #ef4444;
      margin-bottom: 16px;
    }

    .device-info {
      font-size: 13px;
      color: #60a5fa;
      margin-top: 4px;
      background: #1f2937;
      padding: 6px 12px;
      border-radius: 8px;
      display: inline-block;
      border-left: 4px solid #ef4444;
      font-weight: normal;
    }

    /* ============ FILTER BUTTONS ============ */
    .filter-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 8px 16px;
      background: #374151;
      color: #d1d5db;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #ef4444;
      color: white;
    }

    /* ============ MATCH GRID ============ */
    .movie-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-start;
    }

    .movie-col {
      width: calc(50% - 6px);
    }

    @media (min-width: 640px) { .movie-col { width: calc(33.333% - 8px); } }
    @media (min-width: 768px) { .movie-col { width: calc(25% - 9px); } }
    @media (min-width: 1024px) { .movie-col { width: calc(20% - 9.6px); } }
    @media (min-width: 1280px) { .movie-col { width: calc(16.666% - 10px); } }

    .movie-card {
      background-color: #1f2937;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      padding: 8px;
      box-sizing: border-box;
      position: relative;
      transition: transform 0.2s;
    }

    .movie-card:hover {
      transform: scale(1.02);
      background-color: #374151;
    }

    .match-logo {
      width: 100%;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #111;
      border-radius: 6px;
    }

    .team-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .vs-label {
      color: #ef4444;
      font-size: 12px;
      font-weight: bold;
      background: #222;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .movie-card .info {
      padding: 10px 6px;
      text-align: center;
    }

    .movie-card .info h3 {
      font-size: 13px;
      font-weight: bold;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-card .info p {
      font-size: 11px;
      color: #9ca3af;
      margin: 0;
    }

    .live-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #ef4444;
      color: white;
      font-size: 9px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 2;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
    }

    /* ============ FOOTER ============ */
    footer {
      background-color: #1f2937;
      text-align: center;
      padding: 20px;
      margin-top: 32px;
      font-size: 14px;
      border-top: 1px solid #374151;
    }

    footer a {
      color: #ef4444;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

  <!-- MAIN CONTENT -->

  <!-- STABLE DEVICE ID & ACCESS CHECK -->
  <script>
    const HF_BASE_URL = "https://livesportmm-s4itmmapprover.hf.space";

    function getStableID() {
      try {
        let id = localStorage.getItem("s4itmm_stable_id");
        if (id && id.length === 12) return id;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const txt = 'S4ITMM-TV-DEVICE-ID-2026';
        ctx.textBaseline = "top"; ctx.font = "14px 'Arial'";
        ctx.fillText(txt, 2, 15);
        const b64 = canvas.toDataURL().replace("data:image/png;base64,", "");
        let hash = 0;
        for (let i = 0; i < b64.length; i++) {
          hash = (hash << 5) - hash + b64.charCodeAt(i);
          hash = hash & hash;
        }
        const screenInfo = window.screen.width + "x" + window.screen.height;
        const finalRaw = Math.abs(hash).toString() + navigator.platform + screenInfo;
        let finalHash = 0;
        for (let j = 0; j < finalRaw.length; j++) {
          finalHash = (finalHash << 5) - finalHash + finalRaw.charCodeAt(j);
        }
        id = Math.abs(finalHash).toString().padStart(12, "0").slice(0, 12);
        localStorage.setItem("s4itmm_stable_id", id);
        return id;
      } catch (e) { return "000000000000"; }
    }

    async function updateAccessDisplay() {
      const infoDiv = document.getElementById("device-info");
      const currentID = getStableID();
      try {
        const res = await fetch(`${HF_BASE_URL}/approved_users.json?_t=${Date.now()}`, { cache: "no-store" });
        const users = await res.json();
        const user = users.find(u => u.id === currentID);
        if (user) {
          const expDate = new Date(user.expires).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
          infoDiv.innerHTML = `<i class="fas fa-tv"></i> ID: ${currentID} | <i class="fas fa-calendar-check"></i> Exp: ${expDate}`;
        } else {
          infoDiv.textContent = `ID: ${currentID} | Trial Access`;
        }
      } catch (e) { infoDiv.textContent = `ID: ${currentID} | Offline Mode`; }
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateAccessDisplay();
      fetchMatches();
    });
  </script>

  <!-- MATCHES LOADER LOGIC -->
  <script>
    let allMatches = [];
    let currentFilter = 'all';

    async function fetchMatches() {
      const grid = document.getElementById('movie-grid');
      grid.innerHTML = '<div style="text-align:center; width:100%; padding:30px;"><i class="fas fa-spinner fa-spin"></i> Loading matches...</div>';
      try {
        const res = await fetch('https://raw.githubusercontent.com/devxseven/mdata/refs/heads/main/matches.json?_t=' + Date.now(), { cache: 'no-store' });
        const data = await res.json();
        allMatches = data.context || [];
        applyFilter(currentFilter);
      } catch (err) {
        grid.innerHTML = '<div style="color:#f87171; text-align:center; width:100%; padding:30px;">❌ Failed to load. Check internet.</div>';
      }
    }

    function formatTime(timestamp) {
      const d = new Date(Number(timestamp) * 1000);
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function isTomorrow(timestamp) {
      const matchDate = new Date(Number(timestamp) * 1000);
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
      return matchDate.toDateString() === tomorrow.toDateString();
    }

    function isMainMatch(league) {
      const mainLeagues = ['Premier League', 'NBA', 'La Liga', 'Serie A', 'Bundesliga', 'Ligue 1', 'UCL', 'UEL', 'Coppa Italia', 'SPA Cup', 'AUS D1', 'WKBL', 'WNBL', 'BRA D1', 'COL D1'];
      return mainLeagues.includes(league);
    }

    function renderMatches(matches) {
      const grid = document.getElementById('movie-grid');
      grid.innerHTML = '';
      if (matches.length === 0) {
        grid.innerHTML = '<div style="color:#9ca3af; text-align:center; width:100%; padding:30px;">No matches found for this filter.</div>';
        return;
      }
      matches.forEach(match => {
        const col = document.createElement('div'); col.className = 'movie-col';
        const card = document.createElement('div'); card.className = 'movie-card';
        const hImg = (match.home_img || '').trim() || 'https://via.placeholder.com/60';
        const aImg = (match.away_img || '').trim() || 'https://via.placeholder.com/60';
        card.innerHTML = `
          <div class="match-logo">
            <img src="${hImg}" class="team-logo">
            <div class="vs-label">VS</div>
            <img src="${aImg}" class="team-logo">
          </div>
          ${match.match_status ? '<div class="live-badge">LIVE</div>' : ''}
          <div class="info">
            <h3>${match.home_name} vs ${match.away_name}</h3>
            <p>${match.league || ''} | ${formatTime(match.match_time)}</p>
          </div>
        `;
        card.addEventListener('click', () => {
          localStorage.setItem('selectedMatch', JSON.stringify(match));
          window.location.href = 'football_detail.html';
        });
        col.appendChild(card); grid.appendChild(col);
      });
    }

    function applyFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById(`btn-${filter}`);
      if (activeBtn) activeBtn.classList.add('active');

      let filtered = allMatches;
      if (filter === 'live') filtered = allMatches.filter(m => m.match_status === true);
      else if (filter === 'main') filtered = allMatches.filter(m => isMainMatch(m.league));
      else if (filter === 'tomorrow') filtered = allMatches.filter(m => isTomorrow(m.match_time));
      renderMatches(filtered);
    }

    function showAllMatches() { applyFilter('all'); }
    function showLiveMatches() { applyFilter('live'); }
    function showMainMatches() { applyFilter('main'); }
    function showTomorrowMatches() { applyFilter('tomorrow'); }
    function reloadData() { fetchMatches(); }
  </script>
