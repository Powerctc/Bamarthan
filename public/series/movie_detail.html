<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Fotlivemovies - Series Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary-red: #ef4444;
    }

    body {
      background-color: var(--bg-dark);
      color: #f8fafc;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      margin: 0;
    }

    /* --- Built-in Player Section --- */
    .player-wrapper {
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      display: none;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    video { width: 100%; height: 100%; }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 1.5rem;
      max-height: 500px;
      display: flex;
      flex-direction: column;
    }

    .movie-poster-large {
      width: 300px;
      height: 450px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    .episode-list {
      overflow-y: auto;
      flex-grow: 1;
      margin-top: 10px;
      padding-right: 5px;
    }

    .episode-list::-webkit-scrollbar { width: 4px; }
    .episode-list::-webkit-scrollbar-thumb { background: var(--primary-red); border-radius: 10px; }

    .ep-btn {
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      padding: 12px 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      transition: 0.3s;
      width: 100%;
      border: 1px solid transparent;
    }

    .ep-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--primary-red);
    }

    /* --- Player Selection Modal --- */
    #choice-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .choice-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .tv-layout { flex-direction: column; align-items: center; gap: 20px; }
      .movie-poster-large { width: 200px; height: 300px; }
      .glass-card { max-height: 400px; }
    }
  </style>
</head>
<body>

  <div id="playerSection" class="player-wrapper">
    <video id="mainVideoPlayer" controls playsinline>
      <source src="" type="video/mp4">
    </video>
  </div>

  <header class="p-6 flex items-center">
    <a href="index.html" class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center text-white text-xl">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="ml-4">
      <h1 class="text-white font-black text-2xl">Fotlive<span class="text-red-500">movies</span></h1>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-4">
    <div id="series-container" class="flex flex-row gap-10 tv-layout">
      </div>
  </main>

  <div id="choice-modal">
    <div class="choice-box">
      <h3 class="text-xl font-bold mb-6">ဘယ်လိုကြည့်ချင်ပါသလဲ?</h3>
      <div class="flex flex-col gap-4">
        <button id="useInApp" class="bg-blue-600 p-4 rounded-xl font-bold flex items-center justify-center gap-3">
          <i class="fas fa-play-circle"></i> In-App Player
        </button>
        <button id="useMX" class="bg-red-600 p-4 rounded-xl font-bold flex items-center justify-center gap-3">
          <i class="fas fa-external-link-alt"></i> MX Player
        </button>
        <button onclick="closeModal()" class="text-slate-400 mt-2">ပိတ်ရန်</button>
      </div>
    </div>
  </div>

<script>
    let currentUrl = "";
    let currentTitle = "";

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('series-container');
      const stored = localStorage.getItem('selectedMovie');
      
      if (!stored) {
        container.innerHTML = `<h2 class="text-center w-full">No Series Selected</h2>`;
        return;
      }

      const movie = JSON.parse(stored);
      
      const episodesHtml = (movie.episodes || []).map((ep, i) => `
        <button class="ep-btn" onclick="openChoice('${ep.url}', '${ep.title || `Episode ${i+1}`}')">
          <span class="font-bold text-sm"><i class="fas fa-play mr-3 text-red-500"></i> ${ep.title || `Episode ${i+1}`}</span>
          <i class="fas fa-chevron-right text-xs opacity-30"></i>
        </button>
      `).join("");

      container.innerHTML = `
        <div class="shrink-0">
          <img src="${movie.logo}" class="movie-poster-large" onerror="this.src='https://placehold.co/400x600/1e293b/white?text=SERIES'">
        </div>
        
        <div class="glass-card flex-1">
          <h2 class="text-white text-3xl font-black mb-2">${movie.title}</h2>
          <div class="flex gap-2 mb-4">
              <span class="bg-red-500/20 text-red-500 px-3 py-1 rounded text-xs font-bold">${movie.year || 'Series'}</span>
              <span class="bg-white/10 text-white/60 px-3 py-1 rounded text-xs font-bold">${movie.category || 'Ongoing'}</span>
          </div>
          
          <h3 class="text-red-500 text-xs font-black uppercase tracking-widest mb-3">Episode List</h3>
          
          <div class="episode-list">
             ${episodesHtml || '<p class="text-slate-500">No episodes available.</p>'}
          </div>
        </div>
      `;
    });

    function openChoice(url, title) {
      currentUrl = url;
      currentTitle = title;
      document.getElementById('choice-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('choice-modal').style.display = 'none';
    }

    // ၁။ In-App Player
    document.getElementById('useInApp').onclick = () => {
      const video = document.getElementById('mainVideoPlayer');
      video.src = currentUrl;
      document.getElementById('playerSection').style.display = 'block';
      video.play();
      closeModal();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // ၂။ MX Player (Android Intent)
    document.getElementById('useMX').onclick = () => {
      const isAndroid = /android/i.test(navigator.userAgent);
      if (isAndroid) {
        const intent = `intent:${currentUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(currentTitle)};end`;
        window.location.href = intent;
      } else {
        window.open(currentUrl, '_blank');
      }
      closeModal();
    };
</script>
</body>
</html>
