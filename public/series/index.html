<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S4ITMM MOBILE - Series List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#facc15', 
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
<style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Color Run Border Logic */
        .ad-color-run {
            padding: 3px;
            border-radius: 20px;
            background: linear-gradient(270deg, #ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 600% 600%;
            animation: colorRun 4s linear infinite;
        }
        @keyframes colorRun { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        
        .ad-color-run img { border-radius: 17px; }
        .movie-glow:active { box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
</style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex justify-between items-center">
        <button id="menu-btn" class="text-primary text-2xl w-10 text-left active:scale-90 transition-transform">
            <i class="fas fa-bars-staggered"></i>
        </button>

        <div class="flex flex-col items-center">
            <span class="text-primary font-black text-xl tracking-tighter leading-none">S4ITMM</span>
            <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Series Collection</span>
        </div>

        <div class="w-10 text-right">
            <button id="theme-toggle" class="text-xl text-slate-600 dark:text-primary active:scale-90 transition-transform">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <main class="p-4 pt-20"> <div class="mb-6">
            <a href="https://nextjs-mobile-one.vercel.app/iwbet/ad.html">
                <div class="ad-color-run shadow-lg">
                    <img src="https://nextjs-mobile-one.vercel.app/Adult/ad_banner.gif" class="w-full h-auto block" alt="AD">
                </div>
            </a>
        </div>

        <div class="mb-4 sticky top-[72px] z-40">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 opacity-30"></i>
                <input type="text" id="search-bar" 
                   class="w-full bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 p-4 pl-12 rounded-2xl focus:ring-2 focus:ring-primary shadow-sm dark:text-white text-xs"
                   placeholder="Search series title...">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <button id="src-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary active:text-black transition-all">Server</button>
            <button id="gen-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary active:text-black transition-all">Genre</button>
            <button id="yr-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary active:text-black transition-all">Year</button>
        </div>

        <div id="movie-grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-20 opacity-30 animate-pulse font-bold uppercase tracking-widest text-[10px]">Loading Series...</div>
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-800 transform transition-transform duration-300">
            <div id="overlay-title" class="p-4 text-center font-black text-primary border-b border-slate-100 dark:border-slate-800 uppercase tracking-widest text-xs">Select</div>
            <div id="overlay-list" class="max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeOverlay()" class="w-full p-4 text-xs font-black opacity-40 uppercase tracking-widest hover:bg-red-500/10">Close</button>
        </div>
    </div>

    <div id="sidebar-container"></div>
    <script src="../sidebar.js"></script>

    <script>
        const movieSources = [
            { label: "Main Server", value: "series.json" }, 
            { label: "Backup Server 1", value: "series-1.json" }
        ];

        let allMovies = [];
        const grid = document.getElementById('movie-grid');

        // Theme Management
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        // Content Loader
        async function loadMovies(url) {
            grid.innerHTML = '<div class="col-span-2 text-center py-20 opacity-30 animate-pulse font-bold uppercase tracking-widest text-[10px]">Loading Series...</div>';
            try {
                const res = await fetch(`${url}?v=${Date.now()}`);
                const data = await res.json();
                
                // Filter logic
                allMovies = data.filter(m => 
                    m.category.toLowerCase().includes('series') || 
                    m.category.includes('ဇာတ်လမ်းတွဲ') ||
                    m.category.toLowerCase().includes('tv')
                );
                renderMovies(allMovies);
            } catch (e) {
                grid.innerHTML = '<div class="col-span-2 text-center py-20 text-red-500 text-[10px]">FAILED TO LOAD DATA.</div>';
            }
        }

        function renderMovies(data) {
            grid.innerHTML = '';
            if(data.length === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center py-20 opacity-50 text-[10px]">NO SERIES FOUND.</div>';
                return;
            }

            const lastViewed = localStorage.getItem('s4itmm_last_series');

            data.forEach(m => {
                const isRecent = (m.title === lastViewed);
                const card = document.createElement('div');
                card.className = `group relative bg-white dark:bg-darkCard rounded-2xl overflow-hidden transition-all active:scale-95 shadow-md border border-transparent dark:border-slate-800 ${isRecent ? 'ring-2 ring-primary' : ''}`;
                
                card.innerHTML = `
                    ${isRecent ? '<span class="absolute top-2 left-2 bg-primary text-black text-[7px] font-black px-1.5 py-0.5 rounded shadow-lg z-10 uppercase">Watching</span>' : ''}
                    <div class="aspect-[3/4] overflow-hidden bg-slate-800 relative">
                        <img src="${m.logo}" loading="lazy" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=No+Poster'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60"></div>
                    </div>
                    <div class="p-3">
                        <h3 class="text-[11px] font-bold line-clamp-1 leading-tight mb-1 text-slate-800 dark:text-slate-100">${m.title}</h3>
                        <div class="flex items-center justify-between">
                            <span class="text-[9px] opacity-50 font-medium">${m.year || '2026'}</span>
                            <span class="text-[7px] font-black bg-primary/10 text-primary border border-primary/20 px-1.5 py-0.5 rounded uppercase">EPISODES</span>
                        </div>
                    </div>
                `;
                
                card.onclick = () => {
                    localStorage.setItem("selectedMovie", JSON.stringify(m));
                    localStorage.setItem("s4itmm_last_series", m.title);
                    window.location.href = "movie_detail.html";
                };
                grid.appendChild(card);
            });
        }

        function openOverlay(title, items, callback) {
            document.getElementById('overlay-title').innerText = title;
            const list = document.getElementById('overlay-list');
            list.innerHTML = '';
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-4 text-center text-xs font-bold border-b border-slate-50 dark:border-slate-800 active:bg-primary active:text-black transition-all dark:text-slate-300';
                btn.innerText = item.label;
                btn.onclick = () => { callback(item.value); closeOverlay(); };
                list.appendChild(btn);
            });
            document.getElementById('overlay').classList.replace('hidden', 'flex');
        }

        function closeOverlay() { 
            document.getElementById('overlay').classList.replace('flex', 'hidden'); 
        }

        document.getElementById('src-btn').onclick = () => openOverlay("Server Source", movieSources, (val) => loadMovies(val));
        
        document.getElementById('gen-btn').onclick = () => {
            const genres = [...new Set(allMovies.map(m => m.category))];
            const items = [{label: "ALL SERIES", value: "all"}, ...genres.map(g => ({label: g.toUpperCase(), value: g}))];
            openOverlay("Browse Genre", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.category === v)));
        };

        document.getElementById('yr-btn').onclick = () => {
            const years = [...new Set(allMovies.map(m => m.year))].filter(y => y).sort((a,b)=>b-a);
            const items = [{label: "ANY YEAR", value: "all"}, ...years.map(y => ({label: y, value: y}))];
            openOverlay("Release Year", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.year == v)));
        };

        document.getElementById('search-bar').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
            renderMovies(filtered);
        };

        window.onload = () => {
            loadMovies(movieSources[0].value);
        };
    </script>
</body>
    </html>
