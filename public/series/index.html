<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S4ITMM MOBILE - Series Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#facc15', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; }
        
        /* Active Episode Style */
        .ep-btn.active { 
            background-color: #facc15 !important; 
            color: #000 !important; 
            border-color: #facc15 !important;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center gap-4">
        <button onclick="history.back()" class="text-primary text-xl active:scale-90 transition-transform">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="flex-1">
            <span id="header-title" class="font-bold text-sm truncate block">Series Detail</span>
        </div>
        <button id="theme-toggle" class="text-xl text-slate-600 dark:text-primary active:scale-90 transition-transform">
            <i class="fas fa-moon dark:hidden"></i>
            <i class="fas fa-sun hidden dark:block"></i>
        </button>
    </header>

    <div id="player-container" class="pt-[52px] sticky top-0 z-40 bg-black aspect-video shadow-2xl border-b border-primary/20">
        <div id="player-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 bg-slate-900">
            <i class="fas fa-play-circle text-5xl mb-3 text-primary/40"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">Select an Episode to Play</span>
        </div>
        <iframe id="main-player" class="w-full h-full hidden" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <main class="p-5">
        <div class="flex flex-col md:flex-row gap-5 mb-8">
            <div class="w-32 self-center md:self-start flex-shrink-0 shadow-2xl rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
                <img id="series-poster" src="" class="w-full h-auto">
            </div>
            <div class="flex-1">
                <h1 id="series-title" class="text-xl font-black text-slate-800 dark:text-white leading-tight">Loading Title...</h1>
                <div class="flex items-center gap-3 mt-2 text-[10px] font-black uppercase tracking-widest">
                    <span id="series-year" class="text-primary">2026</span>
                    <span class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                    <span id="series-cat" class="bg-primary/10 text-primary border border-primary/20 px-2 py-0.5 rounded">ဇာတ်လမ်းတွဲ</span>
                </div>
                <div class="mt-4 p-4 bg-white dark:bg-darkCard rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <h4 class="text-[10px] font-black uppercase text-primary mb-2 tracking-tighter">Synopsis</h4>
                    <p id="series-desc" class="text-xs leading-relaxed opacity-70">Loading description...</p>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-3">
                <div class="flex items-center gap-2">
                    <i class="fas fa-layer-group text-primary"></i>
                    <h2 class="text-xs font-black uppercase tracking-widest">Episode List</h2>
                </div>
                <div id="playing-status" class="text-[9px] font-bold text-primary animate-pulse hidden uppercase">
                    Now Playing...
                </div>
            </div>

            <div id="episode-list" class="ep-grid pt-2">
                </div>
        </div>
    </main>

    <div id="sidebar-container"></div>
    <script src="../sidebar.js"></script>
    <script src="series_detail.js"></script>

    <script>
        // Theme Logic (Matching Main)
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
    </script>
</body>
</html>
