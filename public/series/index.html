<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S4ITMM MOBILE - Series List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#facc15', 
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .ad-color-run {
            padding: 3px; border-radius: 20px;
            background: linear-gradient(270deg, #ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 600% 600%; animation: colorRun 4s linear infinite;
        }
        @keyframes colorRun { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        
        /* Detail View Animation */
        #detail-view {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #detail-view.active { transform: translateX(0); }

        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex justify-between items-center">
        <button id="menu-btn" class="text-primary text-2xl w-10 text-left active:scale-90 transition-transform">
            <i class="fas fa-bars-staggered"></i>
        </button>
        <div class="flex flex-col items-center">
            <span class="text-primary font-black text-xl tracking-tighter leading-none">S4ITMM</span>
            <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Series Collection</span>
        </div>
        <div class="w-10 text-right">
            <button id="theme-toggle" class="text-xl text-slate-600 dark:text-primary active:scale-90 transition-transform">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <main id="main-content" class="p-4 pt-20">
        <div class="mb-6">
            <a href="#"><div class="ad-color-run shadow-lg"><img src="https://fotlivemovies.vercel.app/ad_banner.gif" class="w-full h-auto block rounded-[17px]"></div></a>
        </div>

        <div class="mb-4 sticky top-[72px] z-40">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 opacity-30"></i>
                <input type="text" id="search-bar" class="w-full bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 p-4 pl-12 rounded-2xl focus:ring-2 focus:ring-primary shadow-sm dark:text-white text-xs" placeholder="Search series title...">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <button id="src-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary active:text-black transition-all">Server</button>
            <button id="gen-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary active:text-black transition-all">Genre</button>
            <button id="yr-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase active:bg-primary active:text-black transition-all">Year</button>
        </div>

        <div id="movie-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="detail-view" class="fixed inset-0 z-[100] bg-white dark:bg-darkBg overflow-y-auto hidden">
        <header class="sticky top-0 z-[110] bg-white/90 dark:bg-darkBg/90 backdrop-blur-md px-4 py-3 flex items-center gap-4 border-b dark:border-slate-800">
            <button onclick="closeDetail()" class="text-primary text-xl w-10 active:scale-90"><i class="fas fa-arrow-left"></i></button>
            <span id="det-header-title" class="font-bold truncate text-sm flex-1">Series Detail</span>
        </header>

        <div id="player-box" class="w-full aspect-video bg-black sticky top-[52px] z-[105]">
            <iframe id="main-player" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="p-5">
            <div class="flex gap-4 mb-6">
                <img id="det-poster" class="w-28 h-40 object-cover rounded-xl shadow-xl border dark:border-slate-800">
                <div class="flex-1">
                    <h2 id="det-title" class="text-lg font-black leading-tight text-primary"></h2>
                    <div class="flex gap-2 mt-2">
                        <span id="det-year" class="text-[10px] bg-slate-200 dark:bg-slate-800 px-2 py-0.5 rounded font-bold"></span>
                        <span id="det-cat" class="text-[10px] bg-primary/20 text-primary border border-primary/20 px-2 py-0.5 rounded font-bold uppercase"></span>
                    </div>
                    <p id="det-desc" class="text-[11px] mt-3 opacity-60 line-clamp-3 leading-relaxed"></p>
                </div>
            </div>

            <div class="border-t dark:border-slate-800 pt-5">
                <h3 class="font-black text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fas fa-list-ol text-primary"></i> Episode List
                </h3>
                <div id="det-episodes" class="ep-grid"></div>
            </div>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-800 transform transition-transform duration-300">
            <div id="overlay-title" class="p-4 text-center font-black text-primary border-b border-slate-100 dark:border-slate-800 uppercase tracking-widest text-xs">Select</div>
            <div id="overlay-list" class="max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeOverlay()" class="w-full p-4 text-xs font-black opacity-40 uppercase tracking-widest">Close</button>
        </div>
    </div>

    <div id="sidebar-container"></div>
    <script src="../sidebar.js"></script>

    <script>
        const movieSources = [
            { label: "Main Server", value: "series.json" }, 
            { label: "Backup Server 1", value: "series-1.json" }
        ];

        let allMovies = [];
        const grid = document.getElementById('movie-grid');

        // Theme Management
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        // Content Loader
        async function loadMovies(url) {
            grid.innerHTML = '<div class="col-span-2 text-center py-20 opacity-30 animate-pulse font-bold uppercase tracking-widest text-[10px]">Loading Series...</div>';
            try {
                const res = await fetch(`${url}?v=${Date.now()}`);
                const data = await res.json();
                allMovies = data.filter(m => 
                    m.category.toLowerCase().includes('series') || 
                    m.category.includes('ဇာတ်လမ်းတွဲ') ||
                    m.category.toLowerCase().includes('tv')
                );
                renderMovies(allMovies);
            } catch (e) {
                grid.innerHTML = '<div class="col-span-2 text-center py-20 text-red-500 text-[10px]">FAILED TO LOAD DATA.</div>';
            }
        }

        function renderMovies(data) {
            grid.innerHTML = '';
            if(data.length === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center py-20 opacity-50 text-[10px]">NO SERIES FOUND.</div>';
                return;
            }
            const lastViewed = localStorage.getItem('s4itmm_last_series');

            data.forEach(m => {
                const isRecent = (m.title === lastViewed);
                const card = document.createElement('div');
                card.className = `group relative bg-white dark:bg-darkCard rounded-2xl overflow-hidden transition-all active:scale-95 shadow-md border border-transparent dark:border-slate-800 ${isRecent ? 'ring-2 ring-primary' : ''}`;
                
                card.innerHTML = `
                    ${isRecent ? '<span class="absolute top-2 left-2 bg-primary text-black text-[7px] font-black px-1.5 py-0.5 rounded shadow-lg z-10 uppercase">Watching</span>' : ''}
                    <div class="aspect-[3/4] overflow-hidden bg-slate-800 relative">
                        <img src="${m.logo}" loading="lazy" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60"></div>
                    </div>
                    <div class="p-3">
                        <h3 class="text-[11px] font-bold line-clamp-1 leading-tight mb-1 text-slate-800 dark:text-slate-100">${m.title}</h3>
                        <div class="flex items-center justify-between">
                            <span class="text-[9px] opacity-50 font-medium">${m.year || '2026'}</span>
                            <span class="text-[7px] font-black bg-primary/10 text-primary border border-primary/20 px-1.5 py-0.5 rounded uppercase">EPISODES</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openDetail(m);
                grid.appendChild(card);
            });
        }

        // --- Detail SPA Logic ---
        function openDetail(m) {
            const dv = document.getElementById('detail-view');
            document.getElementById('det-header-title').innerText = m.title;
            document.getElementById('det-title').innerText = m.title;
            document.getElementById('det-poster').src = m.logo;
            document.getElementById('det-year').innerText = m.year || '2026';
            document.getElementById('det-cat').innerText = m.category;
            document.getElementById('det-desc').innerText = m.description || 'No description available.';
            
            // Render Episodes
            const epBox = document.getElementById('det-episodes');
            epBox.innerHTML = '';
            if(m.episodes && m.episodes.length > 0) {
                m.episodes.forEach((ep, idx) => {
                    const eBtn = document.createElement('button');
                    eBtn.className = "ep-btn bg-slate-100 dark:bg-slate-800 border dark:border-slate-700 py-3 rounded-xl text-[10px] font-black transition-all active:bg-primary active:text-black";
                    eBtn.innerText = ep.label || `E${idx+1}`;
                    eBtn.onclick = () => {
                        document.getElementById('main-player').src = ep.url;
                        dv.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    epBox.appendChild(eBtn);
                });
            } else {
                epBox.innerHTML = '<p class="col-span-full text-center py-4 opacity-40 text-[10px]">COMING SOON</p>';
            }

            dv.classList.remove('hidden');
            setTimeout(() => dv.classList.add('active'), 50);
            document.body.style.overflow = 'hidden';
            localStorage.setItem('s4itmm_last_series', m.title);
        }

        function closeDetail() {
            const dv = document.getElementById('detail-view');
            dv.classList.remove('active');
            document.getElementById('main-player').src = '';
            setTimeout(() => dv.classList.add('hidden'), 400);
            document.body.style.overflow = 'auto';
            renderMovies(allMovies); // Refresh grid to update "Watching" tag
        }

        // Filter Overlays
        function openOverlay(title, items, callback) {
            document.getElementById('overlay-title').innerText = title;
            const list = document.getElementById('overlay-list');
            list.innerHTML = '';
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-4 text-center text-xs font-bold border-b dark:border-slate-800 active:bg-primary transition-all dark:text-slate-300';
                btn.innerText = item.label;
                btn.onclick = () => { callback(item.value); closeOverlay(); };
                list.appendChild(btn);
            });
            document.getElementById('overlay').classList.replace('hidden', 'flex');
        }

        function closeOverlay() { document.getElementById('overlay').classList.replace('flex', 'hidden'); }

        document.getElementById('src-btn').onclick = () => openOverlay("Server Source", movieSources, (val) => loadMovies(val));
        document.getElementById('gen-btn').onclick = () => {
            const genres = [...new Set(allMovies.map(m => m.category))];
            const items = [{label: "ALL SERIES", value: "all"}, ...genres.map(g => ({label: g.toUpperCase(), value: g}))];
            openOverlay("Browse Genre", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.category === v)));
        };
        document.getElementById('yr-btn').onclick = () => {
            const years = [...new Set(allMovies.map(m => m.year))].filter(y => y).sort((a,b)=>b-a);
            const items = [{label: "ANY YEAR", value: "all"}, ...years.map(y => ({label: y, value: y}))];
            openOverlay("Release Year", items, (v) => v === "all" ? renderMovies(allMovies) : renderMovies(allMovies.filter(m => m.year == v)));
        };

        document.getElementById('search-bar').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(term)));
        };

        window.onload = () => loadMovies(movieSources[0].value);
    </script>
</body>
</html>
