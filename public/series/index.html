<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S4ITMM SERIES ULTIMATE FULL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>

    <script>
        tailwind.config={
            darkMode:'class',
            theme:{ extend:{ colors:{ primary:'#facc15', darkBg:'#0f172a', darkCard:'#1e293b' } } }
        }
    </script>

    <style>
        *{ -webkit-tap-highlight-color:transparent; outline:none }
        .line-clamp-1{ display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden }
        ::-webkit-scrollbar{ width:0; background:transparent }
        .ad-color-run{ padding:3px; border-radius:20px; background:linear-gradient(270deg,#ff0000,#ff9900,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000); background-size:600% 600%; animation:colorRun 4s linear infinite }
        @keyframes colorRun{ 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        .ad-color-run img{ border-radius:17px }
        .glass-card{ background:rgba(30,41,59,.7); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.1); border-radius:24px; padding:1.5rem }
        .artplayer-app{ width:100%; height:100% }
        .ep-btn.active{ background:#facc15!important; color:#000!important; border-color:#facc15!important; box-shadow:0 0 15px rgba(250,204,21,.4); font-weight:900 }
        .active-source { border-color: #facc15 !important; color: #facc15 !important; }
        .active-movie { border: 2px solid #facc15 !important; transform: scale(0.98); }
        .no-select { user-select: none; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300 no-select">

<div id="home-view">
    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex justify-between items-center">
        <button id="menu-btn" onclick="if(typeof openSidebar === 'function') openSidebar()" class="text-primary text-2xl w-10 text-left">
            <i class="fas fa-bars-staggered"></i>
        </button>
        <div class="flex flex-col items-center">
            <span class="text-primary font-black text-xl tracking-tighter leading-none">S4ITMM</span>
            <span class="text-[8px] font-bold opacity-70 tracking-widest uppercase">Series</span>
        </div>
        <div class="w-10 text-right">
            <button id="theme-toggle" class="text-xl dark:text-primary">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <div id="sidebar-container"></div>

    <main class="p-4 pt-20">
        <div class="mb-6">
            <div class="ad-color-run shadow-lg">
                <img src="https://fotlivemovies.vercel.app/sports.gif" class="w-full h-auto block">
            </div>
        </div>

        <div class="mb-4">
            <input type="text" id="search-bar" class="w-full bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 p-4 rounded-2xl shadow-sm dark:text-white text-xs" placeholder="Search series title...">
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <button id="src-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase transition-all">Source</button>
            <button id="gen-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase">Genre</button>
            <button id="yr-btn" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 py-3 rounded-xl text-[10px] font-black uppercase">Year</button>
        </div>

        <div id="series-grid" class="grid grid-cols-2 gap-4"></div>
    </main>
</div>

<div id="detail-view" class="fixed inset-0 z-[60] bg-slate-50 dark:bg-darkBg hidden flex-col overflow-y-auto">
    <div class="relative w-full aspect-video bg-black shadow-2xl sticky top-0 z-50">
        <div class="artplayer-app"></div>
        <button onclick="handleBackAction()" class="absolute top-4 left-4 z-20 w-10 h-10 bg-black/50 rounded-full flex justify-center items-center text-primary backdrop-blur-md border border-white/10">
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>
    
    <main class="flex-1 p-6">
        <div id="detail-content" class="w-full max-w-lg mx-auto">
            <div class="glass-card w-full text-center">
                <h2 id="det-title" class="dark:text-white text-xl font-black mb-1 leading-tight uppercase">Title</h2>
                <p id="det-meta" class="text-slate-500 text-[10px] uppercase tracking-widest mb-6">Category • Year</p>
                
                <p class="text-[9px] font-black opacity-30 uppercase mb-3 tracking-widest text-left">Select Episode</p>
                <div id="ep-group" class="grid grid-cols-4 gap-2 mb-8"></div>
                
                <div class="space-y-3 pt-6 border-t border-white/5 mb-8">
                    <button id="in-app-play" class="w-full bg-primary text-black font-black py-4 rounded-[17px] flex items-center justify-center gap-4 active:scale-95 transition-all">
                        <i class="fas fa-play-circle"></i>
                        <span class="text-xs uppercase tracking-widest">In-App Player</span>
                    </button>

                    <div class="ad-color-run">
                        <button id="ext-play-btn" class="w-full bg-slate-900 text-white font-black py-4 rounded-[17px] flex items-center justify-center gap-4 active:scale-95 transition-all">
                            <i class="fas fa-play text-primary"></i>
                            <span class="text-xs uppercase tracking-widest">Open in NS Player</span>
                        </button>
                    </div>
                </div>

                <div class="bg-gray-900/80 rounded-2xl p-6 border border-gray-800">
                    <button onclick="window.open('https://raw.githubusercontent.com/MultipleTech/Download-link-/d76cc3108c02439463f144316be12a4d3c770b2a/com.genuine.leone_7.7.apk')" class="w-full bg-green-500 py-3 rounded-xl font-black text-black text-[10px] uppercase">Download NS Player</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="overlay" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm hidden flex-col items-center justify-center p-6">
    <div class="w-full max-w-xs bg-darkCard border border-white/10 rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-4 border-b border-white/5 flex justify-between items-center">
            <h3 id="overlay-title" class="text-primary font-black text-xs uppercase tracking-widest">Select</h3>
            <button onclick="closeOverlay()" class="text-white/50 px-2"><i class="fas fa-times"></i></button>
        </div>
        <div id="overlay-list" class="max-h-[60vh] overflow-y-auto"></div>
    </div>
</div>

<script src="../sidebar.js"></script>

<script>
const seriesSources = [
    { label: "Server 1", value: "series.json" },
    { label: "Server 2", value: "series-1.json" },
    { label: "Cloud (Fast)", value: "https://zetflix-peach.vercel.app/Playlist/Movies/movies.json" }
];

let allSeries = [];
let art = null;
let activeEpUrl = "";
let activeSeriesTitle = "";

window.history.replaceState({view: 'home'}, '');
window.onpopstate = () => closeDetail();

function handleBackAction() { window.history.back(); }

async function loadSeries(url) {
    localStorage.setItem('s4itmm_series_source', url);
    const btn = document.getElementById('src-btn');
    const src = seriesSources.find(s => s.value === url);
    btn.innerHTML = `Source<br><span class="text-[8px] text-primary">${src ? src.label : 'Default'}</span>`;
    
    const grid = document.getElementById('series-grid');
    grid.innerHTML = '<div class="col-span-2 text-center py-20 opacity-30 animate-pulse font-bold text-xs text-primary uppercase">Loading...</div>';
    
    try {
        const res = await fetch(`${url}?t=${Date.now()}`);
        allSeries = await res.json();
        renderSeries(allSeries);
    } catch { loadSeries(seriesSources[0].value); }
}

function renderSeries(data) {
    const grid = document.getElementById('series-grid');
    const lastId = localStorage.getItem('s4itmm_last_series_id');
    grid.innerHTML = '';
    
    data.forEach(s => {
        const isActive = s.title === lastId;
        const card = document.createElement('div');
        card.className = `bg-white dark:bg-darkCard rounded-2xl overflow-hidden shadow-sm active:scale-95 transition-all ${isActive ? 'active-movie' : 'border border-transparent dark:border-slate-800'}`;
        card.innerHTML = `
            <div class="aspect-[3/4] relative">
                <img src="${s.logo}" class="w-full h-full object-cover">
                <span class="absolute top-2 right-2 bg-primary text-black text-[7px] font-black px-1.5 py-0.5 rounded shadow-lg">SERIES</span>
            </div>
            <div class="p-3">
                <h3 class="text-[10px] font-bold line-clamp-1 uppercase ${isActive ? 'text-primary' : ''}">${s.title}</h3>
                <p class="text-[8px] opacity-50 mt-1 uppercase">${s.year || '2025'} • ${s.episodes ? s.episodes.length : 0} EPs</p>
            </div>
        `;
        card.onclick = () => openDetail(s);
        grid.appendChild(card);
    });
}

function initArtPlayer(url, poster) {
    if (art) art.destroy();
    art = new Artplayer({
        container: '.artplayer-app',
        url: url,
        poster: poster,
        autoplay: true,
        autoSize: true,
        setting: true,
        pip: true,
        playbackRate: true,
        aspectRatio: true,
        fullscreen: true,
        fullscreenWeb: true,
        lock: true,
        theme: '#facc15'
    });
}


function openDetail(s) {
    window.history.pushState({view: 'detail'}, '');
    localStorage.setItem('s4itmm_last_series_id', s.title);
    renderSeries(allSeries);
    
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('detail-view').classList.remove('hidden');
    
    document.getElementById('det-title').innerText = s.title;
    document.getElementById('det-meta').innerText = `${s.category} • ${s.year}`;
    
    activeSeriesTitle = s.title;
    const episodes = s.episodes || [];
    activeEpUrl = episodes[0]?.url || "";
    let currentEpIdx = 1;

    const epGroup = document.getElementById('ep-group');
    epGroup.innerHTML = '';
    episodes.forEach((ep, i) => {
        const btn = document.createElement('button');
        btn.className = `ep-btn bg-white/5 border border-white/10 text-[11px] font-bold py-3 rounded-xl transition-all ${i === 0 ? 'active' : ''}`;
        btn.innerText = i + 1;
        btn.onclick = () => {
            activeEpUrl = ep.url;
            currentEpIdx = i + 1;
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(art) art.switchUrl(ep.url);
        };
        epGroup.appendChild(btn);
    });

    document.getElementById('in-app-play').onclick = () => {
        initArtPlayer(activeEpUrl, s.logo);
        window.scrollTo(0,0);
    };

    document.getElementById('ext-play-btn').onclick = () => {
        window.location.href = `intent:${activeEpUrl}#Intent;package=com.genuine.leone;type=video/*;S.title=${encodeURIComponent(activeSeriesTitle + ' EP-' + currentEpIdx)};end`;
    };

    initArtPlayer(activeEpUrl, s.logo);
}

function closeDetail() {
    if (art) art.destroy();
    document.getElementById('detail-view').classList.add('hidden');
    document.getElementById('home-view').classList.remove('hidden');
}

function openOverlay(title, items, callback) {
    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-title').innerText = title;
    const list = document.getElementById('overlay-list');
    list.innerHTML = '';
    items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = `w-full p-4 text-center text-xs font-bold border-b border-white/5 uppercase text-white hover:bg-white/5`;
        btn.innerText = item.label;
        btn.onclick = () => { callback(item.value); closeOverlay(); };
        list.appendChild(btn);
    });
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
}

function closeOverlay() { document.getElementById('overlay').classList.add('hidden'); }

document.getElementById('src-btn').onclick = () => openOverlay("Source", seriesSources, (v) => loadSeries(v));
document.getElementById('gen-btn').onclick = () => {
    const genres = [...new Set(allSeries.map(s => s.category).filter(Boolean))];
    openOverlay("Genre", genres.map(g => ({label:g, value:g})), (g) => renderSeries(allSeries.filter(s => s.category === g)));
};
document.getElementById('yr-btn').onclick = () => {
    const years = [...new Set(allSeries.map(s => s.year).filter(Boolean))].sort((a,b) => b-a);
    openOverlay("Year", years.map(y => ({label:y, value:y})), (y) => renderSeries(allSeries.filter(s => String(s.year) === String(y))));
};
document.getElementById('search-bar').oninput = (e) => renderSeries(allSeries.filter(s => s.title.toLowerCase().includes(e.target.value.toLowerCase())));
document.getElementById('theme-toggle').onclick = () => document.documentElement.classList.toggle('dark');

window.onload = () => {
    const saved = localStorage.getItem('s4itmm_series_source') || seriesSources[0].value;
    loadSeries(saved);
};
</script>
</body>
    </html>
